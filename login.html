<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">ASNALO SFA</div>
    <div class="login-sub">株式会社アスナロ 社内営業管理システム</div>
    <button class="btn btn-dark w-full btn-lg" onclick="netlifyIdentity.open('login')">
      ログイン
    </button>
    <button class="btn btn-secondary w-full btn-lg" style="margin-top:10px;" onclick="netlifyIdentity.open('signup')">
      新規登録
    </button>
    <div style="margin-top:14px; font-size:11px; color:var(--text-muted); text-align:center;">
      ※ @asnalo.com のメールアドレスで登録してください
    </div>
  </div>

  <script>
    netlifyIdentity.on('init', user => {
      if (user) {
        location.href = '/';
        return;
      }
      // init完了後にトークンを検知してウィジェットを開く
      const hash = location.hash;
      if (hash.includes('invite_token=') || hash.includes('recovery_token=') || hash.includes('confirmation_token=')) {
        netlifyIdentity.open();
      }
    });
    netlifyIdentity.on('login', () => {
      netlifyIdentity.close();
      location.href = '/';
    });
  </script>
</body>
</html>
