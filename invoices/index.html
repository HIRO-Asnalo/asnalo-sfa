<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>見積・請求書 | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .filter-bar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .seg-btn { padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:#fff; font-size:12px; font-weight:600; cursor:pointer; color:var(--text-muted); }
    .seg-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* ステータスバッジ */
    .status-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:700; }
    .status-draft     { background:#f1f5f9; color:#475569; }
    .status-sent      { background:#dbeafe; color:#1e40af; }
    .status-accepted  { background:#d1fae5; color:#065f46; }
    .status-paid      { background:#22c55e; color:#fff; }
    .status-cancelled { background:#fee2e2; color:#991b1b; }

    /* 一覧テーブル */
    .inv-table { width:100%; border-collapse:collapse; font-size:13px; }
    .inv-table th { background:#f1f5f9; padding:8px 12px; text-align:left; font-weight:700; font-size:11px; border-bottom:2px solid var(--border); white-space:nowrap; }
    .inv-table td { padding:10px 12px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
    .inv-table tr:hover td { background:#fafbfc; }
    .inv-number { font-weight:700; color:var(--primary); font-family:monospace; font-size:12px; }
    .inv-company { font-weight:600; }
    .inv-amount  { font-weight:800; text-align:right; white-space:nowrap; }
    .inv-actions { display:flex; gap:6px; justify-content:flex-end; }
    .act-btn { background:none; border:1px solid var(--border); border-radius:5px; padding:3px 8px; font-size:11px; cursor:pointer; color:var(--text-muted); }
    .act-btn:hover { background:var(--bg); color:var(--primary); }
    .act-btn.danger:hover { background:#fee2e2; color:#ef4444; border-color:#fecaca; }

    /* ===== 編集フォーム ===== */
    .inv-form { display:none; background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 24px rgba(0,0,0,.1); margin-bottom:20px; }
    .inv-form.open { display:block; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

    /* 明細テーブル */
    .items-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:8px; }
    .items-table th { background:#f8fafc; padding:6px 8px; text-align:left; font-weight:700; font-size:11px; border:1px solid var(--border); }
    .items-table td { border:1px solid var(--border); padding:4px; }
    .items-table input { width:100%; border:none; padding:4px 6px; font-size:12px; background:transparent; }
    .items-table input:focus { outline:none; background:#eff6ff; border-radius:3px; }
    .del-row-btn { background:none; border:none; cursor:pointer; color:#ef4444; font-size:16px; padding:2px 4px; }
    .totals-box { background:#f8fafc; border-radius:8px; padding:12px 16px; font-size:13px; }
    .totals-row { display:flex; justify-content:space-between; padding:3px 0; }
    .totals-row.total { font-weight:800; font-size:15px; color:var(--primary); border-top:1px solid var(--border); margin-top:4px; padding-top:6px; }

    /* ===== 印刷ビュー ===== */
    .print-area { display:none; }
    @media print {
      .sidebar, .page-header, .page-body { display:none !important; }
      .main-content { padding:0 !important; background:#fff !important; }
      .print-area { display:block !important; padding:40px; font-family:'Hiragino Kaku Gothic ProN',sans-serif; }
      .print-header { display:flex; justify-content:space-between; margin-bottom:24px; }
      .print-doc-title { font-size:26px; font-weight:900; color:#1e3a5f; }
      .print-number { font-size:14px; color:#64748b; }
      .print-to { margin-bottom:24px; }
      .print-to-name { font-size:16px; font-weight:700; border-bottom:2px solid #1e3a5f; padding-bottom:4px; display:inline-block; }
      .print-from { text-align:right; font-size:12px; color:#475569; }
      .print-items { width:100%; border-collapse:collapse; margin:20px 0; font-size:12px; }
      .print-items th { background:#1e3a5f; color:#fff; padding:7px 10px; text-align:left; }
      .print-items td { padding:7px 10px; border-bottom:1px solid #e2e8f0; }
      .print-items tr:nth-child(even) td { background:#f8fafc; }
      .print-totals { text-align:right; }
      .print-totals table { margin-left:auto; font-size:13px; }
      .print-totals td { padding:3px 10px; }
      .print-totals .grand { font-weight:900; font-size:16px; color:#1e3a5f; border-top:2px solid #1e3a5f; }
      .print-notes { margin-top:24px; font-size:12px; color:#475569; white-space:pre-wrap; }
    }
  </style>
</head>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">見積・請求書</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">案件に紐づく見積書・請求書の作成・管理</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="openForm('quote')" style="margin-right:6px;">+ 見積書を作成</button>
        <button class="btn btn-primary" onclick="openForm('invoice')">+ 請求書を作成</button>
      </div>
    </div>

    <div class="page-body">

      <!-- 編集フォーム -->
      <div class="inv-form" id="invForm">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <div style="font-size:15px;font-weight:800;color:var(--primary);" id="formTitle">見積書を作成</div>
          <button class="btn btn-ghost" onclick="closeForm()">✕ 閉じる</button>
        </div>
        <input type="hidden" id="editInvId">
        <input type="hidden" id="invType">

        <div class="form-row" style="margin-bottom:12px;">
          <div class="form-group">
            <label class="form-label">紐づく案件</label>
            <select class="form-select" id="invDealId" onchange="onDealChange()">
              <option value="">案件を選択（任意）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">顧客名（宛先）<span class="required">*</span></label>
            <input type="text" class="form-input" id="invCustomerName" placeholder="株式会社〇〇 御中">
          </div>
        </div>
        <div class="form-row" style="margin-bottom:12px;">
          <div class="form-group">
            <label class="form-label">発行日</label>
            <input type="date" class="form-input" id="invIssuedDate">
          </div>
          <div class="form-group">
            <label class="form-label">支払期限</label>
            <input type="date" class="form-input" id="invDueDate">
          </div>
        </div>
        <div class="form-row" style="margin-bottom:20px;">
          <div class="form-group">
            <label class="form-label">ステータス</label>
            <select class="form-select" id="invStatus">
              <option value="draft">下書き</option>
              <option value="sent">送付済み</option>
              <option value="accepted">承認済み</option>
              <option value="paid">入金済み</option>
              <option value="cancelled">キャンセル</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">消費税率 (%)</label>
            <input type="number" class="form-input" id="invTaxRate" value="10" min="0" max="100" onchange="recalc()">
          </div>
        </div>

        <!-- 明細 -->
        <div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px;">明細</div>
        <table class="items-table" id="itemsTable">
          <thead>
            <tr>
              <th style="width:40%;">品名・内容</th>
              <th style="width:12%;text-align:center;">数量</th>
              <th style="width:12%;text-align:center;">単位</th>
              <th style="width:18%;text-align:right;">単価（円）</th>
              <th style="width:18%;text-align:right;">金額（円）</th>
              <th style="width:30px;"></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button class="btn btn-ghost" style="font-size:12px;margin-bottom:16px;" onclick="addItem()">+ 行を追加</button>

        <!-- 合計 -->
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
          <div class="totals-box" style="min-width:260px;">
            <div class="totals-row"><span>小計</span><span id="subtotalDisp">¥0</span></div>
            <div class="totals-row"><span>消費税 (<span id="taxRateDisp">10</span>%)</span><span id="taxDisp">¥0</span></div>
            <div class="totals-row total"><span>合計</span><span id="totalDisp">¥0</span></div>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:20px;">
          <label class="form-label">備考・振込先</label>
          <textarea class="form-textarea" id="invNotes" placeholder="振込先、支払条件、備考など" style="min-height:70px;"></textarea>
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button class="btn btn-ghost" onclick="closeForm()">キャンセル</button>
          <button class="btn btn-ghost" onclick="printInvoice()">🖨 印刷</button>
          <button class="btn btn-primary" id="invSaveBtn">保存</button>
        </div>
      </div>

      <!-- フィルターバー -->
      <div class="filter-bar no-print">
        <button class="seg-btn active" data-type="" onclick="setType('',this)">すべて</button>
        <button class="seg-btn" data-type="quote"   onclick="setType('quote',this)">見積書</button>
        <button class="seg-btn" data-type="invoice" onclick="setType('invoice',this)">請求書</button>
        <div style="width:1px;height:20px;background:var(--border);"></div>
        <select class="form-select" id="statusFilter" onchange="renderList()" style="font-size:12px;padding:5px 10px;width:130px;">
          <option value="">すべてのステータス</option>
          <option value="draft">下書き</option>
          <option value="sent">送付済み</option>
          <option value="accepted">承認済み</option>
          <option value="paid">入金済み</option>
          <option value="cancelled">キャンセル</option>
        </select>
        <input type="text" class="search-input" id="invSearch" placeholder="顧客名・番号を検索" style="width:180px;" oninput="renderList()">
      </div>

      <!-- 一覧 -->
      <div class="card no-print" id="invListWrap">
        <div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">読み込み中...</div>
      </div>
    </div>
  </main>

<!-- 印刷エリア：body直下に置くことで印刷時に確実に表示 -->
<div class="print-area" id="printArea"></div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const STATUS_LABEL = { draft:'下書き', sent:'送付済み', accepted:'承認済み', paid:'入金済み', cancelled:'キャンセル' };
    const STATUS_CLS   = { draft:'status-draft', sent:'status-sent', accepted:'status-accepted', paid:'status-paid', cancelled:'status-cancelled' };
    const TYPE_LABEL   = { quote:'見積書', invoice:'請求書' };

    let allInvoices = [];
    let dealMap     = {};
    let currentType = '';
    let editingInv  = null;

    initPage(async () => {
      const deals = await API.deals.list();
      dealMap = {};
      const sel = document.getElementById('invDealId');
      deals.forEach(d => {
        dealMap[d.id] = d;
        const opt = document.createElement('option');
        opt.value = d.id; opt.textContent = d.company_name || d.id;
        sel.appendChild(opt);
      });
      await loadAll();
    });

    async function loadAll() {
      try {
        allInvoices = await API.invoices.list() || [];
        renderList();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    }

    function setType(t, btn) {
      currentType = t;
      document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    }

    function renderList() {
      const q      = (document.getElementById('invSearch').value||'').toLowerCase();
      const status = document.getElementById('statusFilter').value;
      const items  = allInvoices.filter(inv => {
        if (currentType && inv.type !== currentType) return false;
        if (status && inv.status !== status) return false;
        if (q && !inv.number?.toLowerCase().includes(q) && !(inv.customer_name||'').toLowerCase().includes(q)) return false;
        return true;
      });

      if (!items.length) {
        document.getElementById('invListWrap').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">データがありません</div>';
        return;
      }

      const rows = items.map(inv => {
        const deal = dealMap[inv.deal_id];
        return `
          <tr>
            <td><span class="inv-number">${escHtml(inv.number||'—')}</span></td>
            <td>${escHtml(TYPE_LABEL[inv.type]||inv.type)}</td>
            <td class="inv-company">${escHtml(inv.customer_name||'—')}</td>
            <td>${deal ? `<a href="/deals/detail.html?id=${deal.id}" style="color:var(--accent);font-size:11px;font-weight:600;">${escHtml(deal.company_name)}</a>` : '—'}</td>
            <td>${inv.issued_date||'—'}</td>
            <td>${inv.due_date||'—'}</td>
            <td class="inv-amount">¥${fmt(inv.total)}</td>
            <td><span class="status-badge ${STATUS_CLS[inv.status]||''}">${STATUS_LABEL[inv.status]||inv.status}</span></td>
            <td>
              <div class="inv-actions">
                <button class="act-btn" onclick="openEdit('${inv.id}')">編集</button>
                <button class="act-btn" onclick="printById('${inv.id}')">印刷</button>
                ${inv.type==='quote' ? `<button class="act-btn" onclick="convertToInvoice('${inv.id}')">→ 請求書化</button>` : ''}
                <button class="act-btn danger" onclick="deleteInv('${inv.id}')">削除</button>
              </div>
            </td>
          </tr>`;
      }).join('');

      document.getElementById('invListWrap').innerHTML = `
        <div style="overflow-x:auto;">
          <table class="inv-table">
            <thead><tr>
              <th>番号</th><th>種別</th><th>顧客名</th><th>案件</th>
              <th>発行日</th><th>支払期限</th><th style="text-align:right;">合計金額</th>
              <th>ステータス</th><th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ===== フォーム =====
    function openForm(type) {
      editingInv = null;
      document.getElementById('editInvId').value   = '';
      document.getElementById('invType').value     = type;
      document.getElementById('formTitle').textContent = `${TYPE_LABEL[type]}を作成`;
      document.getElementById('invDealId').value   = '';
      document.getElementById('invCustomerName').value = '';
      document.getElementById('invIssuedDate').value   = new Date().toISOString().slice(0,10);
      document.getElementById('invDueDate').value      = '';
      document.getElementById('invStatus').value       = 'draft';
      document.getElementById('invTaxRate').value      = '10';
      document.getElementById('invNotes').value        = '';
      document.getElementById('itemsBody').innerHTML   = '';
      addItem(); addItem(); addItem();
      recalc();
      document.getElementById('invForm').classList.add('open');
      document.getElementById('invForm').scrollIntoView({ behavior:'smooth' });
    }

    function openEdit(id) {
      const inv = allInvoices.find(x => x.id === id);
      if (!inv) return;
      editingInv = inv;
      document.getElementById('editInvId').value   = inv.id;
      document.getElementById('invType').value     = inv.type;
      document.getElementById('formTitle').textContent = `${TYPE_LABEL[inv.type]}を編集`;
      document.getElementById('invDealId').value   = inv.deal_id  || '';
      document.getElementById('invCustomerName').value = inv.customer_name || '';
      document.getElementById('invIssuedDate').value   = inv.issued_date   || '';
      document.getElementById('invDueDate').value      = inv.due_date      || '';
      document.getElementById('invStatus').value       = inv.status        || 'draft';
      document.getElementById('invTaxRate').value      = inv.tax_rate ?? 10;
      document.getElementById('invNotes').value        = inv.notes         || '';
      document.getElementById('itemsBody').innerHTML   = '';
      (inv.items || []).forEach(it => addItem(it));
      if (!(inv.items||[]).length) addItem();
      recalc();
      document.getElementById('invForm').classList.add('open');
      document.getElementById('invForm').scrollIntoView({ behavior:'smooth' });
    }

    function closeForm() {
      document.getElementById('invForm').classList.remove('open');
      editingInv = null;
    }

    function onDealChange() {
      const dealId = document.getElementById('invDealId').value;
      if (dealId && dealMap[dealId]) {
        document.getElementById('invCustomerName').value = dealMap[dealId].company_name + ' 御中';
      }
    }

    // ===== 明細行 =====
    function addItem(item = {}) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" placeholder="フルサポ採用 初期費用" value="${escAttr(item.name||'')}" oninput="recalc()"></td>
        <td><input type="number" style="text-align:center;" value="${item.qty||1}" min="1" oninput="recalcRow(this)"></td>
        <td><input type="text" style="text-align:center;" placeholder="式" value="${escAttr(item.unit||'')}"></td>
        <td><input type="number" style="text-align:right;" value="${item.unit_price||''}" placeholder="0" oninput="recalcRow(this)"></td>
        <td><input type="number" style="text-align:right;" value="${item.amount||''}" readonly tabindex="-1"></td>
        <td><button class="del-row-btn" onclick="this.closest('tr').remove();recalc()">×</button></td>`;
      document.getElementById('itemsBody').appendChild(tr);
      recalcRow(tr.querySelector('input[type=number]'));
    }

    function recalcRow(input) {
      const tr = input.closest('tr');
      const inputs = tr.querySelectorAll('input[type=number]');
      const qty   = Number(inputs[0].value)||0;
      const price = Number(inputs[1].value)||0;
      inputs[2].value = qty * price;
      recalc();
    }

    function recalc() {
      const rows  = document.querySelectorAll('#itemsBody tr');
      let sub = 0;
      rows.forEach(tr => {
        const inputs = tr.querySelectorAll('input[type=number]');
        if (inputs.length >= 3) sub += Number(inputs[2].value)||0;
      });
      const rate = Number(document.getElementById('invTaxRate').value)||0;
      const tax  = Math.floor(sub * rate / 100);
      document.getElementById('taxRateDisp').textContent = rate;
      document.getElementById('subtotalDisp').textContent = '¥' + fmt(sub);
      document.getElementById('taxDisp').textContent      = '¥' + fmt(tax);
      document.getElementById('totalDisp').textContent    = '¥' + fmt(sub + tax);
    }

    function getItems() {
      return Array.from(document.querySelectorAll('#itemsBody tr')).map(tr => {
        const inputs = tr.querySelectorAll('input');
        const qty    = Number(tr.querySelectorAll('input[type=number]')[0]?.value)||0;
        const price  = Number(tr.querySelectorAll('input[type=number]')[1]?.value)||0;
        return {
          name:       inputs[0]?.value || '',
          qty, unit:  inputs[2]?.value || '',
          unit_price: price,
          amount:     qty * price,
        };
      }).filter(it => it.name || it.amount);
    }

    // ===== 保存 =====
    document.getElementById('invSaveBtn').addEventListener('click', async () => {
      const customerName = document.getElementById('invCustomerName').value.trim();
      if (!customerName) { Toast.error('顧客名を入力してください'); return; }
      const editId = document.getElementById('editInvId').value;
      const payload = {
        type:          document.getElementById('invType').value,
        deal_id:       document.getElementById('invDealId').value || null,
        customer_name: customerName,
        issued_date:   document.getElementById('invIssuedDate').value || null,
        due_date:      document.getElementById('invDueDate').value    || null,
        status:        document.getElementById('invStatus').value,
        tax_rate:      Number(document.getElementById('invTaxRate').value)||10,
        items:         getItems(),
        notes:         document.getElementById('invNotes').value.trim() || null,
      };
      try {
        if (editId) {
          await API.invoices.update({ id: editId, ...payload });
          await loadAll(); Toast.success('更新しました');
        } else {
          await API.invoices.create(payload);
          await loadAll(); Toast.success('作成しました');
        }
        closeForm();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    });

    // ===== 削除 =====
    async function deleteInv(id) {
      if (!confirm('この書類を削除しますか？')) return;
      try { await API.invoices.delete(id); allInvoices = allInvoices.filter(x => x.id !== id); renderList(); Toast.success('削除しました'); }
      catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ===== 見積→請求書変換 =====
    async function convertToInvoice(id) {
      if (!confirm('この見積書を請求書に変換しますか？')) return;
      const inv = allInvoices.find(x => x.id === id);
      if (!inv) return;
      try {
        await API.invoices.create({
          type:          'invoice',
          deal_id:       inv.deal_id       || null,
          customer_id:   inv.customer_id   || null,
          customer_name: inv.customer_name || null,
          status:        'draft',
          items:         inv.items         || [],
          subtotal:      inv.subtotal      || 0,
          tax_rate:      inv.tax_rate      ?? 10,
          tax_amount:    inv.tax_amount    || 0,
          total:         inv.total         || 0,
          issued_date:   new Date().toISOString().slice(0, 10),
          due_date:      inv.due_date      || null,
          notes:         inv.notes         || null,
        });
        await loadAll();
        Toast.success('請求書を作成しました');
      } catch(e) {
        console.error(e);
        Toast.error('変換エラー: ' + e.message);
      }
    }

    // ===== 印刷 =====
    function printInvoice() {
      const type    = document.getElementById('invType').value;
      const name    = document.getElementById('invCustomerName').value;
      const issued  = document.getElementById('invIssuedDate').value;
      const due     = document.getElementById('invDueDate').value;
      const notes   = document.getElementById('invNotes').value;
      const taxRate = Number(document.getElementById('invTaxRate').value)||10;
      const items   = getItems();
      const sub     = items.reduce((s,it) => s + it.amount, 0);
      const tax     = Math.floor(sub * taxRate / 100);
      openPrintWindow({ type, customer_name: name, issued_date: issued, due_date: due, notes, items, subtotal: sub, tax_amount: tax, total: sub + tax, tax_rate: taxRate });
    }

    async function printById(id) {
      const inv = allInvoices.find(x => x.id === id) || await API.invoices.get(id);
      openPrintWindow(inv);
    }

    function openPrintWindow(inv) {
      const typeLabel = TYPE_LABEL[inv.type] || inv.type;
      const itemRows = (inv.items||[]).map(it => `
        <tr><td>${escHtml(it.name)}</td><td style="text-align:center;">${it.qty}</td>
        <td style="text-align:center;">${escHtml(it.unit||'')}</td>
        <td style="text-align:right;">¥${fmt(it.unit_price)}</td>
        <td style="text-align:right;">¥${fmt(it.amount)}</td></tr>`).join('');

      const html = `<!DOCTYPE html><html lang="ja"><head>
        <meta charset="UTF-8">
        <title>${typeLabel} | アスナロ SFA</title>
        <style>
          * { box-sizing:border-box; margin:0; padding:0; }
          body { font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; font-size:13px; color:#1e293b; padding:40px; }
          .header { display:flex; justify-content:space-between; margin-bottom:28px; }
          .doc-title { font-size:28px; font-weight:900; color:#1e3a5f; }
          .doc-number { font-size:13px; color:#64748b; margin-top:4px; }
          .from { text-align:right; font-size:12px; color:#475569; line-height:1.8; }
          .from-name { font-weight:700; font-size:14px; color:#1e3a5f; }
          .to { margin-bottom:24px; }
          .to-name { font-size:16px; font-weight:700; border-bottom:2px solid #1e3a5f; padding-bottom:4px; display:inline-block; margin-bottom:8px; }
          .amount-large { font-size:24px; font-weight:900; color:#1e3a5f; margin-top:6px; }
          table.items { width:100%; border-collapse:collapse; margin:20px 0; font-size:12px; }
          table.items th { background:#1e3a5f; color:#fff; padding:7px 10px; text-align:left; }
          table.items td { padding:7px 10px; border-bottom:1px solid #e2e8f0; }
          table.items tr:nth-child(even) td { background:#f8fafc; }
          .totals { text-align:right; margin-top:8px; }
          .totals table { margin-left:auto; font-size:13px; border-collapse:collapse; }
          .totals td { padding:4px 12px; }
          .totals .grand td { font-weight:900; font-size:16px; color:#1e3a5f; border-top:2px solid #1e3a5f; padding-top:8px; }
          .notes { margin-top:28px; font-size:12px; color:#475569; white-space:pre-wrap; border-top:1px solid #e2e8f0; padding-top:16px; }
        </style>
      </head><body>
        <div class="header">
          <div>
            <div class="doc-title">${typeLabel}</div>
            ${inv.number ? `<div class="doc-number">${escHtml(inv.number)}</div>` : ''}
          </div>
          <div class="from">
            <div class="from-name">株式会社アスナロ</div>
            <div>〒530-0001 大阪府大阪市北区梅田1丁目</div>
            <div>TEL: 06-XXXX-XXXX</div>
            <div>発行日: ${inv.issued_date||''}</div>
            ${inv.due_date ? `<div>支払期限: ${inv.due_date}</div>` : ''}
          </div>
        </div>
        <div class="to">
          <div class="to-name">${escHtml(inv.customer_name||'')} 御中</div>
          <div style="font-size:13px;color:#475569;">下記の通りご請求申し上げます。</div>
          <div class="amount-large">合計金額: ¥${fmt(inv.total)}</div>
        </div>
        <table class="items">
          <thead><tr>
            <th style="width:40%;">品名・内容</th>
            <th style="width:10%;text-align:center;">数量</th>
            <th style="width:8%;text-align:center;">単位</th>
            <th style="width:20%;text-align:right;">単価</th>
            <th style="width:22%;text-align:right;">金額</th>
          </tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        <div class="totals">
          <table>
            <tr><td>小計</td><td style="text-align:right;">¥${fmt(inv.subtotal)}</td></tr>
            <tr><td>消費税 (${inv.tax_rate||10}%)</td><td style="text-align:right;">¥${fmt(inv.tax_amount)}</td></tr>
            <tr class="grand"><td>合計</td><td style="text-align:right;">¥${fmt(inv.total)}</td></tr>
          </table>
        </div>
        ${inv.notes ? `<div class="notes"><strong>備考</strong>\n${escHtml(inv.notes)}</div>` : ''}
        <script>window.onload = function(){ window.print(); }<\/script>
      </body></html>`;

      const win = window.open('', '_blank', 'width=900,height=700');
      win.document.write(html);
      win.document.close();
    }

    function fmt(n) { return Number(n||0).toLocaleString('ja'); }
    function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
