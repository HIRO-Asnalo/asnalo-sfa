<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客詳細 | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">ASNALO SFA</div><div class="logo-sub">営業管理システム</div></div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>ダッシュボード</a>
      <a href="/deals/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>案件管理</a>
      <a href="/customers/index.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>顧客管理</a>
      <a href="/ma/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>MAメール</a>
      <a href="/prospects/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><path d="M11 8v6M8 11h6"/></svg>新規開拓リサーチ</a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>フィールド設定</a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="/customers/index.html" style="color:var(--text-muted);text-decoration:none;font-size:13px;">← 顧客一覧</a>
        <h1 class="page-title" id="pageTitle">顧客詳細</h1>
        <span id="csStatusBadge"></span>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost btn-sm" id="aiAnalysisBtn">🤖 CS分析</button>
        <button class="btn btn-ghost btn-sm" id="aiRenewalBtn">🤖 更新提案メール</button>
        <button class="btn btn-ghost btn-sm" id="maEnrollBtn">📧 MAシナリオ登録</button>
        <button class="btn btn-danger btn-sm" id="deleteBtn">削除</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>

    <div class="page-body">
      <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;">

        <!-- 左: タブ付きフォーム -->
        <div>
          <div class="tabs" style="margin-bottom:14px;">
            <button class="tab-btn active" onclick="switchTab('base',this)">基本情報</button>
            <button class="tab-btn"        onclick="switchTab('sales',this)">セールス</button>
            <button class="tab-btn"        onclick="switchTab('cs',this)">CS管理</button>
            <button class="tab-btn"        onclick="switchTab('deals',this)">関連案件</button>
          </div>

          <!-- 基本情報タブ -->
          <div id="tab-base" class="card">
            <div class="card-title">基本情報</div>
            <div class="form-grid">
              <div class="form-group form-full">
                <label class="form-label">企業名 <span class="required">*</span></label>
                <input type="text" class="form-input" id="company_name">
              </div>
              <div class="form-group">
                <label class="form-label">業種</label>
                <select class="form-select" id="industry">
                  <option value="">選択</option>
                  <option>IT・通信</option><option>製造</option><option>小売・流通</option>
                  <option>金融・保険</option><option>医療・福祉</option><option>建設・不動産</option>
                  <option>サービス</option><option>教育</option><option>その他</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">従業員数</label>
                <input type="text" class="form-input" id="employee_count">
              </div>
              <div class="form-group">
                <label class="form-label">電話番号</label>
                <input type="text" class="form-input" id="phone">
              </div>
              <div class="form-group">
                <label class="form-label">Webサイト</label>
                <input type="url" class="form-input" id="website" placeholder="https://">
              </div>
              <div class="form-group form-full">
                <label class="form-label">住所</label>
                <input type="text" class="form-input" id="address">
              </div>
              <div class="form-group form-full">
                <label class="form-label">備考</label>
                <textarea class="form-textarea" id="notes"></textarea>
              </div>
            </div>
          </div>

          <!-- セールスタブ -->
          <div id="tab-sales" class="card hidden">
            <div class="card-title">セールス情報</div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">担当者名（先方）</label>
                <input type="text" class="form-input" id="contact_name">
              </div>
              <div class="form-group">
                <label class="form-label">担当者メール</label>
                <input type="email" class="form-input" id="contact_email">
              </div>
              <div class="form-group">
                <label class="form-label">担当者電話</label>
                <input type="text" class="form-input" id="contact_phone">
              </div>
              <div class="form-group">
                <label class="form-label">契約種別</label>
                <select class="form-select" id="contract_type">
                  <option value="">選択</option>
                  <option>フルサポ採用</option>
                  <option>CLUTCH Agent</option>
                  <option>その他</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">契約日</label>
                <input type="date" class="form-input" id="contract_date">
              </div>
              <div class="form-group">
                <label class="form-label">契約金額（円）</label>
                <input type="number" class="form-input" id="contract_amount" placeholder="0">
              </div>
              <div class="form-group">
                <label class="form-label">アップセル状況</label>
                <select class="form-select" id="upsell_status">
                  <option value="">選択</option>
                  <option>未検討</option><option>検討中</option><option>提案済み</option><option>受注</option>
                </select>
              </div>
              <div class="form-group form-full">
                <label class="form-label">アップセルメモ</label>
                <textarea class="form-textarea" id="upsell_notes" style="min-height:70px;"></textarea>
              </div>
              <div class="form-group form-full">
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;">
                  <input type="checkbox" id="ma_subscribed">
                  MAリスト（ステップメール対象）に追加
                </label>
              </div>
            </div>
          </div>

          <!-- CSタブ -->
          <div id="tab-cs" class="hidden">

            <!-- 契約情報 -->
            <div class="card" style="margin-bottom:14px;">
              <div class="card-title">契約情報</div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">区分</label>
                  <select class="form-select" id="segment">
                    <option value="">選択</option>
                    <option>新規</option><option>継続</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">稼働状況</label>
                  <select class="form-select" id="operation_status">
                    <option value="">選択</option>
                    <option>稼働中</option><option>稼働停止</option><option>これから</option><option>稼働なし</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">契約サービス</label>
                  <select class="form-select" id="service_name">
                    <option value="">選択</option>
                    <option>フルサポ採用</option><option>DR運用代行</option><option>CLUTCH Agent</option><option>その他</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">CS担当</label>
                  <input type="text" class="form-input" id="cs_rep">
                </div>
                <div class="form-group">
                  <label class="form-label">契約開始日</label>
                  <input type="date" class="form-input" id="contract_start_date">
                </div>
                <div class="form-group">
                  <label class="form-label">契約終了日</label>
                  <input type="date" class="form-input" id="contract_end_date">
                </div>
                <div class="form-group">
                  <label class="form-label">決算月</label>
                  <select class="form-select" id="fiscal_month">
                    <option value="">選択</option>
                    <option>1月</option><option>2月</option><option>3月</option><option>4月</option>
                    <option>5月</option><option>6月</option><option>7月</option><option>8月</option>
                    <option>9月</option><option>10月</option><option>11月</option><option>12月</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">CSステータス</label>
                  <select class="form-select" id="cs_status">
                    <option value="">選択</option>
                    <option>オンボーディング中</option><option>アクティブ</option>
                    <option>更新交渉中</option><option>解約リスク</option><option>解約済み</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 顧客コンディション -->
            <div class="card" style="margin-bottom:14px;">
              <div class="card-title">顧客コンディション</div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">キーパーソン名</label>
                  <input type="text" class="form-input" id="key_person">
                </div>
                <div class="form-group">
                  <label class="form-label">役割・人物像</label>
                  <input type="text" class="form-input" id="key_person_role">
                </div>
                <div class="form-group">
                  <label class="form-label">キーパーソンニーズ</label>
                  <select class="form-select" id="key_person_needs">
                    <option value="">選択</option>
                    <option>安定感・安心感</option><option>成長</option><option>貢献</option>
                    <option>繋がり</option><option>不安定感・不確実感</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">関係性</label>
                  <select class="form-select" id="relationship">
                    <option value="">選択</option>
                    <option>とても良い</option><option>良い</option><option>どちらとも言えない</option><option>悪い</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">成果</label>
                  <select class="form-select" id="performance">
                    <option value="">選択</option>
                    <option>とても良い</option><option>良い</option><option>どちらとも言えない</option><option>悪い</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">最新接触日</label>
                  <input type="date" class="form-input" id="last_contact_date">
                </div>
                <div class="form-group form-full">
                  <label class="form-label">コンディション詳細</label>
                  <textarea class="form-textarea" id="condition_detail" style="min-height:80px;"></textarea>
                </div>
                <div class="form-group form-full">
                  <label class="form-label">最新接触内容</label>
                  <textarea class="form-textarea" id="last_contact_content" style="min-height:60px;"></textarea>
                </div>
              </div>
            </div>

            <!-- ネクストアクション -->
            <div class="card" style="margin-bottom:14px;">
              <div class="card-title">Closed won に向けたアクション</div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">来期提案時期</label>
                  <input type="text" class="form-input" id="next_proposal_timing" placeholder="例: 3月">
                </div>
                <div class="form-group form-full">
                  <label class="form-label">来期提案内容</label>
                  <textarea class="form-textarea" id="next_proposal_content" style="min-height:60px;"></textarea>
                </div>
                <div class="form-group form-full">
                  <label class="form-label">アップセルに向けたストーリー</label>
                  <textarea class="form-textarea" id="upsell_story" style="min-height:60px;"></textarea>
                </div>
              </div>
              <!-- アクション①〜③ -->
              <div style="margin-top:14px;">
                <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px;">アクション①</div>
                <div class="form-grid">
                  <div class="form-group"><label class="form-label">項目</label><input type="text" class="form-input" id="action1_item"></div>
                  <div class="form-group"><label class="form-label">期日</label><input type="date" class="form-input" id="action1_due"></div>
                  <div class="form-group form-full"><label class="form-label">詳細</label><textarea class="form-textarea" id="action1_detail" style="min-height:55px;"></textarea></div>
                </div>
                <div style="font-size:12px;font-weight:700;color:var(--primary);margin:10px 0;">アクション②</div>
                <div class="form-grid">
                  <div class="form-group"><label class="form-label">項目</label><input type="text" class="form-input" id="action2_item"></div>
                  <div class="form-group"><label class="form-label">期日</label><input type="date" class="form-input" id="action2_due"></div>
                  <div class="form-group form-full"><label class="form-label">詳細</label><textarea class="form-textarea" id="action2_detail" style="min-height:55px;"></textarea></div>
                </div>
                <div style="font-size:12px;font-weight:700;color:var(--primary);margin:10px 0;">アクション③</div>
                <div class="form-grid">
                  <div class="form-group"><label class="form-label">項目</label><input type="text" class="form-input" id="action3_item"></div>
                  <div class="form-group"><label class="form-label">期日</label><input type="date" class="form-input" id="action3_due"></div>
                  <div class="form-group form-full"><label class="form-label">詳細</label><textarea class="form-textarea" id="action3_detail" style="min-height:55px;"></textarea></div>
                </div>
              </div>
            </div>

            <!-- その他CS -->
            <div class="card">
              <div class="card-title">その他</div>
              <div class="form-grid">
                <div class="form-group">
                  <label class="form-label">チャーンリスク</label>
                  <select class="form-select" id="churn_risk">
                    <option value="">選択</option>
                    <option>低</option><option>中</option><option>高</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">更新フラグ</label>
                  <select class="form-select" id="renewal_flag">
                    <option value="">選択</option>
                    <option>更新予定</option><option>要フォロー</option><option>解約予定</option>
                  </select>
                </div>
                <div class="form-group form-full">
                  <label class="form-label">サポートメモ</label>
                  <textarea class="form-textarea" id="support_notes" style="min-height:70px;"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- 関連案件タブ -->
          <div id="tab-deals" class="card hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
              <div class="card-title" style="margin-bottom:0;">関連案件</div>
              <a id="newDealLink" href="/deals/detail.html?new=1" class="btn btn-primary btn-sm">
                <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;margin-right:4px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新規案件
              </a>
            </div>
            <div id="relatedDealsList"><div class="empty-state"><div class="empty-state-sub">関連案件なし</div></div></div>
          </div>
        </div>

        <!-- 右: タスク + 活動履歴 -->
        <div style="display:flex;flex-direction:column;gap:16px;">

          <!-- ネクストアクション -->
          <div class="card">
            <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
              <span>ネクストアクション</span>
              <button class="btn btn-secondary btn-sm" id="addTaskToggleBtn">+ 追加</button>
            </div>
            <div id="taskAddForm" style="display:none;margin-bottom:14px;padding:12px;background:var(--bg);border-radius:8px;">
              <div class="form-group" style="margin-bottom:8px;">
                <textarea class="form-textarea" id="taskContent" placeholder="アクション内容..." style="min-height:60px;"></textarea>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label" style="font-size:11px;">期日</label>
                  <input type="date" class="form-input" id="taskDueDate">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label" style="font-size:11px;">担当者</label>
                  <input type="text" class="form-input" id="taskAssignedTo" placeholder="メールアドレス">
                </div>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-primary btn-sm" id="saveTaskBtn">保存</button>
                <button class="btn btn-ghost btn-sm" id="cancelTaskBtn">キャンセル</button>
              </div>
            </div>
            <div id="taskList">
              <div style="text-align:center;font-size:12px;color:var(--text-muted);padding:12px;">タスクなし</div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">活動履歴</div>
            <div style="margin-bottom:12px;">
              <select class="form-select" id="activityType" style="margin-bottom:6px;">
                <option>メモ</option><option>電話</option><option>訪問</option><option>メール</option><option>商談</option>
              </select>
              <textarea class="form-textarea" id="activityContent" placeholder="内容..." style="min-height:60px;margin-bottom:6px;"></textarea>
              <button class="btn btn-secondary btn-sm w-full" id="addActivityBtn">追加</button>
            </div>
            <div id="activityList"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- MAシナリオ登録モーダル -->
  <div id="maEnrollModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;width:420px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.18);">
      <div style="font-size:15px;font-weight:800;color:var(--primary);margin-bottom:18px;">📧 MAシナリオに登録</div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label">シナリオを選択</label>
        <select class="form-select" id="maSeqSelect"><option value="">読み込み中...</option></select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeMAEnrollModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="enrollToMA()">登録する</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const customerId = getParam('id');
    let customer = {};

    const CS_COLOR = { 'アクティブ':'badge-green','オンボーディング中':'badge-blue','更新交渉中':'badge-yellow','解約リスク':'badge-red','解約済み':'badge-gray' };

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['base','sales','cs','deals'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
      });
      if (tab === 'deals') loadRelatedDeals();
    }

    async function loadRelatedDeals() {
      const el = document.getElementById('relatedDealsList');
      try {
        const allDeals = await API.deals.list();
        const related = allDeals.filter(d =>
          d.customer_id === customerId ||
          (customer.company_name && d.company_name === customer.company_name)
        );
        if (!related.length) {
          el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px;">関連する案件がありません</div>';
          return;
        }
        el.innerHTML = related.map(d => `
          <a href="/deals/detail.html?id=${d.id}" style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9;text-decoration:none;color:inherit;">
            <div style="flex:1;min-width:0;">
              <div style="font-weight:600;font-size:13px;color:var(--primary);">${d.deal_name || '（無題）'}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${d.assigned_user || '—'} ・ 更新: ${fmtDate(d.updated_at)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
              ${phaseBadge(d.phase)}
              ${d.expected_amount ? `<span style="font-size:12px;font-weight:700;color:var(--primary);">¥${Number(d.expected_amount).toLocaleString()}</span>` : ''}
            </div>
          </a>
        `).join('');
      } catch(e) {
        el.innerHTML = `<div style="color:var(--danger);font-size:12px;">取得エラー: ${e.message}</div>`;
      }
    }

    initPage(async () => {
      if (!customerId) { location.href = '/customers/index.html'; return; }
      Loading.show();
      try {
        customer = await API.customers.get(customerId);
        document.getElementById('pageTitle').textContent = customer.company_name;
        if (customer.cs_status) {
          document.getElementById('csStatusBadge').innerHTML = `<span class="badge ${CS_COLOR[customer.cs_status]||'badge-gray'}">${customer.cs_status}</span>`;
        }

        // 基本
        ['company_name','industry','employee_count','phone','website','address','notes'].forEach(k => {
          const el = document.getElementById(k);
          if (el) { if (el.tagName === 'SELECT') el.value = customer[k]||''; else el.value = customer[k]||''; }
        });

        // セールス
        ['contact_name','contact_email','contact_phone','contract_type','contract_date','contract_amount','upsell_status','upsell_notes'].forEach(k => {
          const el = document.getElementById(k);
          if (el) { if (el.tagName === 'SELECT') el.value = customer[k]||''; else el.value = customer[k]||''; }
        });
        document.getElementById('ma_subscribed').checked = customer.ma_subscribed === 'true';

        // CS
        ['cs_rep','cs_status','segment','operation_status','service_name','contract_start_date','contract_end_date',
         'fiscal_month','key_person','key_person_role','key_person_needs','relationship','performance',
         'last_contact_date','condition_detail','last_contact_content',
         'next_proposal_timing','next_proposal_content','upsell_story',
         'action1_item','action1_detail','action1_due','action2_item','action2_detail','action2_due',
         'action3_item','action3_detail','action3_due','churn_risk','renewal_flag','support_notes'
        ].forEach(k => {
          const el = document.getElementById(k);
          if (el) { if (el.tagName === 'SELECT') el.value = customer[k]||''; else el.value = customer[k]||''; }
        });

        // 活動履歴 + タスク
        const activities = await API.activities.listByCustomer(customerId);
        renderTasks(activities);
        renderActivities(activities.filter(a => !a.is_task));

      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    });

    // ===== ネクストアクション（タスク） =====
    document.getElementById('addTaskToggleBtn').addEventListener('click', () => {
      const form = document.getElementById('taskAddForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        const user = netlifyIdentity.currentUser();
        if (user?.email) document.getElementById('taskAssignedTo').value = user.email;
      }
    });
    document.getElementById('cancelTaskBtn').addEventListener('click', () => {
      document.getElementById('taskAddForm').style.display = 'none';
    });
    document.getElementById('saveTaskBtn').addEventListener('click', async () => {
      const content = document.getElementById('taskContent').value.trim();
      if (!content) { Toast.error('内容を入力してください'); return; }
      try {
        await API.activities.create({
          customer_id: customerId,
          is_task:     true,
          type:        'タスク',
          content,
          due_date:    document.getElementById('taskDueDate').value || null,
          assigned_to: document.getElementById('taskAssignedTo').value.trim() || null,
          status:      'pending',
        });
        document.getElementById('taskContent').value = '';
        document.getElementById('taskDueDate').value = '';
        document.getElementById('taskAddForm').style.display = 'none';
        Toast.success('タスクを追加しました');
        reloadAll();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    });

    async function reloadAll() {
      const all = await API.activities.listByCustomer(customerId);
      renderTasks(all);
      renderActivities(all.filter(a => !a.is_task));
    }

    async function toggleTaskDone(id, currentStatus) {
      try {
        await API.activities.update({ id, status: currentStatus === 'done' ? 'pending' : 'done' });
        reloadAll();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    }

    async function deleteTask(id) {
      if (!confirm('このタスクを削除しますか？')) return;
      try {
        await API.activities.delete(id);
        reloadAll();
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    function renderTasks(items) {
      const el = document.getElementById('taskList');
      const tasks = items.filter(a => a.is_task);
      if (!tasks.length) {
        el.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:12px;">タスクなし</div>';
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      el.innerHTML = tasks.map(t => {
        const done = t.status === 'done';
        const overdue = t.due_date && t.due_date < today && !done;
        const dueColor = overdue ? '#ef4444' : (t.due_date === today ? '#f59e0b' : 'var(--text-muted)');
        return `
          <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
            <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleTaskDone('${t.id}','${t.status}')"
              style="margin-top:3px;cursor:pointer;width:15px;height:15px;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;${done ? 'text-decoration:line-through;opacity:.5;' : ''}">${t.content}</div>
              <div style="font-size:11px;color:${dueColor};margin-top:3px;">
                ${t.due_date ? (overdue ? '⚠️ 期限超過: ' : '期日: ') + fmtDate(t.due_date) : '期日なし'}
                ${t.assigned_to ? ' ・ ' + t.assigned_to : ''}
              </div>
            </div>
            <button onclick="deleteTask('${t.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0 2px;flex-shrink:0;">×</button>
          </div>`;
      }).join('');
    }

    function renderActivities(activities) {
      const el = document.getElementById('activityList');
      if (!activities?.length) {
        el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">活動記録なし</div>';
        return;
      }
      const typeIcon = { '電話':'📞','訪問':'🏢','メール':'📧','商談':'💼','メモ':'📝' };
      el.innerHTML = activities.slice(0,10).map(a => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="font-size:11px;color:var(--text-muted);">${typeIcon[a.type]||'📝'} ${a.type} · ${fmtDate(a.activity_date)}</div>
          <div style="font-size:13px;margin-top:2px;">${a.content}</div>
        </div>
      `).join('');
    }

    // 保存
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const company_name = document.getElementById('company_name').value.trim();
      if (!company_name) { Toast.error('企業名を入力してください'); return; }
      Loading.show();
      try {
        const data = { id: customerId, company_name };
        ['industry','employee_count','phone','website','address','notes',
         'contact_name','contact_email','contact_phone','contract_type','contract_date',
         'contract_amount','upsell_status','upsell_notes',
         'cs_rep','cs_status','segment','operation_status','service_name','contract_start_date','contract_end_date',
         'fiscal_month','key_person','key_person_role','key_person_needs','relationship','performance',
         'last_contact_date','condition_detail','last_contact_content',
         'next_proposal_timing','next_proposal_content','upsell_story',
         'action1_item','action1_detail','action1_due','action2_item','action2_detail','action2_due',
         'action3_item','action3_detail','action3_due','churn_risk','renewal_flag','support_notes'
        ].forEach(k => {
          const el = document.getElementById(k);
          if (el) data[k] = el.value;
        });
        data.ma_subscribed = document.getElementById('ma_subscribed').checked ? 'true' : 'false';

        await API.customers.update(data);
        document.getElementById('pageTitle').textContent = company_name;
        if (data.cs_status) {
          document.getElementById('csStatusBadge').innerHTML = `<span class="badge ${CS_COLOR[data.cs_status]||'badge-gray'}">${data.cs_status}</span>`;
        }
        Toast.success('保存しました');
      } catch(e) {
        Toast.error('保存エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    });

    // 削除
    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!confirm('この顧客を削除しますか？')) return;
      try {
        await API.customers.delete(customerId);
        location.href = '/customers/index.html';
      } catch(e) {
        Toast.error('削除エラー: ' + e.message);
      }
    });

    // ===== AI モーダル =====
    function showAiModal(title, text) {
      const existing = document.getElementById('aiModal');
      if (existing) existing.remove();
      const modal = document.createElement('div');
      modal.id = 'aiModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = `
        <div style="background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);">
          <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:15px;font-weight:800;color:var(--primary);">🤖 ${title}</div>
            <button onclick="document.getElementById('aiModal').remove()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);">×</button>
          </div>
          <div style="padding:24px;overflow-y:auto;flex:1;">
            <div id="aiModalContent" style="font-size:13.5px;line-height:1.8;white-space:pre-wrap;color:var(--text);">${text}</div>
          </div>
          <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;">
            <button onclick="navigator.clipboard.writeText(document.getElementById('aiModalContent').textContent).then(()=>Toast.success('コピーしました'))" class="btn btn-secondary btn-sm">コピー</button>
            <button onclick="document.getElementById('aiModal').remove()" class="btn btn-primary btn-sm">閉じる</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    function collectCustomerData() {
      const data = { ...customer };
      ['company_name','industry','employee_count','phone','website','address','notes',
       'contact_name','contact_email','contact_phone','contract_type','contract_date','contract_amount',
       'upsell_status','upsell_notes','cs_rep','cs_status','segment','operation_status','service_name',
       'contract_start_date','contract_end_date','fiscal_month','key_person','key_person_role',
       'key_person_needs','relationship','performance','last_contact_date','condition_detail',
       'last_contact_content','next_proposal_timing','next_proposal_content','upsell_story',
       'action1_item','action1_detail','action1_due','action2_item','action2_detail','action2_due',
       'action3_item','action3_detail','action3_due','churn_risk','renewal_flag','support_notes'
      ].forEach(k => { const el = document.getElementById(k); if (el) data[k] = el.value; });
      return data;
    }

    async function runAi(type, title) {
      const data = collectCustomerData();
      Loading.show();
      try {
        const res = await API.ai.generate(type, data);
        showAiModal(title, res.text);
      } catch(e) {
        Toast.error('AI生成エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    }

    document.getElementById('aiAnalysisBtn').addEventListener('click', () => runAi('cs_analysis', 'CS分析レポート'));
    document.getElementById('aiRenewalBtn').addEventListener('click',   () => runAi('cs_renewal',  '更新提案メール'));

    // ===== MAシナリオ登録 =====
    document.getElementById('maEnrollBtn').addEventListener('click', async () => {
      const modal = document.getElementById('maEnrollModal');
      modal.style.display = 'flex';
      const sel = document.getElementById('maSeqSelect');
      sel.innerHTML = '<option value="">読み込み中...</option>';
      try {
        const seqs = await API.ma.listSequences();
        if (!seqs.length) {
          sel.innerHTML = '<option value="">シナリオがありません</option>';
        } else {
          sel.innerHTML = seqs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
      } catch(e) {
        sel.innerHTML = '<option value="">取得エラー</option>';
        Toast.error('シナリオ取得エラー: ' + e.message);
      }
    });

    function closeMAEnrollModal() {
      document.getElementById('maEnrollModal').style.display = 'none';
    }

    async function enrollToMA() {
      const seq_id = document.getElementById('maSeqSelect').value;
      if (!seq_id) { Toast.error('シナリオを選択してください'); return; }
      Loading.show();
      try {
        await API.ma.enroll(seq_id, customerId);
        Toast.success('MAシナリオに登録しました');
        closeMAEnrollModal();
        document.getElementById('ma_subscribed').checked = true;
      } catch(e) {
        Toast.error('登録エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    }

    // 活動追加
    document.getElementById('addActivityBtn').addEventListener('click', async () => {
      const content = document.getElementById('activityContent').value.trim();
      if (!content) { Toast.error('内容を入力してください'); return; }
      try {
        await API.activities.create({
          customer_id: customerId,
          type: document.getElementById('activityType').value,
          content,
          activity_date: new Date().toISOString().slice(0,10),
        });
        document.getElementById('activityContent').value = '';
        Toast.success('活動を追加しました');
        reloadAll();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    });
  </script>
</body>
</html>
