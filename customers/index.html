<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客管理（契約後CRM）| アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">ASNALO SFA</div><div class="logo-sub">営業管理システム</div></div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>ダッシュボード</a>
      <a href="/deals/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>案件管理</a>
      <a href="/customers/index.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>顧客管理</a>
      <a href="/ma/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>MAメール</a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>フィールド設定</a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">顧客管理</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">契約済みクライアントのCRM管理</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openNewModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新規顧客登録
        </button>
      </div>
    </div>

    <div class="page-body">

      <!-- タブ + フィルター -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
        <div class="tabs" style="margin-bottom:0;">
          <button class="tab-btn active" data-view="all"   onclick="switchView('all',this)">すべて</button>
          <button class="tab-btn"        data-view="sales" onclick="switchView('sales',this)">セールス</button>
          <button class="tab-btn"        data-view="cs"    onclick="switchView('cs',this)">CS</button>
        </div>
        <div class="filter-bar" style="margin-bottom:0;">
          <input type="text" class="search-input" id="searchInput" placeholder="企業名で検索">
          <select class="form-select" id="csStatusFilter" style="width:140px;">
            <option value="">CSステータス: すべて</option>
            <option>アクティブ</option>
            <option>オンボーディング中</option>
            <option>更新交渉中</option>
            <option>解約リスク</option>
            <option>解約済み</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <!-- すべてビュー -->
          <table id="tableAll">
            <thead>
              <tr>
                <th>企業名</th>
                <th>業種</th>
                <th>CSステータス</th>
                <th>担当者</th>
                <th>チャーンリスク</th>
                <th>契約日</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodyAll"></tbody>
          </table>

          <!-- セールスビュー -->
          <table id="tableSales" style="display:none;">
            <thead>
              <tr>
                <th>企業名</th>
                <th>担当者</th>
                <th>契約種別</th>
                <th>契約金額</th>
                <th>アップセル状況</th>
                <th>MAリスト</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodySales"></tbody>
          </table>

          <!-- CSビュー -->
          <table id="tableCS" style="display:none;">
            <thead>
              <tr>
                <th>企業名</th>
                <th>CSステータス</th>
                <th>オンボーディング</th>
                <th>満足度</th>
                <th>チャーンリスク</th>
                <th>CS担当</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodyCS"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- 新規顧客モーダル -->
  <div class="modal-overlay hidden" id="newModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新規顧客登録</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group form-full">
            <label class="form-label">企業名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="new_company_name" placeholder="株式会社〇〇">
          </div>
          <div class="form-group">
            <label class="form-label">業種</label>
            <select class="form-select" id="new_industry">
              <option value="">選択</option>
              <option>IT・通信</option><option>製造</option><option>小売・流通</option>
              <option>金融・保険</option><option>医療・福祉</option><option>建設・不動産</option>
              <option>サービス</option><option>教育</option><option>その他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">従業員数</label>
            <input type="text" class="form-input" id="new_employee_count" placeholder="50名">
          </div>
          <div class="form-group">
            <label class="form-label">担当者名（先方）</label>
            <input type="text" class="form-input" id="new_contact_name">
          </div>
          <div class="form-group">
            <label class="form-label">担当者メール</label>
            <input type="email" class="form-input" id="new_contact_email">
          </div>
          <div class="form-group">
            <label class="form-label">契約種別</label>
            <select class="form-select" id="new_contract_type">
              <option value="">選択</option>
              <option>フルサポ採用</option>
              <option>CLUTCH Agent</option>
              <option>その他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">契約日</label>
            <input type="date" class="form-input" id="new_contract_date">
          </div>
          <div class="form-group">
            <label class="form-label">CS担当</label>
            <input type="text" class="form-input" id="new_cs_rep">
          </div>
          <div class="form-group">
            <label class="form-label">CSステータス</label>
            <select class="form-select" id="new_cs_status">
              <option value="">選択</option>
              <option>オンボーディング中</option>
              <option>アクティブ</option>
              <option>更新交渉中</option>
              <option>解約リスク</option>
              <option>解約済み</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">オンボーディング</label>
            <select class="form-select" id="new_onboarding_status">
              <option value="">選択</option>
              <option>未開始</option>
              <option>進行中</option>
              <option>完了</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="createCustomer()">登録する</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let allCustomers = [];
    let currentView  = 'all';

    initPage(async () => {
      try {
        allCustomers = await API.customers.list();
        renderAll();
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    document.getElementById('searchInput').addEventListener('input', renderAll);
    document.getElementById('csStatusFilter').addEventListener('change', renderAll);

    function switchView(view, btn) {
      currentView = view;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    }

    function getFiltered() {
      const q  = document.getElementById('searchInput').value.toLowerCase();
      const cs = document.getElementById('csStatusFilter').value;
      return allCustomers.filter(c => {
        if (q && !c.company_name?.toLowerCase().includes(q)) return false;
        if (cs && c.cs_status !== cs) return false;
        return true;
      });
    }

    const CHURN_COLOR = { '低': 'badge-green', '中': 'badge-yellow', '高': 'badge-red' };
    const CS_COLOR    = { 'アクティブ': 'badge-green', 'オンボーディング中': 'badge-blue', '更新交渉中': 'badge-yellow', '解約リスク': 'badge-red', '解約済み': 'badge-gray' };
    const UPSELL_COLOR = { '未検討': 'badge-gray', '検討中': 'badge-blue', '提案済み': 'badge-yellow', '受注': 'badge-green' };

    function renderAll() {
      const list = getFiltered();

      document.getElementById('tableAll').style.display   = currentView === 'all'   ? '' : 'none';
      document.getElementById('tableSales').style.display = currentView === 'sales' ? '' : 'none';
      document.getElementById('tableCS').style.display    = currentView === 'cs'    ? '' : 'none';

      const emptyRow = (cols) => `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-state-text">顧客がありません</div></div></td></tr>`;

      if (currentView === 'all') {
        document.getElementById('bodyAll').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.industry || '—'}</td>
            <td>${c.cs_status ? `<span class="badge ${CS_COLOR[c.cs_status]||'badge-gray'}">${c.cs_status}</span>` : '—'}</td>
            <td>${c.contact_name || '—'}</td>
            <td>${c.churn_risk ? `<span class="badge ${CHURN_COLOR[c.churn_risk]||'badge-gray'}">${c.churn_risk}</span>` : '—'}</td>
            <td>${fmtDate(c.contract_date)}</td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }

      if (currentView === 'sales') {
        document.getElementById('bodySales').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.contact_name || '—'}</td>
            <td>${c.contract_type || '—'}</td>
            <td>${c.contract_amount ? Number(c.contract_amount).toLocaleString() + '円' : '—'}</td>
            <td>${c.upsell_status ? `<span class="badge ${UPSELL_COLOR[c.upsell_status]||'badge-gray'}">${c.upsell_status}</span>` : '—'}</td>
            <td><span class="badge ${c.ma_subscribed === 'true' ? 'badge-green' : 'badge-gray'}">${c.ma_subscribed === 'true' ? 'MA登録済み' : '未登録'}</span></td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }

      if (currentView === 'cs') {
        document.getElementById('bodyCS').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.cs_status ? `<span class="badge ${CS_COLOR[c.cs_status]||'badge-gray'}">${c.cs_status}</span>` : '—'}</td>
            <td>${c.onboarding_status || '—'}</td>
            <td>${c.satisfaction_score ? c.satisfaction_score + ' / 5' : '—'}</td>
            <td>${c.churn_risk ? `<span class="badge ${CHURN_COLOR[c.churn_risk]||'badge-gray'}">${c.churn_risk}</span>` : '—'}</td>
            <td>${c.cs_rep || '—'}</td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }
    }

    // ===== モーダル =====
    function openNewModal() {
      document.getElementById('newModal').classList.remove('hidden');
      document.getElementById('new_contract_date').value = new Date().toISOString().slice(0,10);
    }

    function closeModal() {
      document.getElementById('newModal').classList.add('hidden');
    }

    async function createCustomer() {
      const company_name = document.getElementById('new_company_name').value.trim();
      if (!company_name) { Toast.error('企業名を入力してください'); return; }
      try {
        const newC = await API.customers.create({
          company_name,
          industry:          document.getElementById('new_industry').value,
          employee_count:    document.getElementById('new_employee_count').value,
          contact_name:      document.getElementById('new_contact_name').value,
          contact_email:     document.getElementById('new_contact_email').value,
          contract_type:     document.getElementById('new_contract_type').value,
          contract_date:     document.getElementById('new_contract_date').value,
          cs_rep:            document.getElementById('new_cs_rep').value,
          cs_status:         document.getElementById('new_cs_status').value,
          onboarding_status: document.getElementById('new_onboarding_status').value,
          ma_subscribed:     'false',
        });
        allCustomers.unshift(newC);
        renderAll();
        closeModal();
        Toast.success('顧客を登録しました');
      } catch(e) {
        Toast.error('登録エラー: ' + e.message);
      }
    }
  </script>
</body>
</html>
