  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">顧客管理</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">契約済みクライアントのCRM管理</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="openImportModal()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV取込
        </button>
        <button class="btn btn-ghost" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV出力
        </button>
        <button class="btn btn-primary" onclick="openNewModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新規顧客登録
        </button>
      </div>
    </div>

    <div class="page-body">

      <!-- タブ + フィルター -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
        <div class="tabs" style="margin-bottom:0;">
          <button class="tab-btn active" data-view="all"   onclick="switchView('all',this)">すべて</button>
          <button class="tab-btn"        data-view="sales" onclick="switchView('sales',this)">セールス</button>
          <button class="tab-btn"        data-view="cs"    onclick="switchView('cs',this)">CS</button>
        </div>
        <div class="filter-bar" style="margin-bottom:0;">
          <input type="text" class="search-input" id="searchInput" placeholder="企業名で検索">
          <select class="form-select" id="csStatusFilter" style="width:140px;">
            <option value="">CSステータス: すべて</option>
            <option>アクティブ</option>
            <option>オンボーディング中</option>
            <option>更新交渉中</option>
            <option>解約リスク</option>
            <option>解約済み</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <!-- すべてビュー -->
          <table id="tableAll">
            <thead>
              <tr>
                <th>企業名</th>
                <th>業種</th>
                <th>CSステータス</th>
                <th>担当者</th>
                <th>チャーンリスク</th>
                <th>契約日</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodyAll"></tbody>
          </table>

          <!-- セールスビュー -->
          <table id="tableSales" style="display:none;">
            <thead>
              <tr>
                <th>企業名</th>
                <th>担当者</th>
                <th>契約種別</th>
                <th>契約金額</th>
                <th>アップセル状況</th>
                <th>MAリスト</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodySales"></tbody>
          </table>

          <!-- CSビュー -->
          <table id="tableCS" style="display:none;">
            <thead>
              <tr>
                <th>企業名</th>
                <th>CSステータス</th>
                <th>オンボーディング</th>
                <th>満足度</th>
                <th>チャーンリスク</th>
                <th>CS担当</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="bodyCS"></tbody>
          </table>
        </div>
      </div>

  <!-- CSV インポートモーダル -->
  <div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:10px;padding:28px;width:500px;max-width:95vw;">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:8px;">顧客CSVインポート</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">
        1行目をヘッダー行として読み込みます。<br>
        対応列: <code>会社名, 担当者名, 役職, メール, 電話</code>
      </p>
      <input type="file" id="importFile" accept=".csv" style="margin-bottom:16px;font-size:13px;">
      <div id="importPreview" style="margin-bottom:16px;"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeImportModal()">キャンセル</button>
        <button class="btn btn-primary" id="importConfirmBtn" onclick="confirmImport()" disabled>取り込む</button>
      </div>
    </div>
  </div>

  <!-- 新規顧客モーダル -->
  <div class="modal-overlay hidden" id="newModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新規顧客登録</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group form-full">
            <label class="form-label">企業名 <span class="required">*</span></label>
            <input type="text" class="form-input" id="new_company_name" placeholder="株式会社〇〇">
          </div>
          <div class="form-group">
            <label class="form-label">業種</label>
            <select class="form-select" id="new_industry">
              <option value="">選択</option>
              <option>IT・通信</option><option>製造</option><option>小売・流通</option>
              <option>金融・保険</option><option>医療・福祉</option><option>建設・不動産</option>
              <option>サービス</option><option>教育</option><option>その他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">従業員数</label>
            <input type="text" class="form-input" id="new_employee_count" placeholder="50名">
          </div>
          <div class="form-group">
            <label class="form-label">担当者名（先方）</label>
            <input type="text" class="form-input" id="new_contact_name">
          </div>
          <div class="form-group">
            <label class="form-label">担当者メール</label>
            <input type="email" class="form-input" id="new_contact_email">
          </div>
          <div class="form-group">
            <label class="form-label">契約種別</label>
            <select class="form-select" id="new_contract_type">
              <option value="">選択</option>
              <option>フルサポ採用</option>
              <option>CLUTCH Agent</option>
              <option>その他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">契約日</label>
            <input type="date" class="form-input" id="new_contract_date">
          </div>
          <div class="form-group">
            <label class="form-label">CS担当</label>
            <input type="text" class="form-input" id="new_cs_rep">
          </div>
          <div class="form-group">
            <label class="form-label">CSステータス</label>
            <select class="form-select" id="new_cs_status">
              <option value="">選択</option>
              <option>オンボーディング中</option>
              <option>アクティブ</option>
              <option>更新交渉中</option>
              <option>解約リスク</option>
              <option>解約済み</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">オンボーディング</label>
            <select class="form-select" id="new_onboarding_status">
              <option value="">選択</option>
              <option>未開始</option>
              <option>進行中</option>
              <option>完了</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="createCustomer()">登録する</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let allCustomers = [];
    let currentView  = 'all';

    initPage(async () => {
      try {
        allCustomers = await API.customers.list();
        renderAll();
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    document.getElementById('searchInput').addEventListener('input', renderAll);
    document.getElementById('csStatusFilter').addEventListener('change', renderAll);

    function switchView(view, btn) {
      currentView = view;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll();
    }

    function getFiltered() {
      const q  = document.getElementById('searchInput').value.toLowerCase();
      const cs = document.getElementById('csStatusFilter').value;
      return allCustomers.filter(c => {
        if (q && !c.company_name?.toLowerCase().includes(q)) return false;
        if (cs && c.cs_status !== cs) return false;
        return true;
      });
    }

    const CHURN_COLOR = { '低': 'badge-green', '中': 'badge-yellow', '高': 'badge-red' };
    const CS_COLOR    = { 'アクティブ': 'badge-green', 'オンボーディング中': 'badge-blue', '更新交渉中': 'badge-yellow', '解約リスク': 'badge-red', '解約済み': 'badge-gray' };
    const UPSELL_COLOR = { '未検討': 'badge-gray', '検討中': 'badge-blue', '提案済み': 'badge-yellow', '受注': 'badge-green' };

    function renderAll() {
      const list = getFiltered();

      document.getElementById('tableAll').style.display   = currentView === 'all'   ? '' : 'none';
      document.getElementById('tableSales').style.display = currentView === 'sales' ? '' : 'none';
      document.getElementById('tableCS').style.display    = currentView === 'cs'    ? '' : 'none';

      const emptyRow = (cols) => `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-state-text">顧客がありません</div></div></td></tr>`;

      if (currentView === 'all') {
        document.getElementById('bodyAll').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.industry || '—'}</td>
            <td>${c.cs_status ? `<span class="badge ${CS_COLOR[c.cs_status]||'badge-gray'}">${c.cs_status}</span>` : '—'}</td>
            <td>${c.contact_name || '—'}</td>
            <td>${c.churn_risk ? `<span class="badge ${CHURN_COLOR[c.churn_risk]||'badge-gray'}">${c.churn_risk}</span>` : '—'}</td>
            <td>${fmtDate(c.contract_date)}</td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }

      if (currentView === 'sales') {
        document.getElementById('bodySales').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.contact_name || '—'}</td>
            <td>${c.contract_type || '—'}</td>
            <td>${c.contract_amount ? Number(c.contract_amount).toLocaleString() + '円' : '—'}</td>
            <td>${c.upsell_status ? `<span class="badge ${UPSELL_COLOR[c.upsell_status]||'badge-gray'}">${c.upsell_status}</span>` : '—'}</td>
            <td><span class="badge ${c.ma_subscribed === 'true' ? 'badge-green' : 'badge-gray'}">${c.ma_subscribed === 'true' ? 'MA登録済み' : '未登録'}</span></td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }

      if (currentView === 'cs') {
        document.getElementById('bodyCS').innerHTML = list.length ? list.map(c => `
          <tr>
            <td><a href="/customers/detail.html?id=${c.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${c.company_name}</a></td>
            <td>${c.cs_status ? `<span class="badge ${CS_COLOR[c.cs_status]||'badge-gray'}">${c.cs_status}</span>` : '—'}</td>
            <td>${c.onboarding_status || '—'}</td>
            <td>${c.satisfaction_score ? c.satisfaction_score + ' / 5' : '—'}</td>
            <td>${c.churn_risk ? `<span class="badge ${CHURN_COLOR[c.churn_risk]||'badge-gray'}">${c.churn_risk}</span>` : '—'}</td>
            <td>${c.cs_rep || '—'}</td>
            <td><a href="/customers/detail.html?id=${c.id}" class="btn btn-ghost btn-sm">詳細</a></td>
          </tr>`).join('') : emptyRow(7);
      }
    }

    // ===== モーダル =====
    function openNewModal() {
      document.getElementById('newModal').classList.remove('hidden');
      document.getElementById('new_contract_date').value = new Date().toISOString().slice(0,10);
    }

    function closeModal() {
      document.getElementById('newModal').classList.add('hidden');
    }

    async function createCustomer(force = false) {
      const company_name = document.getElementById('new_company_name').value.trim();
      if (!company_name) { Toast.error('企業名を入力してください'); return; }
      try {
        const newC = await API.customers.create({
          company_name,
          industry:          document.getElementById('new_industry').value,
          employee_count:    document.getElementById('new_employee_count').value,
          contact_name:      document.getElementById('new_contact_name').value,
          contact_email:     document.getElementById('new_contact_email').value,
          contract_type:     document.getElementById('new_contract_type').value,
          contract_date:     document.getElementById('new_contract_date').value,
          cs_rep:            document.getElementById('new_cs_rep').value,
          cs_status:         document.getElementById('new_cs_status').value,
          onboarding_status: document.getElementById('new_onboarding_status').value,
          ma_subscribed:     'false',
          ...(force ? { force: true } : {}),
        });
        allCustomers.unshift(newC);
        renderAll();
        closeModal();
        Toast.success('顧客を登録しました');
      } catch(e) {
        if (e.status === 409 && e.data?.duplicate) {
          const go = confirm(`⚠️ 重複チェック\n${e.data.error}\n\nそれでも新規登録しますか？`);
          if (go) createCustomer(true);
          return;
        }
        Toast.error('登録エラー: ' + e.message);
      }
    }

    // ===== CSV インポート =====
    let importData = [];

    function openImportModal() {
      document.getElementById('importModal').style.display = 'flex';
      document.getElementById('importFile').value = '';
      document.getElementById('importPreview').innerHTML = '';
      document.getElementById('importConfirmBtn').disabled = true;
      importData = [];
    }
    function closeImportModal() {
      document.getElementById('importModal').style.display = 'none';
    }

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result.replace(/^\uFEFF/, '');
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) { document.getElementById('importPreview').innerHTML = '<p style="color:var(--danger);font-size:12px;">データ行がありません</p>'; return; }

        const parseRow = (line) => {
          const result = []; let cur = ''; let inQ = false;
          for (const ch of line) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
            else { cur += ch; }
          }
          result.push(cur.trim());
          return result;
        };

        const headers = parseRow(lines[0]);
        const COL = {
          company_name:    ['会社名','company_name'],
          contact_name:    ['担当者名','担当者','contact_name'],
          contact_title:   ['役職','contact_title'],
          contact_email:   ['メール','メールアドレス','contact_email'],
          contact_phone:   ['電話','電話番号','contact_phone'],
          contract_date:   ['契約日','contract_date'],
          contract_amount: ['契約金額','contract_amount'],
          service_name:    ['契約サービス','サービス','service_name'],
        };

        importData = lines.slice(1).map(line => {
          const cols = parseRow(line);
          const row = {};
          for (const [key, names] of Object.entries(COL)) {
            const idx = headers.findIndex(h => names.includes(h.replace(/"/g,'')));
            if (idx >= 0) row[key] = (cols[idx] || '').replace(/"/g,'');
          }
          return row;
        }).filter(r => r.company_name);

        const preview = importData.slice(0, 5).map(r =>
          `<tr><td>${r.company_name||''}</td><td>${r.contact_name||''}</td><td>${r.contact_email||''}</td></tr>`
        ).join('');
        document.getElementById('importPreview').innerHTML = `
          <p style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">${importData.length}件を取り込みます（プレビュー: 最大5件）</p>
          <table style="width:100%;font-size:12px;border-collapse:collapse;">
            <thead><tr style="background:#f8fafc;"><th style="padding:4px 8px;text-align:left;">会社名</th><th style="padding:4px 8px;text-align:left;">担当者名</th><th style="padding:4px 8px;text-align:left;">メール</th></tr></thead>
            <tbody>${preview}</tbody>
          </table>`;
        document.getElementById('importConfirmBtn').disabled = importData.length === 0;
      };
      reader.readAsText(file, 'UTF-8');
    });

    async function confirmImport() {
      if (!importData.length) return;
      document.getElementById('importConfirmBtn').disabled = true;
      Loading.show();
      let ok = 0, ng = 0;
      for (const row of importData) {
        try { await API.customers.create({ ...row, force: true }); ok++; }
        catch(e) { ng++; }
      }
      Loading.hide();
      closeImportModal();
      Toast.success(`${ok}件取り込み完了${ng ? `（${ng}件エラー）` : ''}`);
      allCustomers = await API.customers.list();
      renderAll();
    }

    // ===== CSV エクスポート =====
    function exportCSV() {
      if (!allCustomers.length) { Toast.error('エクスポートするデータがありません'); return; }
      const headers = ['会社名','担当者名','役職','メール','電話','セグメント','CS担当','作成日'];
      const rows = allCustomers.map(c => [
        c.company_name || '', c.contact_name || '', c.contact_title || '',
        c.contact_email || '', c.contact_phone || '',
        c.segment || '', c.cs_rep || '',
        (c.created_at || '').slice(0,10),
      ]);
      const bom = '\uFEFF';
      const csv = bom + [headers, ...rows]
        .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
        .join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '顧客一覧.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    }
  </script>
</body>
</html>
