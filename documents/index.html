<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .doc-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow .15s, border-color .15s;
    }
    .doc-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: var(--accent); }
    .doc-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .doc-name { font-size: 13px; font-weight: 700; color: var(--primary); line-height: 1.4; word-break: break-all; }
    .doc-cat  { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .04em; }
    .doc-meta { font-size: 11px; color: var(--text-muted); }
    .doc-actions { display: flex; gap: 6px; margin-top: 4px; }
    .cat-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .cat-btn {
      padding: 4px 12px; border-radius: 16px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    /* アップロードモーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 24px;
      width: 480px; max-width: 95vw;
    }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 16px; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 32px; text-align: center;
      cursor: pointer; transition: border-color .15s, background .15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #f0f4ff; }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 32px; margin-bottom: 8px; }
    .upload-label { font-size: 13px; font-weight: 600; color: var(--primary); }
    .upload-hint  { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file-selected { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 8px; }
    .progress-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-top: 12px; display: none; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width .2s; }
  </style>
</head>
<body class="app-layout">

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">ドキュメント</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">提案書・契約書・資料の格納</div>
      </div>
      <div class="page-actions">
        <input type="text" class="search-input" id="searchInput" placeholder="ファイルを検索" style="width:200px;" oninput="render()">
        <button class="btn btn-primary" id="uploadBtn">+ アップロード</button>
      </div>
    </div>

    <div class="page-body">
      <div class="cat-filter" id="catFilter"></div>
      <div id="docGrid"><div style="text-align:center;padding:40px;color:var(--text-muted);">読み込み中...</div></div>
    </div>
  </main>

  <!-- アップロードモーダル -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal-box">
      <div class="modal-title">ファイルをアップロード</div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="*/*">
        <div class="upload-icon">📁</div>
        <div class="upload-label">クリックまたはドラッグ&ドロップ</div>
        <div class="upload-hint">PDF・Word・Excel・画像 など（最大 50MB）</div>
        <div class="file-selected" id="fileSelected" style="display:none;"></div>
      </div>
      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">ファイル名（任意）</label>
          <input type="text" class="form-input" id="docNameInput" placeholder="省略時はファイル名を使用">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">カテゴリ</label>
          <select class="form-select" id="docCatInput">
            <option>提案書</option>
            <option>契約書</option>
            <option>請求書</option>
            <option>資料</option>
            <option>議事録</option>
            <option>その他</option>
          </select>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">関連顧客ID（任意）</label>
          <input type="text" class="form-input" id="docCustomerInput" placeholder="customer_id">
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">関連案件ID（任意）</label>
          <input type="text" class="form-input" id="docDealInput" placeholder="deal_id">
        </div>
      </div>

      <div class="form-group" style="margin-top:12px;margin-bottom:0;">
        <label class="form-label">メモ</label>
        <input type="text" class="form-input" id="docMemoInput" placeholder="補足メモ（任意）">
      </div>

      <div style="display:flex;gap:8px;margin-top:18px;justify-content:flex-end;">
        <button class="btn btn-ghost" id="cancelUpload">キャンセル</button>
        <button class="btn btn-primary" id="confirmUpload">アップロード</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let docs = [];
    let currentCat = 'すべて';
    let selectedFile = null;

    const CATEGORIES = ['すべて','提案書','契約書','請求書','資料','議事録','その他'];

    const FILE_ICONS = {
      pdf:  '📄', doc: '📝', docx: '📝',
      xls: '📊', xlsx: '📊', csv: '📊',
      ppt: '📊', pptx: '📊',
      jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼',
      zip: '🗜', rar: '🗜',
      default: '📁',
    };

    function fileIcon(name) {
      const ext = (name || '').split('.').pop().toLowerCase();
      return FILE_ICONS[ext] || FILE_ICONS.default;
    }

    function formatSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    initPage(async () => {
      try {
        docs = await API.documents.list();
        buildCatFilter();
        render();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    });

    function buildCatFilter() {
      const cats = ['すべて', ...new Set(docs.map(d => d.category).filter(Boolean))];
      document.getElementById('catFilter').innerHTML = cats.map(c =>
        `<button class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}',this)">${c}</button>`
      ).join('');
    }

    function setCat(cat, btn) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase();
      const filtered = docs.filter(d => {
        if (currentCat !== 'すべて' && d.category !== currentCat) return false;
        if (q && !d.name?.toLowerCase().includes(q) && !d.memo?.toLowerCase().includes(q)) return false;
        return true;
      });
      if (!filtered.length) {
        document.getElementById('docGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">ファイルがありません</div>';
        return;
      }
      document.getElementById('docGrid').innerHTML = `<div class="doc-grid">${filtered.map(d => `
        <div class="doc-card">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="doc-icon">${fileIcon(d.name)}</div>
            <div style="flex:1;min-width:0;">
              <div class="doc-cat">${d.category || 'その他'}</div>
              <div class="doc-name">${escHtml(d.name)}</div>
            </div>
          </div>
          ${d.memo ? `<div class="doc-meta">${escHtml(d.memo)}</div>` : ''}
          <div class="doc-meta">${formatSize(d.file_size)} ・ ${fmtDate(d.created_at)} ・ ${d.uploaded_by || '—'}</div>
          <div class="doc-actions">
            <button class="btn btn-secondary btn-sm" onclick="downloadDoc('${d.id}','${escHtml(d.name)}')">ダウンロード</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteDoc('${d.id}','${escHtml(d.name)}')">削除</button>
          </div>
        </div>`).join('')}
      </div>`;
    }

    async function downloadDoc(id, name) {
      try {
        const { url } = await API.documents.getUrl(id);
        const a = document.createElement('a');
        a.href = url; a.download = name; a.target = '_blank';
        a.click();
      } catch(e) { Toast.error('ダウンロードエラー: ' + e.message); }
    }

    async function deleteDoc(id, name) {
      if (!confirm(`「${name}」を削除してよいですか？`)) return;
      try {
        await API.documents.delete(id);
        docs = docs.filter(d => d.id !== id);
        buildCatFilter();
        render();
        Toast.success('削除しました');
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ===== アップロードモーダル =====
    document.getElementById('uploadBtn').addEventListener('click', () => {
      document.getElementById('uploadModal').classList.add('open');
    });
    document.getElementById('cancelUpload').addEventListener('click', closeModal);
    document.getElementById('uploadModal').addEventListener('click', e => {
      if (e.target === document.getElementById('uploadModal')) closeModal();
    });

    function closeModal() {
      document.getElementById('uploadModal').classList.remove('open');
      document.getElementById('fileInput').value = '';
      document.getElementById('fileSelected').style.display = 'none';
      document.getElementById('docNameInput').value = '';
      document.getElementById('docMemoInput').value = '';
      document.getElementById('progressBar').style.display = 'none';
      document.getElementById('progressFill').style.width = '0%';
      selectedFile = null;
    }

    // ドラッグ&ドロップ
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag');
      if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
    });

    document.getElementById('fileInput').addEventListener('change', e => {
      if (e.target.files[0]) handleFileSelect(e.target.files[0]);
    });

    function handleFileSelect(file) {
      selectedFile = file;
      const sel = document.getElementById('fileSelected');
      sel.style.display = 'block';
      sel.textContent = `✓ ${file.name} (${formatSize(file.size)})`;
      if (!document.getElementById('docNameInput').value) {
        document.getElementById('docNameInput').placeholder = file.name;
      }
    }

    document.getElementById('confirmUpload').addEventListener('click', async () => {
      if (!selectedFile) { Toast.error('ファイルを選択してください'); return; }

      const name     = document.getElementById('docNameInput').value.trim() || selectedFile.name;
      const category = document.getElementById('docCatInput').value;
      const customer = document.getElementById('docCustomerInput').value.trim() || null;
      const deal     = document.getElementById('docDealInput').value.trim() || null;
      const memo     = document.getElementById('docMemoInput').value.trim();

      const btn = document.getElementById('confirmUpload');
      btn.disabled = true; btn.textContent = 'アップロード中...';

      const progressBar  = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      progressBar.style.display = 'block';
      progressFill.style.width  = '10%';

      try {
        // 1. 署名付きアップロードURL取得 + DBレコード作成
        const { id, signed_url } = await API.documents.presign({
          name,
          category,
          file_type:   selectedFile.type || 'application/octet-stream',
          file_size:   selectedFile.size,
          customer_id: customer,
          deal_id:     deal,
          memo,
        });

        progressFill.style.width = '40%';

        // 2. Supabase Storage に直接アップロード
        const uploadRes = await fetch(signed_url, {
          method:  'PUT',
          headers: { 'Content-Type': selectedFile.type || 'application/octet-stream' },
          body:    selectedFile,
        });
        if (!uploadRes.ok) throw new Error('ストレージへのアップロードに失敗しました');

        progressFill.style.width = '100%';

        Toast.success('アップロード完了');
        closeModal();

        // 一覧をリフレッシュ
        docs = await API.documents.list();
        buildCatFilter();
        render();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'アップロード';
        progressBar.style.display = 'none';
      }
    });

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
