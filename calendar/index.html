<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* ===== ツールバー ===== */
    .cal-toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .cal-nav { display: flex; align-items: center; gap: 6px; }
    .cal-nav-btn {
      width: 30px; height: 30px; border-radius: 6px;
      border: 1px solid var(--border); background: #fff;
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btn:hover { background: var(--bg); }
    .cal-title { font-size: 16px; font-weight: 800; color: var(--primary); min-width: 160px; text-align: center; }
    .view-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .view-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .seg-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .seg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ===== 月表示 ===== */
    .month-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .month-weekday {
      background: var(--primary); color: rgba(255,255,255,.8);
      font-size: 11px; font-weight: 700; text-align: center; padding: 6px 0;
    }
    .month-cell {
      min-height: 90px; border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border); padding: 4px; background: #fff;
      cursor: pointer; position: relative;
    }
    .month-cell:hover { background: #f8fafc; }
    .month-cell.other-month { background: #fafbfc; }
    .month-cell.today { background: #eff6ff; }
    .month-cell:nth-child(7n) { border-right: none; }
    .cell-date {
      font-size: 11px; font-weight: 700; color: var(--text);
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; margin-bottom: 2px;
    }
    .month-cell.today .cell-date { background: var(--primary); color: #fff; }
    .appt-chip {
      font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
      margin-bottom: 2px; display: block; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; cursor: pointer;
      background: #dbeafe; color: #1e40af;
    }
    .appt-chip:hover { opacity: .8; }
    .more-chip { font-size: 10px; color: var(--accent); font-weight: 700; padding: 1px 4px; cursor: pointer; }

    /* ===== 週表示 ===== */
    .week-grid {
      display: grid; grid-template-columns: 52px repeat(7, 1fr);
      border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
    }
    .week-header-blank { background: var(--primary); border-bottom: 1px solid rgba(255,255,255,.1); }
    .week-day-header {
      background: var(--primary); color: rgba(255,255,255,.85);
      font-size: 11px; font-weight: 700; text-align: center;
      padding: 6px 2px; border-left: 1px solid rgba(255,255,255,.1);
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .week-day-header.today { color: #fff; background: #1a56c4; }
    .week-time-label {
      font-size: 10px; color: var(--text-muted); text-align: right;
      padding: 0 6px 0 2px; height: 40px;
      border-bottom: 1px solid var(--border); background: #fafbfc;
      display: flex; align-items: flex-start; padding-top: 2px;
    }
    .week-cell {
      height: 40px; border-left: 1px solid var(--border);
      border-bottom: 1px solid var(--border); position: relative;
      cursor: pointer;
    }
    .week-cell:hover { background: #f0f9ff; }
    .week-appt {
      position: absolute; left: 2px; right: 2px;
      background: #dbeafe; border-left: 3px solid #3b82f6;
      border-radius: 3px; padding: 2px 4px;
      font-size: 10px; font-weight: 600; color: #1e40af;
      overflow: hidden; cursor: pointer; z-index: 1;
    }
    .week-appt:hover { opacity: .85; }

    /* ===== リスト表示 ===== */
    .appt-list-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid #f1f5f9;
    }
    .appt-list-row:last-child { border-bottom: none; }
    .appt-date-col { min-width: 90px; text-align: right; flex-shrink: 0; }
    .appt-date-day  { font-size: 20px; font-weight: 900; color: var(--primary); line-height: 1; }
    .appt-date-meta { font-size: 10px; color: var(--text-muted); }
    .appt-content  { flex: 1; }
    .appt-title    { font-size: 13.5px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .appt-meta     { font-size: 11px; color: var(--text-muted); display: flex; gap: 10px; flex-wrap: wrap; }
    .appt-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 2px; flex-shrink: 0; }
    .appt-del:hover { color: #ef4444; }
    .deal-badge { font-size: 10px; background: #e0f2fe; color: #0369a1; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
  </style>
</head>

  <script>
    const DAYS_JA  = ['日','月','火','水','木','金','土'];
    const HOURS    = Array.from({length: 13}, (_, i) => i + 8); // 8〜20時
    let allAppts   = [];
    let dealMap    = {};
    let currentView  = 'month';
    let currentScope = 'mine';
    let myEmail = '';
    let cursor  = new Date();
    cursor.setDate(1);

    initPage(async (user) => {
      myEmail = user?.email || '';
      document.getElementById('modalApptAssigned').value = myEmail;
      const deals = await API.deals.list();
      dealMap = {};
      const sel = document.getElementById('modalApptDealId');
      deals.forEach(d => {
        dealMap[d.id] = d;
        const opt = document.createElement('option');
        opt.value = d.id; opt.textContent = d.company_name || d.id;
        sel.appendChild(opt);
      });
      await load();
    });

    async function load() {
      try {
        const opts = currentScope === 'mine' ? { assigned_to: myEmail } : {};
        allAppts = await API.appointments.list(opts) || [];
        render();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    }

    function setScope(scope, btn) {
      currentScope = scope;
      document.querySelectorAll('[data-scope]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load();
    }

    function setView(v) {
      currentView = v;
      ['btnMonth','btnWeek','btnList'].forEach(id => {
        document.getElementById(id).classList.toggle('active', id === 'btn' + v.charAt(0).toUpperCase() + v.slice(1));
      });
      render();
    }

    function render() {
      if (currentView === 'month') renderMonth();
      else if (currentView === 'week') renderWeek();
      else renderList();
    }

    // ===== 月表示 =====
    function renderMonth() {
      const y = cursor.getFullYear(), m = cursor.getMonth();
      document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;

      const first = new Date(y, m, 1);
      const last  = new Date(y, m+1, 0);
      const start = new Date(first); start.setDate(start.getDate() - start.getDay());
      const today = new Date().toDateString();

      // アポを日付でグループ化
      const byDate = {};
      allAppts.forEach(a => {
        const d = a.start_at.slice(0, 10);
        if (!byDate[d]) byDate[d] = [];
        byDate[d].push(a);
      });

      let html = '<div class="month-grid">';
      DAYS_JA.forEach(d => { html += `<div class="month-weekday">${d}</div>`; });

      const cur = new Date(start);
      while (cur <= last || cur.getDay() !== 0) {
        const dateStr = cur.toISOString().slice(0,10);
        const isOther = cur.getMonth() !== m;
        const isToday = cur.toDateString() === today;
        const appts   = byDate[dateStr] || [];

        html += `<div class="month-cell ${isOther?'other-month':''} ${isToday?'today':''}" onclick="openAddOnDate('${dateStr}')">`;
        html += `<div class="cell-date">${cur.getDate()}</div>`;
        const show = appts.slice(0, 3);
        show.forEach(a => {
          const t = a.start_at.slice(11,16);
          const deal = dealMap[a.deal_id];
          html += `<span class="appt-chip" onclick="event.stopPropagation();openEdit('${a.id}')" title="${escHtml(a.title)}">${t} ${escHtml(a.title)}</span>`;
        });
        if (appts.length > 3) html += `<span class="more-chip">他 ${appts.length-3}件</span>`;
        html += '</div>';
        cur.setDate(cur.getDate() + 1);
        if (cur > last && cur.getDay() === 0) break;
      }
      html += '</div>';
      document.getElementById('calBody').innerHTML = html;
    }

    // ===== 週表示 =====
    function renderWeek() {
      const startOfWeek = new Date(cursor);
      startOfWeek.setDate(cursor.getDate() - cursor.getDay());
      const endOfWeek = new Date(startOfWeek);
      endOfWeek.setDate(startOfWeek.getDate() + 6);
      const today = new Date().toDateString();

      const m1 = startOfWeek.getMonth()+1, d1 = startOfWeek.getDate();
      const m2 = endOfWeek.getMonth()+1,   d2 = endOfWeek.getDate();
      document.getElementById('calTitle').textContent = `${startOfWeek.getFullYear()}年 ${m1}/${d1} – ${m2}/${d2}`;

      const days = Array.from({length:7}, (_, i) => { const d = new Date(startOfWeek); d.setDate(d.getDate()+i); return d; });

      // アポをグリッドに配置（日×時間）
      const byDayHour = {};
      allAppts.forEach(a => {
        const dt = new Date(a.start_at);
        const dayIdx = days.findIndex(d => d.toDateString() === dt.toDateString());
        if (dayIdx < 0) return;
        const h = dt.getHours();
        const key = `${dayIdx}-${h}`;
        if (!byDayHour[key]) byDayHour[key] = [];
        byDayHour[key].push(a);
      });

      let html = '<div class="week-grid">';
      html += '<div class="week-header-blank"></div>';
      days.forEach(d => {
        const isToday = d.toDateString() === today;
        html += `<div class="week-day-header ${isToday?'today':''}">${DAYS_JA[d.getDay()]}<br>${d.getMonth()+1}/${d.getDate()}</div>`;
      });

      HOURS.forEach(h => {
        html += `<div class="week-time-label">${h}:00</div>`;
        days.forEach((d, di) => {
          const appts = byDayHour[`${di}-${h}`] || [];
          const dt = `${d.toISOString().slice(0,10)}T${String(h).padStart(2,'0')}:00`;
          html += `<div class="week-cell" onclick="openAddOnDatetime('${dt}')">`;
          appts.forEach(a => {
            const min = new Date(a.start_at).getMinutes();
            const top = Math.round(min / 60 * 40);
            let heightH = 1;
            if (a.end_at) {
              const dur = (new Date(a.end_at) - new Date(a.start_at)) / 3600000;
              heightH = Math.max(0.5, Math.min(dur, 3));
            }
            const heightPx = Math.round(heightH * 40) - 2;
            html += `<div class="week-appt" style="top:${top}px;height:${heightPx}px;" onclick="event.stopPropagation();openEdit('${a.id}')" title="${escHtml(a.title)}">${escHtml(a.title)}</div>`;
          });
          html += '</div>';
        });
      });
      html += '</div>';
      document.getElementById('calBody').innerHTML = html;
    }

    // ===== リスト表示 =====
    function renderList() {
      const y = cursor.getFullYear(), m = cursor.getMonth();
      document.getElementById('calTitle').textContent = `${y}年 ${m+1}月`;

      const monthAppts = allAppts.filter(a => {
        const d = new Date(a.start_at);
        return d.getFullYear() === y && d.getMonth() === m;
      }).sort((a, b) => new Date(a.start_at) - new Date(b.start_at));

      if (!monthAppts.length) {
        document.getElementById('calBody').innerHTML = '<div class="card"><div style="text-align:center;padding:40px;color:var(--text-muted);font-size:13px;">この月のアポはありません</div></div>';
        return;
      }

      const rows = monthAppts.map(a => {
        const dt   = new Date(a.start_at);
        const deal = dealMap[a.deal_id];
        const time = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
        const endStr = a.end_at ? ` – ${new Date(a.end_at).toLocaleTimeString('ja',{hour:'2-digit',minute:'2-digit'})}` : '';
        return `
          <div class="appt-list-row">
            <div class="appt-date-col">
              <div class="appt-date-day">${dt.getDate()}</div>
              <div class="appt-date-meta">${DAYS_JA[dt.getDay()]}曜日</div>
              <div class="appt-date-meta">${time}${endStr}</div>
            </div>
            <div class="appt-content">
              <div class="appt-title">${escHtml(a.title)}</div>
              <div class="appt-meta">
                ${deal ? `<span class="deal-badge">${escHtml(deal.company_name)}</span>` : ''}
                ${a.location ? `<span>📍 ${escHtml(a.location)}</span>` : ''}
                ${a.assigned_to ? `<span>担当: ${escHtml(a.assigned_to)}</span>` : ''}
              </div>
              ${a.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">${escHtml(a.notes)}</div>` : ''}
            </div>
            <button class="appt-del" onclick="openEdit('${a.id}')" title="編集" style="font-size:14px;">✎</button>
            <button class="appt-del" onclick="deleteAppt('${a.id}')" title="削除">×</button>
          </div>`;
      }).join('');

      document.getElementById('calBody').innerHTML = `<div class="card">${rows}</div>`;
    }

    // ===== ナビ =====
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentView === 'week') { cursor.setDate(cursor.getDate() - 7); }
      else { cursor.setMonth(cursor.getMonth() - 1); cursor.setDate(1); }
      render();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentView === 'week') { cursor.setDate(cursor.getDate() + 7); }
      else { cursor.setMonth(cursor.getMonth() + 1); cursor.setDate(1); }
      render();
    });
    document.getElementById('todayBtn').addEventListener('click', () => {
      cursor = new Date(); if (currentView !== 'week') cursor.setDate(1);
      render();
    });

    // ===== CRUD =====
    async function deleteAppt(id) {
      if (!confirm('このアポを削除しますか？')) return;
      try {
        await API.appointments.delete(id);
        allAppts = allAppts.filter(a => a.id !== id);
        render(); Toast.success('削除しました');
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ===== モーダル =====
    function openModal(defaults = {}) {
      document.getElementById('modalTitle').textContent = 'アポを追加';
      document.getElementById('editApptId').value = '';
      document.getElementById('modalApptTitle').value  = defaults.title || '';
      document.getElementById('modalStartAt').value    = defaults.start_at || '';
      document.getElementById('modalEndAt').value      = '';
      document.getElementById('modalApptDealId').value = defaults.deal_id || '';
      document.getElementById('modalLocation').value   = '';
      document.getElementById('modalApptAssigned').value = myEmail;
      document.getElementById('modalApptNotes').value  = '';
      document.getElementById('apptModal').style.display = 'flex';
      document.getElementById('modalApptTitle').focus();
    }

    function openAddOnDate(dateStr) {
      openModal({ start_at: dateStr + 'T10:00' });
    }
    function openAddOnDatetime(dt) {
      openModal({ start_at: dt });
    }

    function openEdit(id) {
      const a = allAppts.find(x => x.id === id);
      if (!a) return;
      document.getElementById('modalTitle').textContent = 'アポを編集';
      document.getElementById('editApptId').value = a.id;
      document.getElementById('modalApptTitle').value  = a.title || '';
      document.getElementById('modalStartAt').value    = a.start_at ? a.start_at.slice(0,16) : '';
      document.getElementById('modalEndAt').value      = a.end_at   ? a.end_at.slice(0,16)   : '';
      document.getElementById('modalApptDealId').value = a.deal_id  || '';
      document.getElementById('modalLocation').value   = a.location || '';
      document.getElementById('modalApptAssigned').value = a.assigned_to || '';
      document.getElementById('modalApptNotes').value  = a.notes || '';
      document.getElementById('apptModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('apptModal').style.display = 'none'; }

    document.getElementById('addApptBtn').addEventListener('click', () => openModal());
    document.getElementById('apptModal').addEventListener('click', e => {
      if (e.target === document.getElementById('apptModal')) closeModal();
    });

    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
      const title   = document.getElementById('modalApptTitle').value.trim();
      const startAt = document.getElementById('modalStartAt').value;
      if (!title)   { Toast.error('タイトルを入力してください'); return; }
      if (!startAt) { Toast.error('開始日時を入力してください'); return; }

      const editId  = document.getElementById('editApptId').value;
      const payload = {
        title,
        start_at:    new Date(startAt).toISOString(),
        end_at:      document.getElementById('modalEndAt').value ? new Date(document.getElementById('modalEndAt').value).toISOString() : null,
        deal_id:     document.getElementById('modalApptDealId').value || null,
        location:    document.getElementById('modalLocation').value.trim() || null,
        assigned_to: document.getElementById('modalApptAssigned').value.trim() || null,
        notes:       document.getElementById('modalApptNotes').value.trim() || null,
      };
      try {
        if (editId) {
          await API.appointments.update({ id: editId, ...payload });
          const idx = allAppts.findIndex(a => a.id === editId);
          if (idx >= 0) allAppts[idx] = { ...allAppts[idx], ...payload };
          Toast.success('更新しました');
        } else {
          const created = await API.appointments.create(payload);
          allAppts.push(created);
          Toast.success('アポを追加しました');
        }
        closeModal(); render();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    });

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
