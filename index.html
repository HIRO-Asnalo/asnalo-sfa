<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | アスナロ SFA</title>

</head>
<body class="app-layout">

  <!-- Sidebar -->

        ダッシュボード
      </a>
      <a href="/deals/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        案件管理
      </a>
      <a href="/customers/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        顧客管理
      </a>
      <a href="/ma/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        MAメール
      </a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        フィールド設定
      </a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">ダッシュボード</h1>
      <div class="page-actions">
        <span id="lastUpdated" class="text-sm text-muted"></span>
      </div>
    </div>

    <div class="page-body">

      <!-- KPI Stats -->
      <div class="stat-grid" id="statGrid">
        <div class="stat-card"><div class="stat-label">稼働案件数</div><div class="stat-value" id="stat-active">—</div></div>
        <div class="stat-card blue"><div class="stat-label">総顧客数</div><div class="stat-value" id="stat-customers">—</div></div>
        <div class="stat-card green"><div class="stat-label">受注率</div><div class="stat-value" id="stat-winrate">—</div><div class="stat-sub">累計</div></div>
        <div class="stat-card yellow"><div class="stat-label">今月受注予定</div><div class="stat-value" id="stat-closing">—</div><div class="stat-sub">件</div></div>
        <div class="stat-card"><div class="stat-label">今週の活動数</div><div class="stat-value" id="stat-activities">—</div></div>
      </div>

      <div class="grid-2" style="gap:20px; margin-bottom:20px;">

        <!-- フェーズ別チャート -->
        <div class="card">
          <div class="card-title">フェーズ別案件数</div>
          <canvas id="phaseChart" height="200"></canvas>
        </div>

        <!-- 直近の更新案件 -->
        <div class="card">
          <div class="card-title">
            直近の更新案件
            <a href="/deals/index.html" class="btn btn-ghost btn-sm">一覧へ</a>
          </div>
          <div id="recentDeals">
            <div class="empty-state"><div class="empty-state-sub">読み込み中...</div></div>
          </div>
        </div>

      </div>

      <!-- 直近の活動 -->
      <div class="card">
        <div class="card-title">直近の活動</div>
        <div id="recentActivities">
          <div class="empty-state"><div class="empty-state-sub">読み込み中...</div></div>
        </div>
      </div>

    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let phaseChart;

    initPage(async () => {
      try {
        const data = await API.dashboard.stats();
        renderStats(data.summary);
        renderPhaseChart(data.phase_count);
        renderRecentDeals(data.recent_deals);
        renderRecentActivities(data.recent_activities);
        document.getElementById('lastUpdated').textContent = '更新: ' + fmtDatetime(new Date().toISOString());
      } catch(e) {
        Toast.error('データ取得に失敗しました: ' + e.message);
      }
    });

    function renderStats(s) {
      document.getElementById('stat-active').textContent     = s.active_deals;
      document.getElementById('stat-customers').textContent  = s.total_customers;
      document.getElementById('stat-winrate').textContent    = s.win_rate + '%';
      document.getElementById('stat-closing').textContent    = s.closing_this_month;
      document.getElementById('stat-activities').textContent = s.week_activities;
    }

    function renderPhaseChart(phaseCount) {
      const labels = Object.keys(phaseCount);
      const data   = Object.values(phaseCount);
      const colors = ['#94a3b8','#0ea5e9','#f59e0b','#f97316','#22c55e','#ef4444'];
      const ctx    = document.getElementById('phaseChart');
      if (phaseChart) phaseChart.destroy();
      phaseChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: '#fff' }],
        },
        options: {
          plugins: { legend: { position: 'right', labels: { font: { size: 12 } } } },
          cutout: '60%',
        },
      });
    }

    function renderRecentDeals(deals) {
      const el = document.getElementById('recentDeals');
      if (!deals?.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-sub">案件がありません</div></div>';
        return;
      }
      el.innerHTML = deals.map(d => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border);">
          <div>
            <a href="/deals/detail.html?id=${d.id}" style="font-weight:600; font-size:13px; color:var(--primary); text-decoration:none;">${d.deal_name || '（無題）'}</a>
            <div style="font-size:11.5px; color:var(--text-muted);">${fmtDate(d.updated_at)}</div>
          </div>
          ${phaseBadge(d.phase)}
        </div>
      `).join('');
    }

    function renderRecentActivities(activities) {
      const el = document.getElementById('recentActivities');
      if (!activities?.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-sub">活動記録がありません</div></div>';
        return;
      }
      const typeIcon = { '電話': '📞', '訪問': '🏢', 'メール': '📧', '商談': '💼', 'メモ': '📝' };
      el.innerHTML = `<div class="timeline">${activities.map(a => `
        <div class="timeline-item">
          <div class="timeline-icon">${typeIcon[a.type] || '📝'}</div>
          <div class="timeline-content">
            <div class="timeline-meta">${fmtDate(a.activity_date)} ・ ${a.type} ・ ${a.user_name}</div>
            <div class="timeline-text">${a.content || '—'}</div>
          </div>
        </div>
      `).join('')}</div>`;
    }
  </script>
</body>
</html>
