<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ダッシュボード専用スタイル */
    .db-hero {
      background: linear-gradient(135deg, var(--primary) 0%, #2a3f72 60%, #1e2d55 100%);
      color: #fff;
      padding: 24px 28px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .db-hero-title { font-size: 20px; font-weight: 800; letter-spacing: .02em; }
    .db-hero-sub { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
    .db-hero-date { font-size: 12px; color: rgba(255,255,255,.5); text-align: right; }

    /* KPIバー */
    .kpi-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
      background: #fff;
      border-bottom: 2px solid var(--border);
    }
    .kpi-item {
      padding: 18px 20px;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .kpi-item:last-child { border-right: none; }
    .kpi-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .kpi-item.blue::before  { background: #0ea5e9; }
    .kpi-item.green::before { background: #22c55e; }
    .kpi-item.purple::before { background: #8b5cf6; }
    .kpi-item.red::before   { background: #ef4444; }
    .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
    .kpi-unit  { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-left: 3px; }
    .kpi-sub   { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

    /* セクションタイトル */
    .section-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 16px;
      background: var(--accent);
      border-radius: 2px;
      display: inline-block;
    }

    /* パイプライン */
    .pipeline-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .pipeline-row:last-child { border-bottom: none; }
    .pipeline-phase {
      font-size: 12px;
      font-weight: 700;
      width: 100px;
      flex-shrink: 0;
    }
    .pipeline-bar-wrap {
      flex: 1;
      height: 10px;
      background: var(--bg);
      border-radius: 5px;
      overflow: hidden;
    }
    .pipeline-bar {
      height: 100%;
      border-radius: 5px;
      background: var(--accent);
      transition: width .5s ease;
    }
    .pipeline-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    /* 担当者テーブル */
    .member-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .member-name { font-size: 13px; font-weight: 600; flex: 1; }
    .member-stats { display: flex; gap: 16px; }
    .member-stat { text-align: center; }
    .member-stat-val { font-size: 15px; font-weight: 700; color: var(--primary); }
    .member-stat-label { font-size: 10px; color: var(--text-muted); }

    /* 今週のアクション */
    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .action-item:last-child { border-bottom: none; }
    .action-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .action-dot.green  { background: var(--success); }
    .action-dot.red    { background: var(--danger); }
    .action-dot.purple { background: #8b5cf6; }
    .action-content { flex: 1; }
    .action-title { font-size: 13px; font-weight: 600; }
    .action-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .action-date  { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* 直近案件リスト */
    .deal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background .1s;
    }
    .deal-row:last-child { border-bottom: none; }
    .deal-row:hover { background: var(--bg); margin: 0 -14px; padding-left: 14px; padding-right: 14px; border-radius: 6px; }
    .deal-info { flex: 1; min-width: 0; }
    .deal-name { font-size: 13px; font-weight: 700; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .deal-customer { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
    .deal-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* 3カラムグリッド */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .dash-grid-2 {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">ASNALO SFA</div>
      <div class="logo-sub">営業管理システム</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        ダッシュボード
      </a>
      <a href="/deals/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        案件管理
      </a>
      <a href="/customers/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        顧客管理
      </a>
      <a href="/ma/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        MAメール
      </a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        フィールド設定
      </a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- Main -->
  <main class="main-content">

    <!-- Hero Header -->
    <div class="db-hero">
      <div>
        <div class="db-hero-title">営業ダッシュボード</div>
        <div class="db-hero-sub">株式会社アスナロ | フルサポ採用 パイプライン管理</div>
      </div>
      <div class="db-hero-date" id="lastUpdated"></div>
    </div>

    <!-- KPI バー -->
    <div class="kpi-bar" id="kpiBar">
      <div class="kpi-item">
        <div class="kpi-label">稼働案件</div>
        <div class="kpi-value" id="stat-active">—<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">受注・失注除く</div>
      </div>
      <div class="kpi-item blue">
        <div class="kpi-label">総顧客数</div>
        <div class="kpi-value" id="stat-customers">—<span class="kpi-unit">社</span></div>
        <div class="kpi-sub">登録済み</div>
      </div>
      <div class="kpi-item green">
        <div class="kpi-label">受注率</div>
        <div class="kpi-value" id="stat-winrate">—<span class="kpi-unit">%</span></div>
        <div class="kpi-sub">累計</div>
      </div>
      <div class="kpi-item purple">
        <div class="kpi-label">今月受注予定</div>
        <div class="kpi-value" id="stat-closing">—<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">クロージング含む</div>
      </div>
      <div class="kpi-item red">
        <div class="kpi-label">今週の活動</div>
        <div class="kpi-value" id="stat-activities">—<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">コンタクト数</div>
      </div>
    </div>

    <div class="page-body">

      <!-- 1段目: パイプライン + チャート + 担当者 -->
      <div class="dash-grid">

        <!-- フェーズ別パイプライン -->
        <div class="card">
          <div class="section-title">フェーズ別パイプライン</div>
          <div id="pipelineList">
            <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">読み込み中...</div>
          </div>
        </div>

        <!-- フェーズ別ドーナツ -->
        <div class="card">
          <div class="section-title">案件構成比</div>
          <canvas id="phaseChart" height="180"></canvas>
          <div id="chartLegend" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;"></div>
        </div>

        <!-- 担当者別実績 -->
        <div class="card">
          <div class="section-title">担当者別 稼働案件</div>
          <div id="memberList">
            <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">読み込み中...</div>
          </div>
        </div>

      </div>

      <!-- 2段目: 直近案件 + 活動 -->
      <div class="dash-grid-2">

        <!-- 直近の更新案件 -->
        <div class="card">
          <div class="section-title" style="justify-content:space-between;display:flex;align-items:center;">
            <span style="display:flex;align-items:center;gap:8px;"><span style="content:'';width:4px;height:16px;background:var(--accent);border-radius:2px;display:inline-block;"></span>直近の更新案件</span>
            <a href="/deals/index.html" class="btn btn-ghost btn-sm">一覧へ →</a>
          </div>
          <div id="recentDeals"></div>
        </div>

        <!-- 直近の活動 -->
        <div class="card">
          <div class="section-title">直近の活動</div>
          <div id="recentActivities"></div>
        </div>

      </div>

    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const PHASES = ['認知商談','ヒアリング','提案','クロージング','受注','失注'];
    const PHASE_COLORS = {
      '認知商談':   '#94a3b8',
      'ヒアリング': '#0ea5e9',
      '提案':       '#f59e0b',
      'クロージング': '#F59E12',
      '受注':       '#22c55e',
      '失注':       '#ef4444',
    };
    let phaseChart;

    initPage(async () => {
      try {
        const data = await API.dashboard.stats();
        renderKPIs(data.summary);
        renderPipeline(data.phase_count);
        renderChart(data.phase_count);
        renderMembers(data.recent_deals);
        renderRecentDeals(data.recent_deals);
        renderActivities(data.recent_activities);
        document.getElementById('lastUpdated').innerHTML =
          `更新日時<br>${fmtDatetime(new Date().toISOString())}`;
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    function renderKPIs(s) {
      document.getElementById('stat-active').innerHTML     = `${s.active_deals}<span class="kpi-unit">件</span>`;
      document.getElementById('stat-customers').innerHTML  = `${s.total_customers}<span class="kpi-unit">社</span>`;
      document.getElementById('stat-winrate').innerHTML    = `${s.win_rate}<span class="kpi-unit">%</span>`;
      document.getElementById('stat-closing').innerHTML    = `${s.closing_this_month}<span class="kpi-unit">件</span>`;
      document.getElementById('stat-activities').innerHTML = `${s.week_activities}<span class="kpi-unit">件</span>`;
    }

    function renderPipeline(phaseCount) {
      const el = document.getElementById('pipelineList');
      const total = Object.values(phaseCount).reduce((a,b) => a+b, 0) || 1;
      el.innerHTML = PHASES.map(phase => {
        const count = phaseCount[phase] || 0;
        const pct = Math.round((count / total) * 100);
        const color = PHASE_COLORS[phase] || '#94a3b8';
        return `
          <div class="pipeline-row">
            <div class="pipeline-phase" style="color:${color};">${phase}</div>
            <div class="pipeline-bar-wrap">
              <div class="pipeline-bar" style="width:${pct}%;background:${color};"></div>
            </div>
            <div class="pipeline-count">${count}</div>
          </div>
        `;
      }).join('');
    }

    function renderChart(phaseCount) {
      const labels = PHASES.filter(p => (phaseCount[p] || 0) > 0);
      const data   = labels.map(p => phaseCount[p] || 0);
      const colors = labels.map(p => PHASE_COLORS[p] || '#94a3b8');
      const ctx = document.getElementById('phaseChart');
      if (phaseChart) phaseChart.destroy();
      phaseChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
        options: {
          plugins: { legend: { display: false } },
          cutout: '68%',
        },
      });
      // カスタム凡例
      document.getElementById('chartLegend').innerHTML = labels.map((l, i) => `
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;">
          <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};display:inline-block;"></span>
          ${l} ${data[i]}件
        </div>
      `).join('');
    }

    function renderMembers(deals) {
      const el = document.getElementById('memberList');
      if (!deals?.length) {
        el.innerHTML = '<div style="text-align:center;padding:16px;font-size:12px;color:var(--text-muted);">データなし</div>';
        return;
      }
      // 担当者別集計
      const map = {};
      deals.forEach(d => {
        const u = d.assigned_user || '未設定';
        if (!map[u]) map[u] = { total: 0, active: 0 };
        map[u].total++;
        if (!['受注','失注'].includes(d.phase)) map[u].active++;
      });
      el.innerHTML = Object.entries(map).slice(0, 5).map(([name, s]) => `
        <div class="member-row">
          <div class="member-avatar">${name.slice(0,1)}</div>
          <div class="member-name">${name}</div>
          <div class="member-stats">
            <div class="member-stat">
              <div class="member-stat-val">${s.active}</div>
              <div class="member-stat-label">稼働</div>
            </div>
            <div class="member-stat">
              <div class="member-stat-val">${s.total}</div>
              <div class="member-stat-label">累計</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderRecentDeals(deals) {
      const el = document.getElementById('recentDeals');
      if (!deals?.length) {
        el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">案件がありません</div>';
        return;
      }
      el.innerHTML = deals.map(d => `
        <a href="/deals/detail.html?id=${d.id}" class="deal-row">
          <div class="deal-info">
            <div class="deal-name">${d.deal_name || '（無題）'}</div>
            <div class="deal-customer">${d.assigned_user || '—'}</div>
          </div>
          ${phaseBadge(d.phase)}
          <div class="deal-date">${fmtDate(d.updated_at)}</div>
        </a>
      `).join('');
    }

    function renderActivities(activities) {
      const el = document.getElementById('recentActivities');
      if (!activities?.length) {
        el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:12px;">活動なし</div>';
        return;
      }
      const dotColor = { '電話':'', '訪問':'green', 'メール':'purple', '商談':'red', 'メモ':'' };
      const typeIcon = { '電話':'📞','訪問':'🏢','メール':'📧','商談':'💼','メモ':'📝' };
      el.innerHTML = activities.slice(0, 8).map(a => `
        <div class="action-item">
          <div class="action-dot ${dotColor[a.type]||''}"></div>
          <div class="action-content">
            <div class="action-title">${typeIcon[a.type]||'📝'} ${a.content?.slice(0,40) || '—'}${a.content?.length > 40 ? '...' : ''}</div>
            <div class="action-meta">${a.type} · ${a.user_name || ''}</div>
          </div>
          <div class="action-date">${fmtDate(a.activity_date)}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
