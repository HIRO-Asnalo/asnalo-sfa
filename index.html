<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ===== ダッシュボード専用 ===== */
    .db-header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .db-header-title { font-size: 17px; font-weight: 800; color: var(--primary); }
    .db-header-sub   { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .db-header-date  { font-size: 11px; color: var(--text-muted); }

    /* KPI カード行 */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      padding: 18px 24px;
      background: var(--bg);
    }
    .kpi-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 18px;
      border-top: 3px solid var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .kpi-card.blue   { border-color: #0ea5e9; }
    .kpi-card.green  { border-color: #22c55e; }
    .kpi-card.purple { border-color: #8b5cf6; }
    .kpi-card.red    { border-color: #ef4444; }
    .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
    .kpi-val   { font-size: 36px; font-weight: 800; color: var(--text); line-height: 1; }
    .kpi-unit  { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }
    .kpi-sub   { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* ボディグリッド */
    .db-body { padding: 0 24px 24px; }

    .db-row { display: grid; gap: 14px; margin-bottom: 14px; }
    .db-row.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .db-row.col2-1 { grid-template-columns: 2fr 1fr; }

    /* セクションタイトル */
    .s-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }

    /* パイプライン */
    .pl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .pl-row:last-child { border-bottom: none; }
    .pl-label {
      width: 90px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .pl-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .pl-bar { height: 100%; border-radius: 4px; }
    .pl-count { font-size: 13px; font-weight: 700; width: 24px; text-align: right; flex-shrink: 0; }

    /* 担当者 */
    .member-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .member-row:last-child { border-bottom: none; }
    .member-av {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .member-name { flex: 1; font-size: 13px; font-weight: 600; }
    .member-badge {
      font-size: 12px; font-weight: 700;
      background: var(--bg);
      border-radius: 6px;
      padding: 2px 10px;
      color: var(--primary);
    }

    /* 案件リスト */
    .deal-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #f1f5f9;
      text-decoration: none; color: inherit;
    }
    .deal-row:last-child { border-bottom: none; }
    .deal-row:hover .deal-name { color: var(--accent); }
    .deal-info { flex: 1; min-width: 0; }
    .deal-name {
      font-size: 13px; font-weight: 700;
      color: var(--primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color .15s;
    }
    .deal-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .deal-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

    /* 活動 */
    .act-row {
      display: flex; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid #f1f5f9;
    }
    .act-row:last-child { border-bottom: none; }
    .act-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); margin-top: 5px; flex-shrink: 0;
    }
    .act-dot.blue   { background: #0ea5e9; }
    .act-dot.green  { background: #22c55e; }
    .act-dot.purple { background: #8b5cf6; }
    .act-txt  { font-size: 12.5px; font-weight: 600; flex: 1; }
    .act-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .act-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* チャート凡例 */
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .chart-legend-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-muted);
    }
    .chart-legend-dot {
      width: 9px; height: 9px; border-radius: 2px;
    }

    /* 空状態 */
    .empty { text-align: center; padding: 20px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body class="app-layout">

      <div class="logo-text">ASNALO SFA</div>
      <div class="logo-sub">営業管理システム</div>
    </div>
    <nav class="sidebar-nav">

        ダッシュボード
      </a>
      <a href="/deals/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        案件管理
      </a>
      <a href="/customers/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        顧客管理
      </a>
      <a href="/ma/index.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        MAメール
      </a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        フィールド設定
      </a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <!-- Main -->
  <main class="main-content" style="display:block;">

    <!-- ヘッダー -->
    <div class="db-header">
      <div>
        <div class="db-header-title">営業ダッシュボード</div>
        <div class="db-header-sub">株式会社アスナロ ｜ フルサポ採用 パイプライン管理</div>
      </div>
      <div class="db-header-date" id="lastUpdated">—</div>
    </div>

    <!-- KPI カード -->
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">稼働案件数</div>
        <div class="kpi-val" id="kpi-active">0<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">受注・失注除く</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">総顧客数</div>
        <div class="kpi-val" id="kpi-customers">0<span class="kpi-unit">社</span></div>
        <div class="kpi-sub">登録済み</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">受注率（累計）</div>
        <div class="kpi-val" id="kpi-winrate">0<span class="kpi-unit">%</span></div>
        <div class="kpi-sub">受注 ÷ クローズ</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">今月 受注予定</div>
        <div class="kpi-val" id="kpi-closing">0<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">クロージング含む</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">今週の活動数</div>
        <div class="kpi-val" id="kpi-activities">0<span class="kpi-unit">件</span></div>
        <div class="kpi-sub">コンタクト数</div>
      </div>
    </div>

    <!-- コンテンツ -->
    <div class="db-body">

      <!-- 1段目: パイプライン / ドーナツ / 担当者 -->
      <div class="db-row col3">

        <div class="card">
          <div class="s-title">フェーズ別パイプライン</div>
          <div id="pipelineList"><div class="empty">読み込み中...</div></div>
        </div>

        <div class="card">
          <div class="s-title">案件構成比</div>
          <canvas id="phaseChart" height="190"></canvas>
          <div class="chart-legend" id="chartLegend"></div>
        </div>

        <div class="card">
          <div class="s-title">担当者別 稼働案件</div>
          <div id="memberList"><div class="empty">読み込み中...</div></div>
        </div>

      </div>

      <!-- 2段目: 直近案件 / 活動 -->
      <div class="db-row col2-1">

        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div class="s-title" style="margin-bottom:0;">直近の更新案件</div>
            <a href="/deals/index.html" class="btn btn-ghost btn-sm">一覧 →</a>
          </div>
          <div id="recentDeals"><div class="empty">読み込み中...</div></div>
        </div>

        <div class="card">
          <div class="s-title">直近の活動</div>
          <div id="recentActivities"><div class="empty">読み込み中...</div></div>
        </div>

      </div>

    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const PHASES = ['認知商談','ヒアリング','提案','クロージング','受注','失注'];
    const COLORS = { '認知商談':'#94a3b8','ヒアリング':'#0ea5e9','提案':'#f59e0b','クロージング':'#F59E12','受注':'#22c55e','失注':'#ef4444' };
    let chart;

    initPage(async () => {
      try {
        const d = await API.dashboard.stats();
        // KPI
        document.getElementById('kpi-active').innerHTML      = `${d.summary.active_deals}<span class="kpi-unit">件</span>`;
        document.getElementById('kpi-customers').innerHTML   = `${d.summary.total_customers}<span class="kpi-unit">社</span>`;
        document.getElementById('kpi-winrate').innerHTML     = `${d.summary.win_rate}<span class="kpi-unit">%</span>`;
        document.getElementById('kpi-closing').innerHTML     = `${d.summary.closing_this_month}<span class="kpi-unit">件</span>`;
        document.getElementById('kpi-activities').innerHTML  = `${d.summary.week_activities}<span class="kpi-unit">件</span>`;
        document.getElementById('lastUpdated').textContent   = '更新: ' + fmtDatetime(new Date().toISOString());

        renderPipeline(d.phase_count);
        renderChart(d.phase_count);
        renderMembers(d.recent_deals);
        renderDeals(d.recent_deals);
        renderActivities(d.recent_activities);
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    function renderPipeline(pc) {
      const total = Object.values(pc).reduce((a,b)=>a+b,0)||1;
      document.getElementById('pipelineList').innerHTML = PHASES.map(p => {
        const n = pc[p]||0, pct = Math.round(n/total*100), c = COLORS[p];
        return `<div class="pl-row">
          <div class="pl-label" style="color:${c}">${p}</div>
          <div class="pl-bar-bg"><div class="pl-bar" style="width:${pct}%;background:${c};"></div></div>
          <div class="pl-count">${n}</div>
        </div>`;
      }).join('');
    }

    function renderChart(pc) {
      const labels = PHASES.filter(p=>(pc[p]||0)>0);
      const data   = labels.map(p=>pc[p]||0);
      const colors = labels.map(p=>COLORS[p]);
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('phaseChart'), {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor:'#fff' }] },
        options: { plugins:{ legend:{ display:false } }, cutout:'65%' },
      });
      document.getElementById('chartLegend').innerHTML = labels.map((l,i)=>`
        <div class="chart-legend-item">
          <div class="chart-legend-dot" style="background:${colors[i]};"></div>
          ${l} <strong>${data[i]}</strong>件
        </div>`).join('');
    }

    function renderMembers(deals) {
      if (!deals?.length) { document.getElementById('memberList').innerHTML='<div class="empty">データなし</div>'; return; }
      const map={};
      deals.forEach(d=>{ const u=d.assigned_user||'未設定'; if(!map[u])map[u]=0; if(!['受注','失注'].includes(d.phase))map[u]++; });
      document.getElementById('memberList').innerHTML = Object.entries(map).slice(0,6).map(([n,c])=>`
        <div class="member-row">
          <div class="member-av">${n.slice(0,1)}</div>
          <div class="member-name">${n}</div>
          <div class="member-badge">${c}件</div>
        </div>`).join('');
    }

    function renderDeals(deals) {
      if (!deals?.length) { document.getElementById('recentDeals').innerHTML='<div class="empty">案件なし</div>'; return; }
      document.getElementById('recentDeals').innerHTML = deals.map(d=>`
        <a href="/deals/detail.html?id=${d.id}" class="deal-row">
          <div class="deal-info">
            <div class="deal-name">${d.deal_name||'（無題）'}</div>
            <div class="deal-sub">${d.assigned_user||'—'}</div>
          </div>
          ${phaseBadge(d.phase)}
          <div class="deal-date">${fmtDate(d.updated_at)}</div>
        </a>`).join('');
    }

    function renderActivities(acts) {
      if (!acts?.length) { document.getElementById('recentActivities').innerHTML='<div class="empty">活動なし</div>'; return; }
      const dc = {'電話':'','訪問':'green','メール':'blue','商談':'purple','メモ':''};
      const ic = {'電話':'📞','訪問':'🏢','メール':'📧','商談':'💼','メモ':'📝'};
      document.getElementById('recentActivities').innerHTML = acts.slice(0,8).map(a=>`
        <div class="act-row">
          <div class="act-dot ${dc[a.type]||''}"></div>
          <div style="flex:1;min-width:0;">
            <div class="act-txt">${ic[a.type]||'📝'} ${(a.content||'').slice(0,35)}${a.content?.length>35?'...':''}</div>
            <div class="act-meta">${a.type} · ${a.user_name||''} · ${fmtDate(a.activity_date)}</div>
          </div>
        </div>`).join('');
    }
  </script>
</body>
</html>
