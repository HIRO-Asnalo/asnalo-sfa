<script>
// ──────────────────────────────────────────────
// 定数（Python offerbox_pdf_report.py と同一）
// ──────────────────────────────────────────────
const ACCEPTED_STATUS = "学生の承認済み";
const DECLINED_STATUSES = ["学生による辞退", "学生側の取り消し"];
const AUTO_CANCEL_STATUSES = ["自動取り消し", "企業側の取り消し", "オファー取り消し"];
const PENDING_STATUSES = ["学生の承認待ち"];

const C = {
  primary: "#2c3e50", secondary: "#4a5568",
  accent: "#4A90D9", accent2: "#E8546B",
  success: "#10b981", warning: "#f59e0b",
  danger: "#ef4444", light: "#f8fafc",
  border: "#e2e8f0", muted: "#94a3b8",
  chart_blue: "#3b82f6", chart_teal: "#14b8a6", chart_gray: "#cbd5e1",
};

// ──────────────────────────────────────────────
// ファイル選択
// ──────────────────────────────────────────────
let csvData = null;
let reportHtml = null;

const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');
const generateBtn = document.getElementById('generateBtn');

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  if (!file) return;
  Papa.parse(file, {
    encoding: 'Shift_JIS',
    complete: result => {
      if (result.errors.length && !result.data.length) {
        Papa.parse(file, {
          encoding: 'UTF-8',
          complete: r2 => finishLoad(r2.data, file.name),
          error: () => showError('CSVの読み込みに失敗しました')
        });
        return;
      }
      finishLoad(result.data, file.name);
    },
    error: () => showError('CSVの読み込みに失敗しました')
  });
}

function finishLoad(rawData, fileName) {
  // ヘッダー行を自動検出（Python の load_csv と同じロジック）
  let headerIdx = 0;
  for (let i = 0; i < Math.min(rawData.length, 10); i++) {
    const nonempty = rawData[i].filter(v => v && v.trim()).length;
    if (nonempty >= 3) { headerIdx = i; break; }
  }
  const headers = rawData[headerIdx];
  csvData = rawData.slice(headerIdx + 1)
    .filter(row => row.some(v => v && v.trim()))
    .map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });

  uploadArea.classList.add('has-file');
  document.getElementById('uploadText').textContent = `✓ ${fileName}（${csvData.length}行）`;
  generateBtn.disabled = false;
  hideError();
  showPreview();
}

function showPreview() {
  if (!csvData) return;
  const cols = detectColumns(csvData);
  const sc = cols.status;
  const total = csvData.length;
  const accepted = csvData.filter(r => r[sc] === ACCEPTED_STATUS).length;
  const declined = csvData.filter(r => DECLINED_STATUSES.includes(r[sc])).length;

  document.getElementById('previewCard').style.display = '';
  document.getElementById('previewGrid').innerHTML = `
    <div class="info-item"><div class="info-label">総送付数</div><div class="info-val">${total.toLocaleString()}</div></div>
    <div class="info-item"><div class="info-label">承認数</div><div class="info-val" style="color:var(--success)">${accepted}</div></div>
    <div class="info-item"><div class="info-label">承認率</div><div class="info-val">${total ? (accepted/total*100).toFixed(1) : 0}%</div></div>
  `;
}

// ──────────────────────────────────────────────
// 列検出（Python detect_columns と同一）
// ──────────────────────────────────────────────
function detectColumns(data) {
  if (!data.length) return {};
  const headers = Object.keys(data[0]);

  function find(...keywords) {
    for (const h of headers) {
      for (const kw of keywords) {
        if (h.includes(kw)) return h;
      }
    }
    return null;
  }

  const cols = {
    status:        find('オファー状況', 'status'),
    school:        find('学校名', '大学名', 'school'),
    division:      find('学校区分', 'division'),
    industry1:     find('志望業界1'),
    industry2:     find('志望業界2'),
    industry3:     find('志望業界3'),
    job1:          find('志望職種1'),
    job2:          find('志望職種2'),
    job3:          find('志望職種3'),
    arts_science:  find('文系/理系', '文理'),
    sender:        find('送信者'),
    offer_date:    find('オファー日時'),
    decline_reason: find('オファー辞退理由'),
    company_type:  find('志望企業タイプ'),
  };

  // 学校名を自動検出（フォールバック）
  if (!cols.school) {
    const univPat = /大学|大学院|専門|短大|高専/;
    for (const h of headers) {
      const samples = data.slice(0, 20).map(r => r[h] || '');
      if (samples.filter(v => univPat.test(v)).length >= 3) {
        cols.school = h; break;
      }
    }
  }

  if (!cols.status) throw new Error(`必須列「オファー状況」が見つかりません。列一覧: ${headers.join(', ')}`);
  return cols;
}

// ──────────────────────────────────────────────
// 集計ロジック（Python summarize_by_group 相当）
// ──────────────────────────────────────────────
function groupBy(data, keyFn, statusFn) {
  const map = {};
  for (const row of data) {
    const key = keyFn(row);
    const st  = statusFn(row);
    if (!key || key === 'nan' || key === '') continue;
    if (!map[key]) map[key] = { sent: 0, accepted: 0, declined: 0, auto_cancel: 0, pending: 0 };
    map[key].sent++;
    if (st === ACCEPTED_STATUS) map[key].accepted++;
    else if (DECLINED_STATUSES.includes(st)) map[key].declined++;
    else if (AUTO_CANCEL_STATUSES.includes(st)) map[key].auto_cancel++;
    else if (PENDING_STATUSES.includes(st)) map[key].pending++;
  }
  return Object.entries(map)
    .map(([name, v]) => ({
      name,
      ...v,
      accept_rate: v.sent ? +(v.accepted / v.sent * 100).toFixed(1) : 0,
      decline_rate: v.sent ? +(v.declined / v.sent * 100).toFixed(1) : 0,
    }))
    .sort((a, b) => b.accepted - a.accepted);
}

// 複数列（志望業界1/2/3 など）を展開して集計
function groupByMultiCol(data, colKeys, statusFn) {
  const expanded = [];
  for (const row of data) {
    const st = statusFn(row);
    const seen = new Set();
    for (const k of colKeys) {
      if (!k) continue;
      const val = (row[k] || '').trim();
      if (val && val !== 'nan' && !seen.has(val)) {
        seen.add(val);
        expanded.push({ name: val, status: st });
      }
    }
  }
  return groupBy(expanded, r => r.name, r => r.status);
}

// ──────────────────────────────────────────────
// Chart.js → base64 PNG
// ──────────────────────────────────────────────
function chartToBase64(config, width, height) {
  const canvas = document.createElement('canvas');
  canvas.width  = width  * 2;
  canvas.height = height * 2;
  canvas.style.position = 'absolute';
  canvas.style.left = '-9999px';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);
  const chart = new Chart(ctx, { ...config, options: { ...config.options, animation: false, responsive: false } });
  const b64 = canvas.toDataURL('image/png');
  chart.destroy();
  document.body.removeChild(canvas);
  return b64;
}

function chartHBar(rows, nameKey, valueKey, color, title = '', topN = 15) {
  const top = rows.slice(0, topN).reverse();
  const labels = top.map(r => r[nameKey]);
  const values = top.map(r => r[valueKey]);
  return chartToBase64({
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: color, borderWidth: 0 }]
    },
    options: {
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        title: { display: !!title, text: title, color: C.primary, font: { size: 13, weight: 'bold' } }
      },
      scales: {
        x: { display: false, grid: { display: false } },
        y: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  }, 560, Math.max(200, top.length * 26 + 60));
}

function chartGroupedBar(rows, nameKey, colsMap, title = '', topN = 12) {
  const top = rows.slice(0, topN);
  return chartToBase64({
    type: 'bar',
    data: {
      labels: top.map(r => r[nameKey]),
      datasets: colsMap.map(([key, color, label]) => ({
        label, data: top.map(r => r[key] || 0),
        backgroundColor: color, borderWidth: 0,
      }))
    },
    options: {
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 10 } } },
        title: { display: !!title, text: title, color: C.primary, font: { size: 13, weight: 'bold' } }
      },
      scales: {
        x: { ticks: { maxRotation: 35, font: { size: 9 } }, grid: { display: false } },
        y: { grid: { color: '#f0f0f0' }, ticks: { precision: 0 } }
      }
    }
  }, 640, 320);
}

function chartFunnel(total, accepted, declined, auto_cancel, pending) {
  const labels = ['送付', '承認待ち', '承認', '辞退', '自動取消'];
  const values = [total, pending, accepted, declined, auto_cancel];
  const colors = [C.chart_blue, C.warning, C.success, C.danger, C.chart_gray];
  return chartToBase64({
    type: 'bar',
    data: {
      labels: [...labels].reverse(),
      datasets: [{ data: [...values].reverse(), backgroundColor: [...colors].reverse(), borderWidth: 0 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 11 } } }
      }
    }
  }, 640, 180);
}

function chartStatusBar(statusCounts, total) {
  const statuses = statusCounts.map(s => s.status);
  const vals = statusCounts.map(s => s.count);
  const colors = [C.chart_gray, C.danger, C.warning, C.success, '#a78bfa', '#fb923c', '#6b7280'];
  return chartToBase64({
    type: 'bar',
    data: {
      labels: [...statuses].reverse(),
      datasets: [{ data: [...vals].reverse(), backgroundColor: colors.slice(0, vals.length).reverse(), borderWidth: 0 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  }, 480, Math.max(160, statuses.length * 30 + 40));
}

// ──────────────────────────────────────────────
// メイン生成処理
// ──────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

async function generate() {
  hideError();
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('progressBar').classList.add('active');
  generateBtn.disabled = true;
  setProgress(5, 'データ解析中...');

  try {
    const clientName = document.getElementById('clientName').value.trim() || 'クライアント様';
    const month = document.getElementById('reportMonth').value.trim() || '全期間';
    const cols = detectColumns(csvData);
    const sc = cols.status;
    const getStatus = r => r[sc] || '';

    // KPI
    const total = csvData.length;
    const accepted    = csvData.filter(r => r[sc] === ACCEPTED_STATUS).length;
    const declined    = csvData.filter(r => DECLINED_STATUSES.includes(r[sc])).length;
    const auto_cancel = csvData.filter(r => AUTO_CANCEL_STATUSES.includes(r[sc])).length;
    const pending     = csvData.filter(r => PENDING_STATUSES.includes(r[sc])).length;
    const accept_rate    = total ? +(accepted / total * 100).toFixed(1) : 0;
    const decline_rate   = total ? +(declined / total * 100).toFixed(1) : 0;
    const auto_cancel_rate = total ? +(auto_cancel / total * 100).toFixed(1) : 0;
    const effective_rate   = total ? +((accepted + pending) / total * 100).toFixed(1) : 0;

    // ステータス内訳
    const statusMap = {};
    csvData.forEach(r => { const s = r[sc] || ''; statusMap[s] = (statusMap[s] || 0) + 1; });
    const statusCounts = Object.entries(statusMap)
      .map(([status, count]) => ({ status, count, pct: +(count / total * 100).toFixed(1) }))
      .sort((a, b) => b.count - a.count);

    setProgress(20, '集計処理中...');

    // 大学別
    const df_univ = cols.school ? groupBy(csvData, r => r[cols.school], getStatus) : [];

    // 志望業界別
    const df_ind = groupByMultiCol(csvData,
      [cols.industry1, cols.industry2, cols.industry3].filter(Boolean), getStatus);

    // 志望職種別
    const df_job = groupByMultiCol(csvData,
      [cols.job1, cols.job2, cols.job3].filter(Boolean), getStatus);

    // 文理別
    const df_arts_science = cols.arts_science
      ? groupBy(csvData, r => r[cols.arts_science], getStatus) : [];

    // 学校区分別
    const df_division = cols.division
      ? groupBy(csvData, r => r[cols.division], getStatus) : [];

    // 志望企業タイプ別
    const df_company_type = cols.company_type
      ? groupBy(csvData, r => r[cols.company_type], getStatus) : [];

    // 辞退理由
    const declineReasonMap = {};
    if (cols.decline_reason) {
      csvData.forEach(r => {
        const v = (r[cols.decline_reason] || '').trim();
        if (v) declineReasonMap[v] = (declineReasonMap[v] || 0) + 1;
      });
    }
    const df_decline = Object.entries(declineReasonMap)
      .map(([reason, count]) => ({ reason, count, pct: +(count / Object.values(declineReasonMap).reduce((a,b)=>a+b,0) * 100).toFixed(1) }))
      .sort((a, b) => b.count - a.count);

    // 送信者別
    const df_sender = cols.sender
      ? groupBy(csvData, r => r[cols.sender], getStatus)
        .map(r => ({ sender: r.name, sent: r.sent, accepted: r.accepted, declined: r.declined, accept_rate: r.accept_rate }))
      : [];

    setProgress(40, 'グラフ生成中...');
    await new Promise(r => setTimeout(r, 50));

    // チャート生成
    const chart_status = chartStatusBar(statusCounts, total);
    const chart_funnel = chartFunnel(total, accepted, declined, auto_cancel, pending);
    const chart_univ   = df_univ.length ? chartHBar(df_univ, 'name', 'accepted', C.chart_blue, '承認数 TOP15') : '';
    const chart_ind    = df_ind.length  ? chartGroupedBar(df_ind, 'name', [['sent', C.chart_gray, '送付数'], ['accepted', C.chart_blue, '承認数']], '志望業界別 送付数・承認数') : '';
    const chart_job    = df_job.length  ? chartHBar(df_job, 'name', 'accepted', C.chart_teal, '承認数 TOP15') : '';
    const chart_as     = df_arts_science.length ? chartHBar(df_arts_science, 'name', 'sent', C.accent2, '文理別 送付数') : '';
    const chart_decline = df_decline.length ? chartHBar(df_decline.slice(0,8).map(r=>({name:r.reason,accepted:r.count})), 'name', 'accepted', C.danger, '辞退理由 TOP8') : '';

    setProgress(70, 'AI分析中（Claude）...');
    await new Promise(r => setTimeout(r, 50));

    // AI分析（Netlify Function 経由で Claude API 呼び出し）
    let aiResult = null;
    try {
      const aiRes = await fetch('/api/ai-generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'offerbox_analysis',
          data: {
            total, accepted, declined, auto_cancel, pending,
            accept_rate, decline_rate, auto_cancel_rate,
            df_univ:         df_univ.slice(0, 10),
            df_ind:          df_ind.slice(0, 10),
            df_job:          df_job.slice(0, 10),
            df_arts_science: df_arts_science.slice(0, 10),
            df_decline:      df_decline.slice(0, 5),
            df_sender:       df_sender,
          },
        }),
      });
      if (aiRes.ok) {
        const aiJson = await aiRes.json();
        const match = aiJson.text && aiJson.text.match(/\{[\s\S]*\}/);
        if (match) {
          const cleaned = match[0].replace(/,(\s*[}\]])/g, '$1');
          aiResult = JSON.parse(cleaned);
        }
      }
    } catch (e) {
      console.warn('AI分析スキップ:', e.message);
    }

    setProgress(90, 'レポート生成中...');
    await new Promise(r => setTimeout(r, 50));

    const now = new Date();
    const generated_date = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

    // HTMLレポート生成
    reportHtml = buildReportHtml({
      clientName, month, generated_date,
      total, accepted, declined, auto_cancel, pending,
      accept_rate, decline_rate, auto_cancel_rate, effective_rate,
      statusCounts, df_univ, df_ind, df_job, df_arts_science,
      df_division, df_company_type, df_decline, df_sender,
      chart_status, chart_funnel, chart_univ, chart_ind,
      chart_job, chart_as, chart_decline,
      ai: aiResult,
    });

    setProgress(100, '完了');
    document.getElementById('progressBar').classList.remove('active');

    const resultSub = `${clientName} / ${month} — 送付数: ${total.toLocaleString()} 件 | 承認率: ${accept_rate}%`;
    document.getElementById('resultSub').textContent = resultSub;
    document.getElementById('resultBox').classList.add('show');
  } catch(e) {
    document.getElementById('progressBar').classList.remove('active');
    showError(e.message);
  } finally {
    generateBtn.disabled = false;
  }
}

function openReport() {
  if (!reportHtml) return;
  const win = window.open('', '_blank');
  win.document.write(reportHtml);
  win.document.close();
  setTimeout(() => win.print(), 1200);
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = 'エラー: ' + msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }

  ${df_division.length ? `
  <div class="sub-heading">学校区分別</div>
  <table class="data-table">
    <thead><tr><th>学校区分</th><th>送付数</th><th>承認数</th><th>辞退数</th><th>承認率</th></tr></thead>
    <tbody>${divRows}</tbody>
  </table>` : ''}
</div>

${df_decline.length ? `
<!-- 6. 辞退理由 -->
<div class="page">
  ${secHeader('辞退理由分析')}
  <div class="sub-heading">辞退理由ランキング</div>
  <div class="chart-row">
    <div class="chart-container">${img(chart_decline, '辞退理由')}</div>
    <table class="data-table">
      <thead><tr><th>辞退理由</th><th>件数</th><th>割合</th></tr></thead>
      <tbody>${declineRows}</tbody>
    </table>
  </div>
</div>` : ''}

${ai ? `
<!-- 7. AI分析 -->
<div class="page">
  ${secHeader('カスタマーサクセス見解')}
  ${ai.executive_summary ? `<div class="summary-box">${ai.executive_summary}</div>` : ''}
  ${ai.insights && ai.insights.length ? `
  <div class="sub-heading">課題分析</div>
  ${ai.insights.map(item => `
    <div class="insight-card ${item.type || 'neutral'}">
      <div class="insight-title">${item.title}</div>
      <div class="insight-body">${item.body}</div>
    </div>`).join('')}` : ''}
  ${ai.recommendations && ai.recommendations.length ? `
  <div class="sub-heading">対策・ご提案</div>
  ${ai.recommendations.map(item => `
    <div class="rec-card">
      <div class="rec-priority ${item.priority || 'medium'}">${(item.priority || 'medium').toUpperCase()}</div>
      <div>
        <div class="rec-title">${item.title}</div>
        <div class="rec-body">${item.body}</div>
      </div>
    </div>`).join('')}` : ''}
  ${ai.target_strategy && ai.target_strategy.length ? `
  <div class="sub-heading">推奨ターゲット戦略</div>
  ${ai.target_strategy.map(item => {
    const rankClass = item.rank === '★★★' ? 'rank3' : item.rank === '★★☆' ? 'rank2' : 'rank1';
    return `<div class="target-card ${rankClass}">
      <div class="target-rank">${item.rank} ${item.label}</div>
      <div class="target-desc">${item.description}</div>
    </div>`;
  }).join('')}` : ''}
</div>` : ''}

<!-- CLOSING -->
<div class="page" style="display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:40vh;text-align:center">
  <div style="color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">End of Report</div>
  <div style="font-size:18px;font-weight:600;color:var(--primary);margin-bottom:8px">ご不明な点がございましたら<br>お気軽にお問い合わせください</div>
  <div style="width:40px;height:2px;background:var(--accent);margin:16px auto"></div>
  <div style="font-size:13px;color:var(--secondary)">株式会社アスナロ｜フルサポ採用</div>
</div>

</body>
</html>`;
}
</script>
</body>
</html>
