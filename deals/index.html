  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">案件管理</h1>
      <div class="page-actions">
        <div class="view-toggle">
          <button class="view-btn active" id="viewKanban" title="カンバン">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="18" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
          </button>
          <button class="view-btn" id="viewTable" title="テーブル">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        <button class="btn btn-ghost" onclick="openImportModal()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV取込
        </button>
        <button class="btn btn-ghost" id="btnExport" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV出力
        </button>
        <a href="/deals/detail.html?new=1" class="btn btn-primary">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新規案件
        </a>
      </div>
    </div>

    <div class="page-body">

      <!-- Filter Bar -->
      <div class="filter-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="案件名・顧客名で検索">
        <select class="form-select" id="phaseFilter" style="width:140px;">
          <option value="">フェーズ: すべて</option>
          <option>認知商談</option><option>ヒアリング</option><option>提案</option>
          <option>クロージング</option><option>受注</option><option>失注</option>
        </select>
        <select class="form-select" id="userFilter" style="width:160px;">
          <option value="">担当: すべて</option>
        </select>
      </div>

      <!-- Kanban View -->
      <div id="kanbanView">
        <div class="kanban-wrap" id="kanbanWrap"></div>
      </div>

      <!-- Table View -->
      <div id="tableView" class="hidden">
        <div class="card">
          <div class="table-wrap">
            <table id="dealsTable">
              <thead>
                <tr>
                  <th>案件名</th>
                  <th>顧客</th>
                  <th>フェーズ</th>
                  <th>受注予定日</th>
                  <th>担当</th>
                  <th>更新日</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="dealsBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- CSV インポートモーダル -->
  <div id="importModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:10px;padding:28px;width:500px;max-width:95vw;">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:8px;">案件CSVインポート</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">
        1行目をヘッダー行として読み込みます。<br>
        対応列: <code>案件名, 企業名, フェーズ, 担当者, 受注予定日, 見込み金額</code>
      </p>
      <input type="file" id="importFile" accept=".csv" style="margin-bottom:16px;font-size:13px;">
      <div id="importPreview" style="margin-bottom:16px;"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeImportModal()">キャンセル</button>
        <button class="btn btn-primary" id="importConfirmBtn" onclick="confirmImport()" disabled>取り込む</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const PHASES = ['認知商談', 'ヒアリング', '提案', 'クロージング', '受注', '失注'];
    let allDeals = [];
    let currentView = 'kanban';

    initPage(async () => {
      try {
        allDeals = await API.deals.list();
        populateUserFilter(allDeals);
        renderCurrentView();
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    // ===== フィルター処理 =====
    function getFiltered() {
      const q     = document.getElementById('searchInput').value.trim().toLowerCase();
      const phase = document.getElementById('phaseFilter').value;
      const user  = document.getElementById('userFilter').value;

      return allDeals.filter(d => {
        const cname = d.company_name || '';
        if (q && !d.deal_name?.toLowerCase().includes(q) && !cname.toLowerCase().includes(q)) return false;
        if (phase && d.phase !== phase) return false;
        if (user && d.assigned_user !== user) return false;
        return true;
      });
    }

    document.getElementById('searchInput').addEventListener('input', renderCurrentView);
    document.getElementById('phaseFilter').addEventListener('change', renderCurrentView);
    document.getElementById('userFilter').addEventListener('change', renderCurrentView);

    function populateUserFilter(deals) {
      const users = [...new Set(deals.map(d => d.assigned_user).filter(Boolean))];
      const sel = document.getElementById('userFilter');
      users.forEach(u => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = u;
        sel.appendChild(opt);
      });
    }

    // ===== 表示切り替え =====
    document.getElementById('viewKanban').addEventListener('click', () => {
      currentView = 'kanban';
      document.getElementById('viewKanban').classList.add('active');
      document.getElementById('viewTable').classList.remove('active');
      document.getElementById('kanbanView').classList.remove('hidden');
      document.getElementById('tableView').classList.add('hidden');
      renderKanban();
    });

    document.getElementById('viewTable').addEventListener('click', () => {
      currentView = 'table';
      document.getElementById('viewTable').classList.add('active');
      document.getElementById('viewKanban').classList.remove('active');
      document.getElementById('tableView').classList.remove('hidden');
      document.getElementById('kanbanView').classList.add('hidden');
      renderTable();
    });

    function renderCurrentView() {
      if (currentView === 'kanban') renderKanban();
      else renderTable();
    }

    // ===== カンバン =====
    function renderKanban() {
      const filtered = getFiltered();
      const wrap = document.getElementById('kanbanWrap');
      wrap.innerHTML = PHASES.map(phase => {
        const cards = filtered.filter(d => d.phase === phase);
        return `
          <div class="kanban-col">
            <div class="kanban-col-header">
              <span>${phase}</span>
              <span class="kanban-col-count">${cards.length}</span>
            </div>
            <div class="kanban-cards">
              ${cards.length ? cards.map(d => kanbanCard(d)).join('') : `<div style="text-align:center;padding:16px;font-size:12px;color:var(--text-muted);">案件なし</div>`}
            </div>
          </div>
        `;
      }).join('');

      wrap.querySelectorAll('.kanban-card').forEach(el => {
        el.addEventListener('click', () => {
          location.href = `/deals/detail.html?id=${el.dataset.id}`;
        });
      });
    }

    function kanbanCard(d) {
      const cname = d.company_name || '—';
      const days  = daysSince(d.updated_at);
      return `
        <div class="kanban-card" data-id="${d.id}">
          <div class="kanban-card-title">${d.deal_name || '（無題）'}</div>
          <div class="kanban-card-customer">${cname}</div>
          <div class="kanban-card-meta">
            <span>${d.assigned_user || '—'}</span>
            <span>${days !== null ? days + '日前' : ''}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px;">
            ${d.expected_close_date ? `<span style="font-size:11px;color:var(--text-muted);">受注予定: ${fmtDate(d.expected_close_date)}</span>` : '<span></span>'}
            ${d.expected_amount ? `<span style="font-size:12px;font-weight:700;color:var(--primary);">¥${Number(d.expected_amount).toLocaleString()}</span>` : ''}
          </div>
        </div>
      `;
    }

    // ===== テーブル =====
    function renderTable() {
      const filtered = getFiltered();
      const tbody = document.getElementById('dealsBody');
      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-text">案件がありません</div></div></td></tr>`;
        return;
      }
      tbody.innerHTML = filtered.map(d => {
        const cname = d.company_name || '—';
        return `
          <tr>
            <td><a href="/deals/detail.html?id=${d.id}" style="font-weight:600;color:var(--primary);text-decoration:none;">${d.deal_name || '（無題）'}</a></td>
            <td>${cname}</td>
            <td>${phaseBadge(d.phase)}</td>
            <td>${fmtDate(d.expected_close_date)}</td>
            <td>${d.assigned_user || '—'}</td>
            <td>${fmtDate(d.updated_at)}</td>
            <td>
              <a href="/deals/detail.html?id=${d.id}" class="btn btn-ghost btn-sm">詳細</a>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ===== CSV エクスポート =====
    function exportCSV() {
      if (!allDeals.length) { Toast.error('エクスポートするデータがありません'); return; }
      const headers = ['案件名','企業名','フェーズ','担当者','受注予定日','見込み金額','作成日','更新日'];
      const rows = allDeals.map(d => [
        d.deal_name || '', d.company_name || '', d.phase || '',
        d.assigned_user || '', d.expected_close_date || '',
        d.expected_amount || '',
        (d.created_at || '').slice(0,10), (d.updated_at || '').slice(0,10),
      ]);
      downloadCSV('案件一覧.csv', headers, rows);
    }

    function downloadCSV(filename, headers, rows) {
      const bom = '\uFEFF';
      const csv = bom + [headers, ...rows]
        .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
        .join('\r\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ===== CSV インポート =====
    let importData = [];

    function openImportModal() {
      document.getElementById('importModal').style.display = 'flex';
      document.getElementById('importFile').value = '';
      document.getElementById('importPreview').innerHTML = '';
      document.getElementById('importConfirmBtn').disabled = true;
      importData = [];
    }

    function closeImportModal() {
      document.getElementById('importModal').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('importFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const text = ev.target.result.replace(/^\uFEFF/, '');
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) { document.getElementById('importPreview').innerHTML = '<p style="color:var(--danger);font-size:12px;">データ行がありません</p>'; return; }

          const parseRow = (line) => {
            const result = []; let cur = ''; let inQ = false;
            for (const ch of line) {
              if (ch === '"') { inQ = !inQ; }
              else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
              else { cur += ch; }
            }
            result.push(cur.trim());
            return result;
          };

          const headers = parseRow(lines[0]);
          const COL = {
            deal_name:           ['案件名','deal_name'],
            company_name:        ['企業名','company_name'],
            phase:               ['フェーズ','phase'],
            assigned_user:       ['担当者','assigned_user'],
            expected_close_date: ['受注予定日','expected_close_date'],
            expected_amount:     ['見込み金額','expected_amount'],
          };

          importData = lines.slice(1).map(line => {
            const cols = parseRow(line);
            const row = {};
            for (const [key, names] of Object.entries(COL)) {
              const idx = headers.findIndex(h => names.includes(h.replace(/"/g,'')));
              if (idx >= 0) row[key] = (cols[idx] || '').replace(/"/g,'');
            }
            return row;
          }).filter(r => r.deal_name || r.company_name);

          const preview = importData.slice(0, 5).map(r =>
            `<tr><td>${r.deal_name||''}</td><td>${r.company_name||''}</td><td>${r.phase||''}</td><td>${r.expected_amount ? '¥'+Number(r.expected_amount).toLocaleString() : ''}</td></tr>`
          ).join('');
          document.getElementById('importPreview').innerHTML = `
            <p style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">${importData.length}件を取り込みます（プレビュー: 最大5件）</p>
            <table style="width:100%;font-size:12px;border-collapse:collapse;">
              <thead><tr style="background:#f8fafc;"><th style="padding:4px 8px;text-align:left;">案件名</th><th style="padding:4px 8px;text-align:left;">企業名</th><th style="padding:4px 8px;text-align:left;">フェーズ</th><th style="padding:4px 8px;text-align:right;">見込み金額</th></tr></thead>
              <tbody>${preview}</tbody>
            </table>`;
          document.getElementById('importConfirmBtn').disabled = importData.length === 0;
        };
        reader.readAsText(file, 'UTF-8');
      });
    });

    async function confirmImport() {
      if (!importData.length) return;
      document.getElementById('importConfirmBtn').disabled = true;
      Loading.show();
      let ok = 0, ng = 0;
      for (const row of importData) {
        try {
          await API.deals.create(row);
          ok++;
        } catch(e) { ng++; }
      }
      Loading.hide();
      closeImportModal();
      Toast.success(`${ok}件取り込み完了${ng ? `（${ng}件エラー）` : ''}`);
      allDeals = await API.deals.list();
      renderCurrentView();
    }
  </script>
</body>
