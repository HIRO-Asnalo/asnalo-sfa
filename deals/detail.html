  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="/deals/index.html" style="color:var(--text-muted);text-decoration:none;font-size:13px;">← 案件一覧</a>
        <h1 class="page-title" id="pageTitle">案件詳細</h1>
        <span id="phaseBadgeHeader"></span>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost btn-sm" id="aiProposalBtn" style="display:none;">🤖 提案を生成</button>
        <button class="btn btn-ghost btn-sm" id="aiActionBtn" style="display:none;">🤖 アクション提案</button>
        <button class="btn btn-danger btn-sm" id="deleteBtn" style="display:none;">削除</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>

    <div class="page-body">
      <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;">

        <!-- 左: 案件フォーム -->
        <div>
          <!-- 企業名（顧客登録不要・直入力） -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-title">企業情報</div>
            <div style="display:grid;grid-template-columns:1fr 200px;gap:12px;margin-bottom:12px;">
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">企業名 <span class="required">*</span></label>
                <input type="text" class="form-input" id="deal_company_name" placeholder="株式会社〇〇">
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">見込み金額（円）</label>
                <input type="number" class="form-input" id="deal_expected_amount" placeholder="0" min="0" step="1000">
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label">顧客（CRM）に紐づける</label>
              <select class="form-select" id="deal_customer_id">
                <option value="">紐づけない</option>
              </select>
            </div>
          </div>

          <!-- FS案件フォーム（フィールド設定から動的生成） -->
          <div class="card" id="dealFormCard">
            <div class="card-title">FS案件情報</div>
            <div id="dealFormFields"></div>
          </div>
        </div>

        <!-- 右: タスク + 活動履歴 -->
        <div>

          <!-- ネクストアクション -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
              <span>ネクストアクション</span>
              <button class="btn btn-secondary btn-sm" id="addTaskToggleBtn">+ 追加</button>
            </div>

            <!-- タスク追加フォーム（初期非表示） -->
            <div id="taskAddForm" style="display:none;margin-bottom:14px;padding:12px;background:var(--bg);border-radius:8px;">
              <div class="form-group" style="margin-bottom:8px;">
                <textarea class="form-textarea" id="taskContent" placeholder="アクション内容..." style="min-height:60px;"></textarea>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label" style="font-size:11px;">期日</label>
                  <input type="date" class="form-input" id="taskDueDate">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label" style="font-size:11px;">担当者</label>
                  <input type="text" class="form-input" id="taskAssignedTo" placeholder="メールアドレス">
                </div>
              </div>
              <div style="display:flex;gap:8px;">
                <button class="btn btn-primary btn-sm" id="saveTaskBtn">保存</button>
                <button class="btn btn-ghost btn-sm" id="cancelTaskBtn">キャンセル</button>
              </div>
            </div>

            <!-- タスクリスト -->
            <div id="taskList">
              <div style="text-align:center;font-size:12px;color:var(--text-muted);padding:12px;">タスクなし</div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">活動履歴</div>

            <!-- 活動追加フォーム -->
            <div style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border);">
              <div class="form-group" style="margin-bottom:8px;">
                <select class="form-select" id="activityType">
                  <option>メモ</option><option>電話</option><option>訪問</option>
                  <option>メール</option><option>商談</option>
                </select>
              </div>
              <div class="form-group" style="margin-bottom:8px;">
                <input type="date" class="form-input" id="activityDate">
              </div>
              <div class="form-group" style="margin-bottom:8px;">
                <textarea class="form-textarea" id="activityContent" placeholder="内容を入力..." style="min-height:70px;"></textarea>
              </div>
              <button class="btn btn-secondary btn-sm w-full" id="addActivityBtn">追加</button>
            </div>

            <!-- 活動リスト -->
            <div id="activityList">
              <div class="empty-state"><div class="empty-state-sub">活動記録なし</div></div>
            </div>
          </div>

          <!-- 添付ファイル -->
          <div class="card" style="margin-top:16px;">
            <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
              <span>添付ファイル</span>
              <label class="btn btn-secondary btn-sm" style="cursor:pointer;">
                + 追加
                <input type="file" id="dealFileInput" style="display:none;" onchange="handleDealFileUpload(this)">
              </label>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;display:none;" id="dealFileMetaRow">
              <select class="form-select" id="dealFileCat" style="font-size:12px;">
                <option>提案書</option><option>契約書</option><option>請求書</option>
                <option>資料</option><option>議事録</option><option>その他</option>
              </select>
              <button class="btn btn-primary btn-sm" id="dealFileUploadBtn">アップロード</button>
            </div>
            <div id="dealFileList"><div style="font-size:12px;color:var(--text-muted);text-align:center;padding:12px;">添付ファイルなし</div></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const dealId  = getParam('id');
    const isNew   = !!getParam('new');
    let deal      = {};
    let fields    = [];

    initPage(async (user) => {
      // 今日の日付をデフォルトに
      document.getElementById('activityDate').value = new Date().toISOString().slice(0, 10);

      Loading.show();
      try {
        const [fieldsData, customerList] = await Promise.all([
          API.fields.list('deal'),
          API.customers.list(),
        ]);
        fields = fieldsData;

        // 顧客セレクト
        const custSel = document.getElementById('deal_customer_id');
        customerList.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.company_name || c.contact_name || c.id;
          custSel.appendChild(opt);
        });

        if (!isNew && dealId) {
          deal = await API.deals.get(dealId);
          document.getElementById('pageTitle').textContent = deal.deal_name || '（無題）';
          document.getElementById('phaseBadgeHeader').innerHTML = phaseBadge(deal.phase);
          document.getElementById('deleteBtn').style.display = 'inline-flex';
          document.getElementById('aiProposalBtn').style.display = 'inline-flex';
          document.getElementById('aiActionBtn').style.display = 'inline-flex';
          document.getElementById('deal_company_name').value = deal.company_name || '';
          if (deal.expected_amount != null) document.getElementById('deal_expected_amount').value = deal.expected_amount;
          if (deal.customer_id) custSel.value = deal.customer_id;
          loadActivities();
          loadDealFiles();
        } else {
          document.getElementById('pageTitle').textContent = '新規案件';
          deal = { assigned_user: user?.email || '' };
        }

        renderFormFields(fields, deal);

      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    });

    // ===== フォームフィールド動的生成 =====
    function renderFormFields(fields, data) {
      const container = document.getElementById('dealFormFields');
      // セクション分け（BASEフィールド、BANT、採用情報、進捗）
      const sections = [
        { label: '基本情報', keys: ['deal_name','pattern','phase','expected_close_date','channel','checklist','appointment_date','appointment_bg','first_visit_date','proposal_date','meeting3','meeting4'] },
        { label: 'BANT', keys: ['budget','authority','needs','timeframe','competitor','human_resources'] },
        { label: '採用情報', keys: ['hire_count','job_types','hire_target','past_results'] },
        { label: '商談詳細', keys: ['identify_pain','pain_assumption','red_flag','selection_month','joy_seeds','grip_point'] },
        { label: '結果', keys: ['loss_reason','screen2_fail','screen3_fail','screen4_fail','resign_reason','final_fail'] },
        { label: 'アクション', keys: ['next_action','assigned_user','contact_person','agency','tags','memo'] },
      ];

      container.innerHTML = sections.map(sec => {
        const secFields = sec.keys
          .map(k => fields.find(f => f.field_key === k))
          .filter(Boolean);
        if (!secFields.length) return '';
        return `
          <div class="form-section">
            <div class="form-section-title">${sec.label}</div>
            <div class="form-grid">${secFields.map(f => renderField(f, data[f.field_key])).join('')}</div>
          </div>
        `;
      }).join('');

      // その他（セクション未分類）
      const categorized = sections.flatMap(s => s.keys);
      const others = fields.filter(f => !categorized.includes(f.field_key));
      if (others.length) {
        container.innerHTML += `
          <div class="form-section">
            <div class="form-section-title">その他</div>
            <div class="form-grid">${others.map(f => renderField(f, data[f.field_key])).join('')}</div>
          </div>
        `;
      }
    }

    function renderField(field, value = '') {
      const required = field.required === 'true';
      const label = `<label class="form-label" for="f_${field.field_key}">${field.label}${required ? '<span class="required">*</span>' : ''}</label>`;
      let input = '';
      const opts = field.options ? field.options.split(',') : [];

      switch(field.type) {
        case 'textarea':
          input = `<textarea class="form-textarea" id="f_${field.field_key}" name="${field.field_key}" ${required ? 'required' : ''}>${value}</textarea>`;
          break;
        case 'date':
          input = `<input type="date" class="form-input" id="f_${field.field_key}" name="${field.field_key}" value="${value}" ${required ? 'required' : ''}>`;
          break;
        case 'select':
          input = `<select class="form-select" id="f_${field.field_key}" name="${field.field_key}" ${required ? 'required' : ''}>
            <option value="">選択してください</option>
            ${opts.map(o => `<option ${value === o.trim() ? 'selected' : ''}>${o.trim()}</option>`).join('')}
          </select>`;
          break;
        case 'multiselect':
          const vals = value ? value.split(',') : [];
          input = `<div style="display:flex;flex-wrap:wrap;gap:6px;" id="f_${field.field_key}" data-name="${field.field_key}">
            ${opts.map(o => `<label style="display:flex;align-items:center;gap:4px;font-size:12.5px;">
              <input type="checkbox" value="${o.trim()}" ${vals.includes(o.trim()) ? 'checked' : ''}> ${o.trim()}
            </label>`).join('')}
          </div>`;
          break;
        case 'number':
          input = `<input type="number" class="form-input" id="f_${field.field_key}" name="${field.field_key}" value="${value}" ${required ? 'required' : ''}>`;
          break;
        case 'email':
          input = `<input type="email" class="form-input" id="f_${field.field_key}" name="${field.field_key}" value="${value}" ${required ? 'required' : ''}>`;
          break;
        case 'url':
          input = `<input type="url" class="form-input" id="f_${field.field_key}" name="${field.field_key}" value="${value}" ${required ? 'required' : ''}>`;
          break;
        default: // text, user
          input = `<input type="text" class="form-input" id="f_${field.field_key}" name="${field.field_key}" value="${value}" ${required ? 'required' : ''}>`;
      }

      const isLong = ['textarea'].includes(field.type) || ['needs','identify_pain','pain_assumption','red_flag','next_action','memo','joy_seeds','grip_point','loss_reason'].includes(field.field_key);
      return `<div class="form-group ${isLong ? 'form-full' : ''}">${label}${input}</div>`;
    }

    // ===== 保存 =====
    document.getElementById('saveBtn').addEventListener('click', async () => {
      Loading.show();
      try {
        const data = collectFormData();
        data.company_name = document.getElementById('deal_company_name').value.trim();
        if (!data.company_name) { Toast.error('企業名を入力してください'); Loading.hide(); return; }
        const amtVal = document.getElementById('deal_expected_amount').value;
        data.expected_amount = amtVal !== '' ? parseInt(amtVal) : null;
        const custId = document.getElementById('deal_customer_id').value;
        if (custId) data.customer_id = custId;

        if (isNew || !dealId) {
          const created = await API.deals.create(data);
          Toast.success('案件を作成しました');
          location.href = `/deals/detail.html?id=${created.id}`;
        } else {
          await API.deals.update({ id: dealId, ...data });
          Toast.success('保存しました');
          document.getElementById('phaseBadgeHeader').innerHTML = phaseBadge(data.phase);
        }
      } catch(e) {
        if (e.status === 409 && e.data?.duplicate) {
          Loading.hide();
          const go = confirm(`⚠️ 重複チェック\n${e.data.error}\n\nそれでも登録しますか？`);
          if (go) {
            Loading.show();
            try {
              const data2 = collectFormData();
              data2.company_name = document.getElementById('deal_company_name').value.trim();
              const amtVal = document.getElementById('deal_expected_amount').value;
              data2.expected_amount = amtVal !== '' ? parseInt(amtVal) : null;
              const custId = document.getElementById('deal_customer_id').value;
              if (custId) data2.customer_id = custId;
              data2.force = true;
              const created = await API.deals.create(data2);
              Toast.success('案件を作成しました');
              location.href = `/deals/detail.html?id=${created.id}`;
            } catch(e2) {
              Toast.error('保存エラー: ' + e2.message);
            } finally {
              Loading.hide();
            }
          }
          return;
        }
        Toast.error('保存エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    });

    function collectFormData() {
      const data = {};
      fields.forEach(f => {
        if (f.type === 'multiselect') {
          const el = document.getElementById('f_' + f.field_key);
          if (el) {
            const checked = [...el.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
            data[f.field_key] = checked.join(',');
          }
        } else {
          const el = document.getElementById('f_' + f.field_key);
          if (el) data[f.field_key] = el.value;
        }
      });
      return data;
    }

    // ===== 削除 =====
    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!confirm('この案件を削除しますか？この操作は取り消せません。')) return;
      Loading.show();
      try {
        await API.deals.delete(dealId);
        Toast.success('削除しました');
        location.href = '/deals/index.html';
      } catch(e) {
        Toast.error('削除エラー: ' + e.message);
        Loading.hide();
      }
    });

    // ===== ネクストアクション（タスク） =====
    document.getElementById('addTaskToggleBtn').addEventListener('click', () => {
      const form = document.getElementById('taskAddForm');
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
      if (form.style.display === 'block') {
        // 担当者デフォルト = ログインユーザー
        const user = netlifyIdentity.currentUser();
        if (user?.email) document.getElementById('taskAssignedTo').value = user.email;
      }
    });
    document.getElementById('cancelTaskBtn').addEventListener('click', () => {
      document.getElementById('taskAddForm').style.display = 'none';
    });

    document.getElementById('saveTaskBtn').addEventListener('click', async () => {
      const content = document.getElementById('taskContent').value.trim();
      if (!content) { Toast.error('内容を入力してください'); return; }
      if (!dealId) { Toast.error('先に案件を保存してください'); return; }
      try {
        await API.activities.create({
          deal_id:     dealId,
          is_task:     true,
          type:        'タスク',
          content,
          due_date:    document.getElementById('taskDueDate').value || null,
          assigned_to: document.getElementById('taskAssignedTo').value.trim() || null,
          status:      'pending',
        });
        document.getElementById('taskContent').value = '';
        document.getElementById('taskDueDate').value = '';
        document.getElementById('taskAddForm').style.display = 'none';
        Toast.success('タスクを追加しました');
        loadActivities();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    });

    async function toggleTaskDone(id, currentStatus) {
      try {
        await API.activities.update({ id, status: currentStatus === 'done' ? 'pending' : 'done' });
        loadActivities();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    }

    function renderTasks(items) {
      const el = document.getElementById('taskList');
      const tasks = items.filter(a => a.is_task);
      if (!tasks.length) {
        el.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:12px;">タスクなし</div>';
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      el.innerHTML = tasks.map(t => {
        const done = t.status === 'done';
        const overdue = t.due_date && t.due_date < today && !done;
        const dueColor = overdue ? '#ef4444' : (t.due_date === today ? '#f59e0b' : 'var(--text-muted)');
        return `
          <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
            <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleTaskDone('${t.id}','${t.status}')"
              style="margin-top:3px;cursor:pointer;width:15px;height:15px;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;color:var(--text);${done ? 'text-decoration:line-through;opacity:.5;' : ''}">${t.content}</div>
              <div style="font-size:11px;color:${dueColor};margin-top:3px;">
                ${t.due_date ? (overdue ? '⚠️ 期限超過: ' : '期日: ') + fmtDate(t.due_date) : '期日なし'}
                ${t.assigned_to ? ' ・ ' + t.assigned_to : ''}
              </div>
            </div>
            <button onclick="deleteTask('${t.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:0 2px;flex-shrink:0;" title="削除">×</button>
          </div>`;
      }).join('');
    }

    async function deleteTask(id) {
      if (!confirm('このタスクを削除しますか？')) return;
      try {
        await API.activities.delete(id);
        loadActivities();
      } catch(e) {
        Toast.error('削除エラー: ' + e.message);
      }
    }

    // ===== 活動履歴 =====
    async function loadActivities() {
      if (!dealId) return;
      const all = await API.activities.listByDeal(dealId);
      renderTasks(all);
      renderActivities(all.filter(a => !a.is_task));
    }

    function renderActivities(activities) {
      const el = document.getElementById('activityList');
      if (!activities?.length) {
        el.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:16px;">活動記録なし</div>';
        return;
      }
      const typeIcon = { '電話': '📞', '訪問': '🏢', 'メール': '📧', '商談': '💼', 'メモ': '📝' };
      el.innerHTML = `<div class="timeline">${activities.map(a => `
        <div class="timeline-item">
          <div class="timeline-icon">${typeIcon[a.type] || '📝'}</div>
          <div class="timeline-content">
            <div class="timeline-meta">${fmtDate(a.activity_date)} ・ ${a.type}</div>
            <div class="timeline-text">${a.content || '—'}</div>
          </div>
        </div>
      `).join('')}</div>`;
    }

    document.getElementById('addActivityBtn').addEventListener('click', async () => {
      const content = document.getElementById('activityContent').value.trim();
      if (!content) { Toast.error('内容を入力してください'); return; }
      if (!dealId) { Toast.error('先に案件を保存してください'); return; }
      try {
        await API.activities.create({
          deal_id: dealId,
          type: document.getElementById('activityType').value,
          content,
          activity_date: document.getElementById('activityDate').value,
        });
        document.getElementById('activityContent').value = '';
        Toast.success('活動を追加しました');
        loadActivities();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    });
    // ===== AI モーダル =====
    function showAiModal(title, text) {
      const existing = document.getElementById('aiModal');
      if (existing) existing.remove();

      const modal = document.createElement('div');
      modal.id = 'aiModal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = `
        <div style="background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);">
          <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:15px;font-weight:800;color:var(--primary);">🤖 ${title}</div>
            <button onclick="document.getElementById('aiModal').remove()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);">×</button>
          </div>
          <div style="padding:24px;overflow-y:auto;flex:1;">
            <div id="aiModalContent" style="font-size:13.5px;line-height:1.8;white-space:pre-wrap;color:var(--text);">${text}</div>
          </div>
          <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;">
            <button onclick="navigator.clipboard.writeText(document.getElementById('aiModalContent').textContent).then(()=>Toast.success('コピーしました'))" class="btn btn-secondary btn-sm">コピー</button>
            <button onclick="document.getElementById('aiModal').remove()" class="btn btn-primary btn-sm">閉じる</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    async function runAi(type, title) {
      const data = { ...deal, ...collectFormData() };
      data.company_name = document.getElementById('deal_company_name').value.trim();
      Loading.show();
      try {
        const res = await API.ai.generate(type, data);
        showAiModal(title, res.text);
      } catch(e) {
        Toast.error('AI生成エラー: ' + e.message);
      } finally {
        Loading.hide();
      }
    }

    document.getElementById('aiProposalBtn').addEventListener('click', () => runAi('deal_proposal', '提案内容を生成'));
    document.getElementById('aiActionBtn').addEventListener('click',   () => runAi('deal_action',   'ネクストアクションを提案'));

    // ===== 添付ファイル =====
    let _pendingFile = null;

    function handleDealFileUpload(input) {
      if (!input.files[0]) return;
      _pendingFile = input.files[0];
      const row = document.getElementById('dealFileMetaRow');
      row.style.display = 'grid';
    }

    document.getElementById('dealFileUploadBtn').addEventListener('click', async () => {
      if (!_pendingFile) return;
      if (!dealId) { Toast.error('先に案件を保存してください'); return; }
      const btn = document.getElementById('dealFileUploadBtn');
      btn.disabled = true; btn.textContent = '送信中...';
      try {
        const { signed_url } = await API.documents.presign({
          name:      _pendingFile.name,
          category:  document.getElementById('dealFileCat').value,
          file_type: _pendingFile.type || 'application/octet-stream',
          file_size: _pendingFile.size,
          deal_id:   dealId,
        });
        const res = await fetch(signed_url, {
          method:  'PUT',
          headers: { 'Content-Type': _pendingFile.type || 'application/octet-stream' },
          body:    _pendingFile,
        });
        if (!res.ok) throw new Error('アップロード失敗');
        document.getElementById('dealFileInput').value = '';
        document.getElementById('dealFileMetaRow').style.display = 'none';
        _pendingFile = null;
        Toast.success('アップロードしました');
        loadDealFiles();
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'アップロード';
      }
    });

    async function loadDealFiles() {
      if (!dealId) return;
      try {
        const files = await API.documents.list({ deal_id: dealId });
        renderDealFiles(files);
      } catch(e) { console.error('file load error', e); }
    }

    function renderDealFiles(files) {
      const el = document.getElementById('dealFileList');
      if (!files.length) {
        el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:12px;">添付ファイルなし</div>';
        return;
      }
      el.innerHTML = files.map(f => `
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:16px;">📄</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;color:var(--primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.name}</div>
            <div style="font-size:11px;color:var(--text-muted);">${f.category} ・ ${fmtDate(f.created_at)}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="downloadDealFile('${f.id}','${f.name.replace(/'/g,'')}')">DL</button>
          <button onclick="deleteDealFile('${f.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;">×</button>
        </div>`).join('');
    }

    async function downloadDealFile(id, name) {
      try {
        const { url } = await API.documents.getUrl(id);
        const a = document.createElement('a'); a.href = url; a.download = name; a.target = '_blank'; a.click();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    }

    async function deleteDealFile(id) {
      if (!confirm('削除しますか？')) return;
      try { await API.documents.delete(id); loadDealFiles(); Toast.success('削除しました'); }
      catch(e) { Toast.error('エラー: ' + e.message); }
    }
  </script>
</body>
</html>
