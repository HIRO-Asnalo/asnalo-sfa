<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理 | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .task-group-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 16px 0 8px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-group-title .count {
      font-size: 11px;
      font-weight: 700;
      background: var(--bg);
      border-radius: 10px;
      padding: 1px 8px;
      color: var(--text-muted);
    }
    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row.done .task-text { text-decoration: line-through; opacity: .45; }
    .task-check {
      width: 17px; height: 17px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .task-text { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; }
    .task-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
    .task-meta .overdue { color: #ef4444; font-weight: 700; }
    .task-meta .today   { color: #f59e0b; font-weight: 700; }
    .task-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
    .task-del:hover { color: #ef4444; }

    .filter-bar-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .seg-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
    }
    .seg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .empty-tasks {
      text-align: center;
      padding: 48px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">ASNALO SFA</div><div class="logo-sub">営業管理システム</div></div>
    <nav class="sidebar-nav">

      <a href="/deals/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>案件管理</a>
      <a href="/customers/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>顧客管理</a>
      <a href="/tasks/index.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><polyline points="9 11 12 14 22 4"/><line x1="3" y1="10" x2="9" y2="10"/></svg>タスク管理</a>
      <a href="/ma/index.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>MAメール</a>
      <div class="nav-section">設定</div>
      <a href="/settings/fields.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>フィールド設定</a>
    </nav>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">タスク管理</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">全社共通タスク（案件・顧客に紐づかない業務）</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="addTaskBtn">+ タスクを追加</button>
      </div>
    </div>

    <div class="page-body">

      <!-- フィルターバー -->
      <div class="filter-bar-top">
        <button class="seg-btn active" data-scope="mine" onclick="setScope('mine',this)">自分のタスク</button>
        <button class="seg-btn" data-scope="all" onclick="setScope('all',this)">全員</button>
        <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
        <button class="seg-btn active" data-status="pending" onclick="setStatus('pending',this)">未完了</button>
        <button class="seg-btn" data-status="done" onclick="setStatus('done',this)">完了済み</button>
        <div style="flex:1;"></div>
        <input type="text" class="search-input" id="taskSearch" placeholder="タスクを検索" style="width:200px;" oninput="renderTasks()">
      </div>

      <!-- タスクリスト -->
      <div class="card">
        <div id="taskContainer"><div class="empty-tasks">読み込み中...</div></div>
      </div>

    </div>
  </main>

  <!-- タスク追加モーダル -->
  <div id="taskModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;width:460px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.18);">
      <div style="font-size:15px;font-weight:800;color:var(--primary);margin-bottom:20px;">タスクを追加</div>
      <input type="hidden" id="editTaskId">
      <div class="form-group">
        <label class="form-label">内容 <span class="required">*</span></label>
        <textarea class="form-textarea" id="modalContent" placeholder="タスクの内容を入力..." style="min-height:80px;"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">期日</label>
          <input type="date" class="form-input" id="modalDueDate">
        </div>
        <div class="form-group">
          <label class="form-label">担当者</label>
          <input type="text" class="form-input" id="modalAssignedTo" placeholder="メールアドレス">
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" id="modalSaveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let allTasks = [];
    let currentScope  = 'mine';   // mine | all
    let currentStatus = 'pending'; // pending | done
    let myEmail = '';

    initPage(async (user) => {
      myEmail = user?.email || '';
      await load();
    });

    async function load() {
      try {
        allTasks = await API.activities.listStandalone();
        renderTasks();
      } catch(e) {
        Toast.error('読み込みエラー: ' + e.message);
      }
    }

    function setScope(scope, btn) {
      currentScope = scope;
      document.querySelectorAll('[data-scope]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function setStatus(status, btn) {
      currentStatus = status;
      document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function renderTasks() {
      const q = (document.getElementById('taskSearch').value || '').toLowerCase();
      const today = new Date().toISOString().slice(0, 10);
      const weekEnd = new Date(Date.now() + 6 * 86400000).toISOString().slice(0, 10);

      let tasks = allTasks.filter(t => {
        if (currentStatus === 'done'    && t.status !== 'done')    return false;
        if (currentStatus === 'pending' && t.status === 'done')    return false;
        if (currentScope  === 'mine'   && t.assigned_to !== myEmail) return false;
        if (q && !t.content?.toLowerCase().includes(q))           return false;
        return true;
      });

      if (!tasks.length) {
        document.getElementById('taskContainer').innerHTML = '<div class="empty-tasks">タスクがありません</div>';
        return;
      }

      if (currentStatus === 'done') {
        // 完了済みはフラットに表示
        document.getElementById('taskContainer').innerHTML = tasks.map(t => taskRow(t, today)).join('');
        return;
      }

      // 未完了: 期日グループ分け
      const groups = [
        { key: 'overdue',  label: '⚠️ 期限超過',  tasks: tasks.filter(t => t.due_date && t.due_date < today) },
        { key: 'today',    label: '今日',          tasks: tasks.filter(t => t.due_date === today) },
        { key: 'week',     label: '今週',          tasks: tasks.filter(t => t.due_date && t.due_date > today && t.due_date <= weekEnd) },
        { key: 'later',    label: 'それ以降',       tasks: tasks.filter(t => t.due_date && t.due_date > weekEnd) },
        { key: 'nodate',   label: '期日なし',       tasks: tasks.filter(t => !t.due_date) },
      ].filter(g => g.tasks.length);

      document.getElementById('taskContainer').innerHTML = groups.map(g => `
        <div>
          <div class="task-group-title">${g.label}<span class="count">${g.tasks.length}</span></div>
          ${g.tasks.map(t => taskRow(t, today)).join('')}
        </div>
      `).join('');
    }

    function taskRow(t, today) {
      const done    = t.status === 'done';
      const overdue = t.due_date && t.due_date < today && !done;
      const isToday = t.due_date === today && !done;
      const dueCls  = overdue ? 'overdue' : isToday ? 'today' : '';
      const dueLabel = t.due_date
        ? (overdue ? '⚠️ ' : '') + fmtDate(t.due_date)
        : '期日なし';
      return `
        <div class="task-row ${done ? 'done' : ''}" id="trow-${t.id}">
          <input type="checkbox" class="task-check" ${done ? 'checked' : ''}
            onchange="toggleDone('${t.id}','${t.status}')">
          <div style="flex:1;min-width:0;">
            <div class="task-text">${escHtml(t.content || '')}</div>
            <div class="task-meta">
              <span class="${dueCls}">${dueLabel}</span>
              ${t.assigned_to ? `<span>担当: ${escHtml(t.assigned_to)}</span>` : ''}
            </div>
          </div>
          <button class="task-del" onclick="openEdit('${t.id}')" title="編集" style="font-size:14px;color:var(--text-muted);">✎</button>
          <button class="task-del" onclick="deleteTask('${t.id}')" title="削除">×</button>
        </div>`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ===== CRUD =====
    async function toggleDone(id, status) {
      const newStatus = status === 'done' ? 'pending' : 'done';
      try {
        await API.activities.update({ id, status: newStatus });
        const t = allTasks.find(x => x.id === id);
        if (t) t.status = newStatus;
        renderTasks();
      } catch(e) { Toast.error('更新エラー: ' + e.message); }
    }

    async function deleteTask(id) {
      if (!confirm('このタスクを削除しますか？')) return;
      try {
        await API.activities.delete(id);
        allTasks = allTasks.filter(t => t.id !== id);
        renderTasks();
        Toast.success('削除しました');
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ===== モーダル =====
    function openModal() {
      document.getElementById('editTaskId').value = '';
      document.getElementById('modalContent').value = '';
      document.getElementById('modalDueDate').value = '';
      document.getElementById('modalAssignedTo').value = myEmail;
      document.getElementById('taskModal').style.display = 'flex';
      document.getElementById('modalContent').focus();
    }

    function openEdit(id) {
      const t = allTasks.find(x => x.id === id);
      if (!t) return;
      document.getElementById('editTaskId').value = t.id;
      document.getElementById('modalContent').value = t.content || '';
      document.getElementById('modalDueDate').value = t.due_date || '';
      document.getElementById('modalAssignedTo').value = t.assigned_to || '';
      document.getElementById('taskModal').style.display = 'flex';
      document.getElementById('modalContent').focus();
    }

    function closeModal() {
      document.getElementById('taskModal').style.display = 'none';
    }

    document.getElementById('addTaskBtn').addEventListener('click', openModal);

    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
      const content = document.getElementById('modalContent').value.trim();
      if (!content) { Toast.error('内容を入力してください'); return; }
      const editId  = document.getElementById('editTaskId').value;
      const payload = {
        content,
        due_date:    document.getElementById('modalDueDate').value || null,
        assigned_to: document.getElementById('modalAssignedTo').value.trim() || null,
        is_task:     true,
        status:      'pending',
      };
      try {
        if (editId) {
          await API.activities.update({ id: editId, ...payload });
          const idx = allTasks.findIndex(t => t.id === editId);
          if (idx >= 0) allTasks[idx] = { ...allTasks[idx], ...payload };
          Toast.success('更新しました');
        } else {
          const created = await API.activities.create({ ...payload, type: 'タスク' });
          allTasks.unshift(created);
          Toast.success('タスクを追加しました');
        }
        closeModal();
        renderTasks();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    });

    // モーダル外クリックで閉じる
    document.getElementById('taskModal').addEventListener('click', e => {
      if (e.target === document.getElementById('taskModal')) closeModal();
    });
  </script>
</body>
</html>
