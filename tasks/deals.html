<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件タスク | アスナロ SFA</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    .filter-bar-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .seg-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .seg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .view-btn {
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .view-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .empty-tasks { text-align:center; padding:48px 0; color:var(--text-muted); font-size:13px; }

    /* グループヘッダー（案件名） */
    .deal-group-header {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0 8px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 4px;
    }
    .deal-group-title {
      font-size: 12px; font-weight: 800; color: var(--primary);
      letter-spacing: .04em;
    }
    .deal-group-link {
      font-size: 11px; font-weight: 600; color: var(--accent);
      text-decoration: none;
    }
    .deal-group-link:hover { text-decoration: underline; }
    .deal-group-cnt {
      font-size: 11px; font-weight: 700; background: var(--bg);
      border-radius: 10px; padding: 1px 8px; color: var(--text-muted);
    }
    .deal-group-phase {
      font-size: 10px; padding: 1px 7px; border-radius: 10px;
      background: #e0f2fe; color: #0369a1; font-weight: 700;
    }

    /* タスク行 */
    .task-group-title {
      font-size: 11px; font-weight: 800; color: var(--primary);
      letter-spacing: .06em; text-transform: uppercase;
      padding: 12px 0 6px; border-bottom: 1px solid #e2e8f0;
      margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
    }
    .task-group-title .cnt {
      font-size:11px; font-weight:700; background:var(--bg);
      border-radius:10px; padding:1px 8px; color:var(--text-muted);
    }
    .task-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid #f1f5f9;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row.done .task-text { text-decoration: line-through; opacity: .45; }
    .task-check { width:17px; height:17px; border-radius:4px; flex-shrink:0; margin-top:2px; cursor:pointer; accent-color:var(--accent); }
    .task-text  { font-size:13.5px; font-weight:600; color:var(--text); flex:1; }
    .task-meta  { font-size:11px; color:var(--text-muted); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
    .task-meta .overdue { color:#ef4444; font-weight:700; }
    .task-meta .today   { color:#f59e0b; font-weight:700; }
    .task-del   { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:18px; padding:0 2px; flex-shrink:0; line-height:1; }
    .task-del:hover { color:#ef4444; }
    .status-sel { font-size:11px; border:1px solid var(--border); border-radius:4px; padding:2px 4px; cursor:pointer; background:#fff; }

    /* カンバン */
    .kanban-board {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; align-items: start;
    }
    .kanban-col {
      background: var(--bg); border-radius: 10px;
      padding: 12px; min-height: 200px;
    }
    .kanban-col.drag-over { outline: 2px dashed var(--accent); }
    .kanban-col-header {
      font-size: 12px; font-weight: 800; color: var(--primary);
      letter-spacing: .04em; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-header .dot { width:10px; height:10px; border-radius:50%; margin-right:6px; flex-shrink:0; }
    .k-cnt { font-size:11px; font-weight:700; background:#fff; border-radius:10px; padding:1px 8px; color:var(--text-muted); }
    .kanban-card {
      background: #fff; border-radius: 8px; padding: 12px;
      margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
      cursor: grab; border-left: 3px solid transparent; position: relative;
    }
    .kanban-card:active { cursor: grabbing; opacity: .7; }
    .kanban-card.dragging { opacity: .4; }
    .kanban-card .k-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:6px; line-height:1.4; }
    .kanban-card .k-meta  { font-size:11px; color:var(--text-muted); display:flex; gap:8px; flex-wrap:wrap; }
    .kanban-card .k-overdue { color:#ef4444; font-weight:700; }
    .kanban-card .k-today   { color:#f59e0b; font-weight:700; }
    .kanban-card .k-actions { position:absolute; top:8px; right:8px; display:none; gap:4px; }
    .kanban-card:hover .k-actions { display:flex; }
    .k-act-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:13px; padding:2px; line-height:1; }
    .k-act-btn:hover { color:var(--primary); }
    .kanban-card.todo        { border-left-color: #94a3b8; }
    .kanban-card.in_progress { border-left-color: #0ea5e9; }
    .kanban-card.done        { border-left-color: #22c55e; }
    .k-deal-badge {
      font-size: 10px; font-weight: 700; color: var(--accent);
      background: #e0f2fe; padding: 1px 6px; border-radius: 8px; white-space: nowrap;
    }
  </style>
</head>

    <div class="page-body">

      <!-- フィルターバー -->
      <div class="filter-bar-top">
        <button class="seg-btn active" data-scope="mine" onclick="setScope('mine',this)">自分のタスク</button>

        <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
        <select class="form-select" id="dealFilter" onchange="render()" style="font-size:12px;padding:5px 10px;width:200px;">
          <option value="">すべての案件</option>

        <input type="text" class="search-input" id="taskSearch" placeholder="タスクを検索" style="width:160px;" oninput="render()">

        <button class="view-btn active" id="btnList" onclick="setView('list')">

  <!-- タスク追加/編集モーダル -->
  <div id="taskModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;width:480px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.18);">
      <div style="font-size:15px;font-weight:800;color:var(--primary);margin-bottom:20px;" id="modalTitle">タスクを追加</div>
      <input type="hidden" id="editTaskId">
      <div class="form-group">
        <label class="form-label">紐づく案件 <span class="required">*</span></label>
        <select class="form-select" id="modalDealId">
          <option value="">案件を選択...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">内容 <span class="required">*</span></label>
        <textarea class="form-textarea" id="modalContent" placeholder="タスクの内容を入力..." style="min-height:80px;"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">期日</label>
          <input type="date" class="form-input" id="modalDueDate">
        </div>
        <div class="form-group">
          <label class="form-label">担当者</label>
          <input type="text" class="form-input" id="modalAssignedTo" placeholder="メールアドレス">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-select" id="modalStatus">
          <option value="todo">未着手</option>
          <option value="in_progress">進行中</option>
          <option value="done">完了</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" id="modalSaveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let allTasks = [];
    let dealMap  = {};   // deal_id → { company_name, phase, id }
    let dealList = [];
    let currentScope = 'mine';
    let currentView  = 'list';
    let myEmail = '';
    let draggingId = null;

    function normalize(t) {
      if (t.status === 'pending' || !t.status) t.status = 'todo';
      return t;
    }

    initPage(async (user) => {
      myEmail = user?.email || '';
      await load();
    });

    async function load() {
      try {
        const [rawTasks, rawDeals] = await Promise.all([
          API.activities.listTasks(),
          API.deals.list(),
        ]);

        dealList = rawDeals || [];
        dealMap  = {};
        dealList.forEach(d => { dealMap[d.id] = d; });

        allTasks = (rawTasks || [])
          .filter(t => t.deal_id)
          .map(normalize);

        buildDealFilter();
        render();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    }

    function buildDealFilter() {
      const sel = document.getElementById('dealFilter');
      const cur = sel.value;
      sel.innerHTML = '<option value="">すべての案件</option>';
      const usedIds = [...new Set(allTasks.map(t => t.deal_id).filter(Boolean))];
      usedIds.forEach(id => {
        const d = dealMap[id];
        if (!d) return;
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = d.company_name || id;
        sel.appendChild(opt);
      });
      if (cur) sel.value = cur;

      // モーダルの案件セレクトも更新
      const mSel = document.getElementById('modalDealId');
      const mCur = mSel.value;
      mSel.innerHTML = '<option value="">案件を選択...</option>';
      dealList.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.company_name || d.id;
        mSel.appendChild(opt);
      });
      if (mCur) mSel.value = mCur;
    }

    function setScope(scope, btn) {
      currentScope = scope;
      document.querySelectorAll('[data-scope]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function setView(view) {
      currentView = view;
      document.getElementById('listView').style.display   = view === 'list'   ? 'block' : 'none';
      document.getElementById('kanbanView').style.display = view === 'kanban' ? 'block' : 'none';
      document.getElementById('btnList').classList.toggle('active',   view === 'list');
      document.getElementById('btnKanban').classList.toggle('active', view === 'kanban');
      render();
    }

    function filtered() {
      const q          = (document.getElementById('taskSearch').value || '').toLowerCase();
      const filterDeal = document.getElementById('dealFilter').value;
      return allTasks.filter(t => {
        if (currentScope === 'mine' && t.assigned_to !== myEmail) return false;
        if (filterDeal && t.deal_id !== filterDeal) return false;
        if (q && !t.content?.toLowerCase().includes(q)) return false;
        return true;
      });
    }

    function render() {
      if (currentView === 'list') renderList();
      else renderKanban();
    }

    // ===== リストビュー（案件グループ） =====
    function renderList() {
      const today   = new Date().toISOString().slice(0, 10);
      const tasks   = filtered();

      if (!tasks.length) {
        document.getElementById('taskContainer').innerHTML = '<div class="empty-tasks">タスクがありません</div>';
        return;
      }

      // 案件ごとにグループ化
      const groups = {};
      tasks.forEach(t => {
        const key = t.deal_id || '__none__';
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      });

      // 案件名でソート（未完タスクが多い順）
      const sorted = Object.entries(groups).sort(([,a],[,b]) => {
        const aActive = a.filter(t => t.status !== 'done').length;
        const bActive = b.filter(t => t.status !== 'done').length;
        return bActive - aActive;
      });

      const html = sorted.map(([dealId, items]) => {
        const deal = dealMap[dealId];
        const dealName = deal?.company_name || '(案件不明)';
        const dealHref = deal ? `/deals/detail.html?id=${deal.id}` : '#';
        const phase    = deal?.phase || '';
        const active   = items.filter(t => t.status !== 'done');
        const done     = items.filter(t => t.status === 'done');

        const subGroups = [
          { label:'⚠️ 期限超過', items: active.filter(t => t.due_date && t.due_date < today) },
          { label:'今日',        items: active.filter(t => t.due_date === today) },
          { label:'今週',        items: active.filter(t => { const d = t.due_date; const w = new Date(Date.now()+6*86400000).toISOString().slice(0,10); return d && d > today && d <= w; }) },
          { label:'それ以降',    items: active.filter(t => { const w = new Date(Date.now()+6*86400000).toISOString().slice(0,10); return t.due_date && t.due_date > w; }) },
          { label:'期日なし',    items: active.filter(t => !t.due_date) },
          { label:'完了済み',    items: done },
        ].filter(g => g.items.length);

        return `
          <div style="margin-bottom:24px;">
            <div class="deal-group-header">
              <span class="deal-group-title">${escHtml(dealName)}</span>
              ${phase ? `<span class="deal-group-phase">${escHtml(phase)}</span>` : ''}
              <a href="${dealHref}" class="deal-group-link" title="案件を開く">→ 案件を開く</a>
              <span class="deal-group-cnt">${items.length}件</span>
            </div>
            ${subGroups.map(g => `
              <div>
                <div class="task-group-title">${g.label}<span class="cnt">${g.items.length}</span></div>
                ${g.items.map(t => listRow(t, today)).join('')}
              </div>`).join('')}
          </div>`;
      }).join('');

      document.getElementById('taskContainer').innerHTML = html;
    }

    function listRow(t, today) {
      const done    = t.status === 'done';
      const overdue = t.due_date && t.due_date < today && !done;
      const isToday = t.due_date === today && !done;
      const dueCls  = overdue ? 'overdue' : isToday ? 'today' : '';
      const dueLabel = t.due_date ? (overdue ? '⚠️ ' : '') + fmtDate(t.due_date) : '期日なし';
      return `
        <div class="task-row ${done ? 'done' : ''}">
          <input type="checkbox" class="task-check" ${done ? 'checked' : ''}
            onchange="quickStatus('${t.id}', this.checked ? 'done' : 'todo')">
          <div style="flex:1;min-width:0;">
            <div class="task-text">${escHtml(t.content||'')}</div>
            <div class="task-meta">
              <span class="${dueCls}">${dueLabel}</span>
              ${t.assigned_to ? `<span>担当: ${escHtml(t.assigned_to)}</span>` : ''}
              <select class="status-sel" onchange="quickStatus('${t.id}',this.value)">
                <option value="todo"        ${t.status==='todo'?'selected':''}>未着手</option>
                <option value="in_progress" ${t.status==='in_progress'?'selected':''}>進行中</option>
                <option value="done"        ${t.status==='done'?'selected':''}>完了</option>
              </select>
            </div>
          </div>
          <button class="task-del" onclick="openEdit('${t.id}')" title="編集" style="font-size:14px;">✎</button>
          <button class="task-del" onclick="deleteTask('${t.id}')" title="削除">×</button>
        </div>`;
    }

    // ===== カンバンビュー =====
    function renderKanban() {
      const today = new Date().toISOString().slice(0, 10);
      const tasks = filtered();
      const cols  = { todo: [], in_progress: [], done: [] };
      tasks.forEach(t => { (cols[t.status] || cols.todo).push(t); });

      ['todo','in_progress','done'].forEach(s => {
        document.getElementById('cnt-' + s).textContent = cols[s].length;
        document.getElementById('cards-' + s).innerHTML =
          cols[s].length ? cols[s].map(t => kanbanCard(t, today)).join('') :
          `<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:20px 0;">なし</div>`;
      });
    }

    function kanbanCard(t, today) {
      const overdue  = t.due_date && t.due_date < today && t.status !== 'done';
      const isToday  = t.due_date === today && t.status !== 'done';
      const dueCls   = overdue ? 'k-overdue' : isToday ? 'k-today' : '';
      const dueLabel = t.due_date ? (overdue ? '⚠️ ' : '') + fmtDate(t.due_date) : '';
      const deal     = dealMap[t.deal_id];
      const dealName = deal?.company_name || '';
      return `
        <div class="kanban-card ${t.status}"
          draggable="true"
          ondragstart="onDragStart(event,'${t.id}')"
          ondragend="onDragEnd(event)">
          <div class="k-actions">
            <button class="k-act-btn" onclick="openEdit('${t.id}')" title="編集">✎</button>
            <button class="k-act-btn" onclick="deleteTask('${t.id}')" title="削除" style="color:#ef4444;">×</button>
          </div>
          <div class="k-title">${escHtml(t.content||'')}</div>
          <div class="k-meta">
            ${dealName ? `<span class="k-deal-badge">${escHtml(dealName)}</span>` : ''}
            ${dueLabel ? `<span class="${dueCls}">${dueLabel}</span>` : ''}
            ${t.assigned_to ? `<span>${escHtml(t.assigned_to.split('@')[0])}</span>` : ''}
          </div>
        </div>`;
    }

    // ===== D&D =====
    function onDragStart(e, id) { draggingId = id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
    function onDragEnd(e) { e.target.classList.remove('dragging'); }
    function onDragOver(e, col) { e.preventDefault(); document.getElementById('col-' + col).classList.add('drag-over'); }
    function onDragLeave(e) { document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over')); }
    async function onDrop(e, newStatus) {
      e.preventDefault();
      document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
      if (!draggingId) return;
      const t = allTasks.find(x => x.id === draggingId);
      if (!t || t.status === newStatus) return;
      t.status = newStatus;
      renderKanban();
      try { await API.activities.update({ id: t.id, status: newStatus }); }
      catch(err) { Toast.error('更新エラー: ' + err.message); await load(); }
      draggingId = null;
    }

    // ===== CRUD =====
    async function quickStatus(id, newStatus) {
      const t = allTasks.find(x => x.id === id);
      if (!t) return;
      t.status = newStatus;
      render();
      try { await API.activities.update({ id, status: newStatus }); }
      catch(e) { Toast.error('更新エラー: ' + e.message); await load(); }
    }

    async function deleteTask(id) {
      if (!confirm('このタスクを削除しますか？')) return;
      try {
        await API.activities.delete(id);
        allTasks = allTasks.filter(t => t.id !== id);
        render();
        Toast.success('削除しました');
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ===== モーダル =====
    function openModal() {
      document.getElementById('modalTitle').textContent = 'タスクを追加';
      document.getElementById('editTaskId').value   = '';
      document.getElementById('modalContent').value = '';
      document.getElementById('modalDueDate').value = '';
      document.getElementById('modalAssignedTo').value = myEmail;
      document.getElementById('modalStatus').value  = 'todo';
      // フィルター中の案件をデフォルトで選択
      const filterDeal = document.getElementById('dealFilter').value;
      document.getElementById('modalDealId').value = filterDeal || '';
      document.getElementById('taskModal').style.display = 'flex';
      document.getElementById('modalContent').focus();
    }

    function openEdit(id) {
      const t = allTasks.find(x => x.id === id);
      if (!t) return;
      document.getElementById('modalTitle').textContent = 'タスクを編集';
      document.getElementById('editTaskId').value   = t.id;
      document.getElementById('modalContent').value = t.content || '';
      document.getElementById('modalDueDate').value = t.due_date || '';
      document.getElementById('modalAssignedTo').value = t.assigned_to || '';
      document.getElementById('modalStatus').value  = t.status || 'todo';
      document.getElementById('modalDealId').value  = t.deal_id || '';
      document.getElementById('taskModal').style.display = 'flex';
      document.getElementById('modalContent').focus();
    }

    function closeModal() { document.getElementById('taskModal').style.display = 'none'; }

    document.getElementById('addTaskBtn').addEventListener('click', openModal);
    document.getElementById('taskModal').addEventListener('click', e => {
      if (e.target === document.getElementById('taskModal')) closeModal();
    });

    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
      const content = document.getElementById('modalContent').value.trim();
      const dealId  = document.getElementById('modalDealId').value;
      if (!content) { Toast.error('内容を入力してください'); return; }
      if (!dealId)  { Toast.error('案件を選択してください'); return; }

      const editId  = document.getElementById('editTaskId').value;
      const payload = {
        content,
        deal_id:     dealId,
        due_date:    document.getElementById('modalDueDate').value    || null,
        assigned_to: document.getElementById('modalAssignedTo').value.trim() || null,
        status:      document.getElementById('modalStatus').value,
        is_task:     true,
        type:        'タスク',
      };
      try {
        if (editId) {
          await API.activities.update({ id: editId, ...payload });
          const idx = allTasks.findIndex(t => t.id === editId);
          if (idx >= 0) allTasks[idx] = normalize({ ...allTasks[idx], ...payload });
          Toast.success('更新しました');
        } else {
          const created = await API.activities.create(payload);
          if (created.deal_id) allTasks.unshift(normalize(created));
          Toast.success('タスクを追加しました');
        }
        closeModal();
        render();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    });

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
