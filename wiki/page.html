  <style>
    .wiki-content {
      font-size: 14px; line-height: 1.9; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
    }
    .wiki-content h1 { font-size: 20px; font-weight: 800; margin: 20px 0 10px; color: var(--primary); }
    .wiki-content h2 { font-size: 16px; font-weight: 700; margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .wiki-content h3 { font-size: 14px; font-weight: 700; margin: 12px 0 6px; }
    .editor-toolbar {
      display: flex; gap: 6px; flex-wrap: wrap;
      padding: 8px 0; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .toolbar-btn {
      padding: 4px 10px; border-radius: 4px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .toolbar-btn:hover { background: var(--bg); color: var(--primary); }
    #editor { min-height: 400px; font-family: inherit; font-size: 14px; line-height: 1.9; resize: vertical; }
    .mode-btn {
      padding: 5px 14px; border-radius: 6px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .mode-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  </style>
</head>

  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <a href="/wiki/index.html" style="color:var(--text-muted);text-decoration:none;font-size:13px;">← Wiki一覧</a>
        <h1 class="page-title" id="pageTitle">ページ</h1>
      </div>
      <div class="page-actions">
        <button class="mode-btn active" id="btnView" onclick="setMode('view')">閲覧</button>
        <button class="mode-btn" id="btnEdit" onclick="setMode('edit')">編集</button>
        <button class="btn btn-primary" id="saveBtn" style="display:none;" onclick="save()">保存</button>
        <button class="btn btn-danger btn-sm" id="deleteBtn" style="display:none;" onclick="del()">削除</button>
      </div>
    </div>

    <div class="page-body">
      <!-- 閲覧モード -->
      <div id="viewMode" class="card">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);">
          <span id="viewCat" style="font-size:11px;font-weight:700;color:var(--accent);"></span>
          <span id="viewMeta" style="font-size:11px;color:var(--text-muted);margin-left:auto;"></span>
        </div>
        <div class="wiki-content" id="viewContent"></div>
      </div>

      <!-- 編集モード -->
      <div id="editMode" style="display:none;" class="card">
        <div class="form-grid" style="margin-bottom:16px;">
          <div class="form-group">
            <label class="form-label">タイトル <span class="required">*</span></label>
            <input type="text" class="form-input" id="fTitle" placeholder="ページタイトル">
          </div>
          <div class="form-group">
            <label class="form-label">カテゴリ</label>
            <select class="form-select" id="fCategory">
              <option>業務フロー</option>
              <option>FAQ</option>
              <option>サービス説明</option>
              <option>採用</option>
              <option>営業</option>
              <option>その他</option>
            </select>
          </div>
        </div>
        <!-- ツールバー -->
        <div class="editor-toolbar">
          <button class="toolbar-btn" onclick="insert('# ','')">H1</button>
          <button class="toolbar-btn" onclick="insert('## ','')">H2</button>
          <button class="toolbar-btn" onclick="insert('### ','')">H3</button>
          <button class="toolbar-btn" onclick="insert('**','**')"><b>B</b></button>
          <button class="toolbar-btn" onclick="insert('- ','')">リスト</button>
          <button class="toolbar-btn" onclick="insert('1. ','')">番号</button>
          <button class="toolbar-btn" onclick="insert('\n---\n','')">区切り</button>
        </div>
        <textarea class="form-textarea" id="editor" placeholder="Wikiの内容を入力...&#10;&#10;# 見出し1&#10;## 見出し2&#10;**太字** &#10;- リスト項目"></textarea>
      </div>
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const pageId = getParam('id');
    const isNew  = !!getParam('new');
    let page = {};

    initPage(async () => {
      if (isNew) {
        setMode('edit');
        document.getElementById('pageTitle').textContent = '新規ページ';
        return;
      }
      if (!pageId) { location.href = '/wiki/index.html'; return; }
      Loading.show();
      try {
        page = await API.wiki.get(pageId);
        document.getElementById('pageTitle').textContent = page.title;
        document.getElementById('deleteBtn').style.display = 'inline-flex';
        renderView();
        // 編集フォームにも値セット
        document.getElementById('fTitle').value    = page.title || '';
        document.getElementById('fCategory').value = page.category || 'その他';
        document.getElementById('editor').value    = page.content || '';
      } catch(e) {
        Toast.error('読み込みエラー: ' + e.message);
      } finally { Loading.hide(); }
    });

    function renderView() {
      document.getElementById('viewCat').textContent  = page.category || '';
      document.getElementById('viewMeta').textContent = `更新: ${fmtDatetime(page.updated_at)} ・ ${page.author || ''}`;
      // シンプルなMarkdown的レンダリング
      let html = escHtml(page.content || '');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/^- (.+)$/gm, '• $1');
      html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0;">');
      document.getElementById('viewContent').innerHTML = html;
    }

    function setMode(mode) {
      const isEdit = mode === 'edit';
      document.getElementById('viewMode').style.display = isEdit ? 'none' : 'block';
      document.getElementById('editMode').style.display = isEdit ? 'block' : 'none';
      document.getElementById('saveBtn').style.display  = isEdit ? 'inline-flex' : 'none';
      document.getElementById('btnView').classList.toggle('active', !isEdit);
      document.getElementById('btnEdit').classList.toggle('active', isEdit);
      if (isEdit && !isNew) {
        document.getElementById('fTitle').value    = page.title || '';
        document.getElementById('fCategory').value = page.category || 'その他';
        document.getElementById('editor').value    = page.content || '';
      }
    }

    async function save() {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { Toast.error('タイトルを入力してください'); return; }
      const payload = {
        title,
        category: document.getElementById('fCategory').value,
        content:  document.getElementById('editor').value,
      };
      Loading.show();
      try {
        if (isNew || !pageId) {
          const created = await API.wiki.create(payload);
          Toast.success('ページを作成しました');
          location.href = `/wiki/page.html?id=${created.id}`;
        } else {
          page = await API.wiki.update({ id: pageId, ...payload });
          page = { ...page, ...payload };
          document.getElementById('pageTitle').textContent = title;
          renderView();
          setMode('view');
          Toast.success('保存しました');
        }
      } catch(e) {
        Toast.error('保存エラー: ' + e.message);
      } finally { Loading.hide(); }
    }

    async function del() {
      if (!confirm('このページを削除しますか？')) return;
      try {
        await API.wiki.delete(pageId);
        Toast.success('削除しました');
        location.href = '/wiki/index.html';
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    // ツールバー挿入
    function insert(prefix, suffix) {
      const ta = document.getElementById('editor');
      const s = ta.selectionStart, e = ta.selectionEnd;
      const selected = ta.value.substring(s, e);
      const replacement = prefix + selected + suffix;
      ta.value = ta.value.substring(0, s) + replacement + ta.value.substring(e);
      ta.selectionStart = s + prefix.length;
      ta.selectionEnd   = s + prefix.length + selected.length;
      ta.focus();
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
