  <style>
    .wiki-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .wiki-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: box-shadow .15s, border-color .15s;
    }
    .wiki-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: var(--accent); }
    .wiki-cat {
      font-size: 11px; font-weight: 700;
      color: var(--accent);
      letter-spacing: .04em;
      margin-bottom: 8px;
    }
    .wiki-title { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 6px; line-height: 1.4; }
    .wiki-preview { font-size: 12px; color: var(--text-muted); line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .wiki-meta { font-size: 11px; color: var(--text-muted); margin-top: 10px; }
    .cat-filter {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .cat-btn {
      padding: 4px 12px; border-radius: 16px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted);
    }
    .cat-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  </style>
</head>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">社内Wiki</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">業務マニュアル・FAQ・ナレッジ</div>
      </div>
      <div class="page-actions">
        <input type="text" class="search-input" id="searchInput" placeholder="Wikiを検索" style="width:200px;" oninput="render()">
        <a href="/wiki/page.html?new=1" class="btn btn-primary">+ 新規ページ</a>
      </div>
    </div>

    <div class="page-body">
      <!-- カテゴリフィルター -->
      <div class="cat-filter" id="catFilter"></div>
      <!-- グリッド -->
      <div id="wikiGrid"><div style="text-align:center;padding:40px;color:var(--text-muted);">読み込み中...</div></div>
    </div>

  <script src="/assets/js/auth.js"></script>

  <script src="/assets/js/utils.js"></script>
  <script>
    let pages = [];
    let currentCat = 'すべて';

    const CATEGORIES = ['すべて','業務フロー','FAQ','サービス説明','採用','営業','その他'];

    initPage(async () => {
      try {
        pages = await API.wiki.list();
        buildCatFilter();
        render();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    });

    function buildCatFilter() {
      const cats = ['すべて', ...new Set(pages.map(p => p.category).filter(Boolean))];
      document.getElementById('catFilter').innerHTML = cats.map(c =>
        `<button class="cat-btn ${c === currentCat ? 'active' : ''}" onclick="setCat('${c}',this)">${c}</button>`
      ).join('');
    }

    function setCat(cat, btn) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const q = (document.getElementById('searchInput').value || '').toLowerCase();
      const filtered = pages.filter(p => {
        if (currentCat !== 'すべて' && p.category !== currentCat) return false;
        if (q && !p.title?.toLowerCase().includes(q) && !p.content?.toLowerCase().includes(q)) return false;
        return true;
      });
      if (!filtered.length) {
        document.getElementById('wikiGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">ページがありません</div>';
        return;
      }
      document.getElementById('wikiGrid').innerHTML = `<div class="wiki-grid">${filtered.map(p => `
        <a href="/wiki/page.html?id=${p.id}" class="wiki-card">
          <div class="wiki-cat">${p.category || 'その他'}</div>
          <div class="wiki-title">${escHtml(p.title)}</div>
          ${p.content ? `<div class="wiki-preview">${escHtml(p.content.replace(/\n/g,' '))}</div>` : ''}
          <div class="wiki-meta">更新: ${fmtDate(p.updated_at)} ・ ${p.author || '—'}</div>
        </a>`).join('')}
      </div>`;
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
