    .ann-card {

      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;

    .ann-card:last-child { border-bottom: none; }
    .ann-card:hover { background: #f8fafc; }
    .ann-pin {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700;
      background: #fef3c7; color: #92400e;
      border-radius: 10px; padding: 2px 8px; margin-bottom: 6px;
    }
    .ann-title {
      font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px;
    }
    .ann-body {
      font-size: 13px; color: var(--text); white-space: pre-wrap;
      line-height: 1.7; margin-bottom: 8px;
    }
    .ann-meta { font-size: 11px; color: var(--text-muted); display: flex; gap: 12px; }
    .ann-actions { display: none; gap: 6px; }
    .ann-card:hover .ann-actions { display: flex; }
  </style>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">お知らせ</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">社内掲示板</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="addBtn">+ 投稿する</button>
      </div>
    </div>

    <div class="page-body">
      <div class="card" id="annList">
        <div style="text-align:center;padding:40px;color:var(--text-muted);">読み込み中...</div>
      </div>
    </div>
  </main>

  <!-- 投稿モーダル -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;width:560px;max-width:95vw;box-shadow:0 16px 48px rgba(0,0,0,.18);">
      <div style="font-size:15px;font-weight:800;color:var(--primary);margin-bottom:20px;" id="modalTitle">お知らせを投稿</div>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">タイトル <span class="required">*</span></label>
        <input type="text" class="form-input" id="fTitle" placeholder="タイトルを入力">
      </div>
      <div class="form-group">
        <label class="form-label">本文</label>
        <textarea class="form-textarea" id="fContent" placeholder="内容を入力..." style="min-height:140px;"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="fPinned"> 📌 ピン留めする
        </label>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" id="saveBtn">投稿する</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let items = [];

    initPage(async () => { await load(); });

    async function load() {
      try {
        items = await API.announcements.list();
        render();
      } catch(e) { Toast.error('読み込みエラー: ' + e.message); }
    }

    function render() {
      const el = document.getElementById('annList');
      if (!items.length) {
        el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">お知らせがありません</div>';
        return;
      }
      el.innerHTML = items.map(a => `
        <div class="ann-card">
          ${a.pinned ? '<div class="ann-pin">📌 ピン留め</div>' : ''}
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
            <div style="flex:1;min-width:0;">
              <div class="ann-title">${escHtml(a.title)}</div>
              ${a.content ? `<div class="ann-body">${escHtml(a.content)}</div>` : ''}
              <div class="ann-meta">
                <span>${a.author || '—'}</span>
                <span>${fmtDatetime(a.created_at)}</span>
                ${a.updated_at !== a.created_at ? `<span>（編集済み）</span>` : ''}
              </div>
            </div>
            <div class="ann-actions">
              <button class="btn btn-ghost btn-sm" onclick="openEdit('${a.id}')">編集</button>
              <button class="btn btn-danger btn-sm" onclick="del('${a.id}')">削除</button>
            </div>
          </div>
        </div>`).join('');
    }

    // ===== モーダル =====
    document.getElementById('addBtn').addEventListener('click', () => {
      document.getElementById('modalTitle').textContent = 'お知らせを投稿';
      document.getElementById('editId').value = '';
      document.getElementById('fTitle').value = '';
      document.getElementById('fContent').value = '';
      document.getElementById('fPinned').checked = false;
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('fTitle').focus();
    });

    function openEdit(id) {
      const a = items.find(x => x.id === id);
      if (!a) return;
      document.getElementById('modalTitle').textContent = 'お知らせを編集';
      document.getElementById('editId').value = a.id;
      document.getElementById('fTitle').value = a.title;
      document.getElementById('fContent').value = a.content || '';
      document.getElementById('fPinned').checked = a.pinned;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const title = document.getElementById('fTitle').value.trim();
      if (!title) { Toast.error('タイトルを入力してください'); return; }
      const editId = document.getElementById('editId').value;
      const payload = {
        title,
        content: document.getElementById('fContent').value,
        pinned:  document.getElementById('fPinned').checked,
      };
      try {
        if (editId) {
          await API.announcements.update({ id: editId, ...payload });
          Toast.success('更新しました');
        } else {
          await API.announcements.create(payload);
          Toast.success('投稿しました');
        }
        closeModal();
        await load();
      } catch(e) { Toast.error('エラー: ' + e.message); }
    });

    async function del(id) {
      if (!confirm('このお知らせを削除しますか？')) return;
      try {
        await API.announcements.delete(id);
        Toast.success('削除しました');
        await load();
      } catch(e) { Toast.error('削除エラー: ' + e.message); }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
