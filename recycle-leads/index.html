  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">リサイクルリード</h1>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">失注案件からの再アプローチ管理</div>
      </div>
      <div class="page-actions">
        <input type="text" class="search-input" id="searchInput" placeholder="企業名で検索">
        <select class="form-select" id="statusFilter" style="width:160px;">
          <option value="">ステータス: すべて</option>
          <option>塩漬け</option>
          <option>再アプローチ予定</option>
          <option>再アプローチ中</option>
          <option>再商談化</option>
        </select>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="table-wrap">
          <table id="recycleTable">
            <thead>
              <tr>
                <th>企業名</th>
                <th>失注理由</th>
                <th>失注日</th>
                <th>担当者</th>
                <th>ステータス</th>
                <th>再アプローチ予定日</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recycleBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    let allRecycleLeads = [];

    const STATUS_COLOR = {
      '塩漬け':         'badge-gray',
      '再アプローチ予定': 'badge-blue',
      '再アプローチ中':   'badge-yellow',
      '再商談化':       'badge-green',
    };

    initPage(async () => {
      try {
        allRecycleLeads = await API.recycleLeads.list();
        renderRecycleLeads();
      } catch(e) {
        Toast.error('データ取得エラー: ' + e.message);
      }
    });

    document.getElementById('searchInput').addEventListener('input', renderRecycleLeads);
    document.getElementById('statusFilter').addEventListener('change', renderRecycleLeads);

    function renderRecycleLeads() {
      const q      = document.getElementById('searchInput').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;

      const list = allRecycleLeads.filter(l => {
        if (q && !l.company_name?.toLowerCase().includes(q)) return false;
        if (status && l.recycle_status !== status) return false;
        return true;
      });

      const body = document.getElementById('recycleBody');
      if (!list.length) {
        body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-text">リサイクルリードがありません</div></div></td></tr>`;
        return;
      }

      body.innerHTML = list.map(l => `
        <tr>
          <td style="font-weight:600;">${l.company_name || '—'}</td>
          <td>${l.lost_reason || '—'}</td>
          <td>${fmtDate(l.lost_date)}</td>
          <td>${l.assigned_user || '—'}</td>
          <td>${l.recycle_status ? `<span class="badge ${STATUS_COLOR[l.recycle_status] || 'badge-gray'}">${l.recycle_status}</span>` : '—'}</td>
          <td>${fmtDate(l.next_approach_date)}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="reconvertToDeal('${l.id}','${(l.company_name||'').replace(/'/g,"\\'")}')">再商談化</button>
          </td>
        </tr>`).join('');
    }

    async function reconvertToDeal(id, companyName) {
      if (!confirm(`「${companyName}」を再度、案件として作成しますか？`)) return;
      try {
        await API.deals.create({
          deal_name:    companyName + '（再商談）',
          company_name: companyName,
          phase:        '認知商談',
          recycle_lead_id: id,
        });
        await API.recycleLeads.update({ id, recycle_status: '再商談化' });
        allRecycleLeads = allRecycleLeads.map(l => l.id === id ? { ...l, recycle_status: '再商談化' } : l);
        renderRecycleLeads();
        Toast.success('案件を作成しました');
      } catch(e) {
        Toast.error('エラー: ' + e.message);
      }
    }
  </script>
